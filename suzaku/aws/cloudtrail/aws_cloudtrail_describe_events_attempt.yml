title: AWS Health DescribeEvents Attempt
id: bcf37682-9cb3-5d76-98ca-d25bb4fd41d6
status: experimental
description: |
    Returns information about events that meet the specified filter criteria.
    Security implications: Service health events can help attackers time actions when defenses or staff attention are reduced.
    Observed in real-world incidents/reporting, e.g.: Crimson Collective: A New Threat Group Observed Operating in the Cloud.
references:
    - https://www.rapid7.com/blog/post/tr-crimson-collective-a-new-threat-group-observed-operating-in-the-cloud/
    - https://aws.permissions.cloud/iam/health#health-DescribeEvents
    - https://traildiscover.cloud/#Health-DescribeEvents
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.discovery
    - attack.t1526 #Cloud Service Discovery
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: health.amazonaws.com
        eventName: DescribeEvents
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Routine enumeration by administrators, monitoring/inventory tools, or the AWS Console and SDKs.
    - Security, backup, or cost-management tooling that periodically reads this resource.
level: informational
