title: AWS EC2 CreateRoute Attempt
id: c163e627-207a-51f2-bb6a-05ef74c13e78
status: experimental
description: |
    Failed or denied attempt to call CreateRoute — the request returned an error, so the action did not complete. A failed attempt can indicate an adversary probing permissions, a misconfigured tool, or an incomplete attack.
    Creates a route in a route table within a VPC.
    Security implications: Attackers might use CreateRoute to redirect network traffic within AWS VPCs to eavesdrop or exfiltrate data.
references:
    - https://www.intelligentdiscovery.io/controls/cloudwatch/cloudwatch-alarm-route-table-change
    - https://easttimor.github.io/aws-incident-response/
    - https://aws.permissions.cloud/iam/ec2#ec2-CreateRoute
    - https://traildiscover.cloud/#EC2-CreateRoute
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.collection
    - attack.t1074 #Data Staged
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: ec2.amazonaws.com
        eventName: CreateRoute
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Legitimate provisioning or configuration changes by administrators or CI/CD pipelines.
    - Infrastructure-as-code (Terraform, CloudFormation, CDK, Pulumi) applying changes.
level: informational
