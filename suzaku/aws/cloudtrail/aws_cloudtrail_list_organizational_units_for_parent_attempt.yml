title: AWS Organizations ListOrganizationalUnitsForParent Attempt
id: f8859ce0-c6fe-5e49-8fc7-d6bc747a279b
status: experimental
description: |
    Lists the organizational units (OUs) in a parent organizational unit or root.
    Security implications: Attackers might use ListOrganizationalUnitsForParent to map the structure of an organization's AWS environment for potential vulnerabilities.
    Observed in real-world incidents/reporting, e.g.: When a Zero Day and Access Keys Collide in the Cloud: Responding to the SugarCRM Zero-Day Vulnerability.
references:
    - https://unit42.paloaltonetworks.com/sugarcrm-cloud-incident-black-hat/
    - https://aws.permissions.cloud/iam/organizations#organizations-ListOrganizationalUnitsForParent
    - https://traildiscover.cloud/#Organizations-ListOrganizationalUnitsForParent
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.discovery
    - attack.t1526 #Cloud Service Discovery
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: organizations.amazonaws.com
        eventName: ListOrganizationalUnitsForParent
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Routine enumeration by administrators, monitoring/inventory tools, or the AWS Console and SDKs.
    - Security, backup, or cost-management tooling that periodically reads this resource.
level: informational
