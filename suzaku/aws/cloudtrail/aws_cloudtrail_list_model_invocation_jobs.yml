title: AWS Bedrock ListModelInvocationJobs
id: e40e1615-d54a-573a-b61a-607b88e4abd7
status: experimental
description: |
    Lists all batch inference jobs in the account.

    Security implications: Attackers might use ListModelInvocationJobs to review sensitive prompts, spot valuable outputs, or plan when to insert malicious workloads.

    Observed in real-world incidents/reporting, e.g.: AI-assisted cloud intrusion achieves admin access in 8 minutes.
references:
    - https://www.sysdig.com/blog/ai-assisted-cloud-intrusion-achieves-admin-access-in-8-minutes
    - https://aws.permissions.cloud/iam/bedrock#bedrock-ListModelInvocationJobs
    - https://traildiscover.cloud/#Bedrock-ListModelInvocationJobs
author: Adan Alvarez (@adanalvarez), Yamato Security
