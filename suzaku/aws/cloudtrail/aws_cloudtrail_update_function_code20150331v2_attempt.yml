title: AWS Lambda UpdateFunctionCode20150331v2 Attempt
id: b6a96256-4496-596e-8db6-4fc55668d188
status: experimental
description: |
    Updates a Lambda function's code. If code signing is enabled for the function, the code package must be signed by a trusted publisher.
    Security implications: Attackers might use UpdateFunctionCode to modify the code of a Lambda function, potentially injecting malicious code.
    Observed in real-world incidents/reporting, e.g.: AI-assisted cloud intrusion achieves admin access in 8 minutes.
references:
    - https://www.sysdig.com/blog/ai-assisted-cloud-intrusion-achieves-admin-access-in-8-minutes
    - https://www.wiz.io/blog/hunting-for-signs-of-persistence-in-the-cloud-an-ir-guide
    - https://hackingthe.cloud/aws/exploitation/iam_privilege_escalation/
    - https://pages.awscloud.com/rs/112-TZM-766/images/Visibility_detect_respond_AWS_SANS_whitepaper.pdf
    - https://medium.com/@adan.alvarez/how-attackers-can-misuse-aws-cloudfront-access-to-make-it-rain-cookies-acf9ce87541c
    - https://aws.permissions.cloud/iam/lambda#lambda-UpdateFunctionCode
    - https://traildiscover.cloud/#Lambda-UpdateFunctionCode20150331v2
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.persistence
    - attack.impact
    - attack.collection
    - attack.t1098 #Account Manipulation
    - attack.t1496 #Resource Hijacking
    - attack.t1119 #Automated Collection
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: lambda.amazonaws.com
        eventName: UpdateFunctionCode20150331v2
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Legitimate provisioning or configuration changes by administrators or CI/CD pipelines.
    - Infrastructure-as-code (Terraform, CloudFormation, CDK, Pulumi) applying changes.
level: low
