title: AWS Organizations LeaveOrganization
id: c9df2bf3-bf63-59a1-98fc-e691bc2521e3
status: experimental
description: |
    Removes a member account from its parent organization.
    Security implications: Attackers might use LeaveOrganization to disassociate resources and disrupt the structure of AWS organizations.
    Ex: aws organizations leave-organization
references:
    - https://reinforce.awsevents.com/content/dam/reinforce/2024/slides/TDR432_New-tactics-and-techniques-for-proactive-threat-detection.pdf
    - https://docs.datadoghq.com/security/default_rules/aws-organizations-leave-organization/
    - https://stratus-red-team.cloud/attack-techniques/AWS/aws.defense-evasion.organizations-leave
    - https://aws.permissions.cloud/iam/organizations#organizations-LeaveOrganization
    - https://traildiscover.cloud/#Organizations-LeaveOrganization
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.defense-evasion
    - attack.t1070 #Indicator Removal
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: organizations.amazonaws.com
        eventName: LeaveOrganization
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and not (error_code or error_msg)
falsepositives:
    - Legitimate administrative or automation activity.
    - Infrastructure-as-code or CI/CD tooling performing this action.
level: high
