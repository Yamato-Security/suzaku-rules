title: AWS EC2 DescribeInternetGateways
id: 7b93557d-f741-5504-928a-82d11a289367
status: experimental
description: |
    Describes your internet gateways.
    Security implications: Knowledge of internet ingress/egress points supports planning of data exfiltration.
    Observed in real-world incidents/reporting, e.g.: Crimson Collective: A New Threat Group Observed Operating in the Cloud.
references:
    - https://www.rapid7.com/blog/post/tr-crimson-collective-a-new-threat-group-observed-operating-in-the-cloud/
    - https://aws.permissions.cloud/iam/ec2#ec2-DescribeInternetGateways
    - https://traildiscover.cloud/#EC2-DescribeInternetGateways
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.discovery
    - attack.t1580 #Cloud Infrastructure Discovery
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: ec2.amazonaws.com
        eventName: DescribeInternetGateways
    condition: selection
falsepositives:
    - Routine enumeration by administrators, monitoring/inventory tools, or the AWS Console and SDKs.
    - Security, backup, or cost-management tooling that periodically reads this resource.
level: informational
