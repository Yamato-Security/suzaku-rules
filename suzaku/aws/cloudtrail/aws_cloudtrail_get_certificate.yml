title: AWS ACMPCA GetCertificate
id: 2041dff5-191b-54e6-8d01-ed3c17aefeab
status: experimental
description: |
    Retrieves a certificate from your private CA or one that has been shared with you.
    Security implications: Attackers might use GetCertificate combined with Route 53 control to intercept and read data from AWS API calls.
    Ex: aws acm-pca get-certificate --certificate-authority-arn arn:aws:acm-pca:us-west-2:123456789012:certificate-authority/12345678-1234-1234-1234-123456789012 --certificate-arn arn:aws:acm-pca:us-west-2:123456789012:certificate-authority/12345678-1234-1234-1234-123456789012/certificate/6707447683a9b7f4055627ffd55cebcc
references:
    - https://hackingthe.cloud/aws/exploitation/route53_modification_privilege_escalation/
    - https://aws.permissions.cloud/iam/acm-pca#acm-pca-GetCertificate
    - https://traildiscover.cloud/#ACMPCA-GetCertificate
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.discovery
    - attack.t1040 #Network Sniffing
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: acm-pca.amazonaws.com
        eventName: GetCertificate
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and not (error_code or error_msg)
falsepositives:
    - Routine enumeration by administrators, monitoring/inventory tools, or the AWS Console and SDKs.
    - Security, backup, or cost-management tooling that periodically reads this resource.
level: informational
