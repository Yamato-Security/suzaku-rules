title: AWS EC2 DescribeInstanceAttribute
id: fc1321f4-ae42-5d3f-96c4-2cdcb4bfe00c
status: experimental
description: |
    Describes the specified attribute of the specified instance. You can specify only one attribute at a time.
    Security implications: Attackers might use DescribeInstanceAttribute to inspect detailed configurations of EC2 instances.
    Observed in real-world incidents/reporting, e.g.: Compromised Cloud Compute Credentials: Case Studies From the Wild.
references:
    - https://unit42.paloaltonetworks.com/compromised-cloud-compute-credentials/#post-125981-_kdq0vw6banab
    - https://aws.permissions.cloud/iam/ec2#ec2-DescribeInstanceAttribute
    - https://traildiscover.cloud/#EC2-DescribeInstanceAttribute
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.discovery
    - attack.t1580 #Cloud Infrastructure Discovery
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: ec2.amazonaws.com
        eventName: DescribeInstanceAttribute
    condition: selection
falsepositives:
level: low
