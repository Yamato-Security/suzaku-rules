title: AWS Marketplace GetListingView
id: 461adafd-af99-5d34-bbc2-019d9fbff235
status: experimental
description: |
    Retrieves detailed metadata for an AWS Marketplace listing, including pricing, fulfillment, and entitlement options used by Bedrock.
    Security implications: Attackers might use GetListingView to learn which commercial Bedrock providers are available, their cost controls, and what entitlements must be abused to spin up expensive inference jobs.
    Observed in real-world incidents/reporting, e.g.: AI-assisted cloud intrusion achieves admin access in 8 minutes.
references:
    - https://www.sysdig.com/blog/ai-assisted-cloud-intrusion-achieves-admin-access-in-8-minutes
    - https://aws.permissions.cloud/iam/aws-marketplace#aws-marketplace-GetListingView
    - https://traildiscover.cloud/#Marketplace-GetListingView
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.discovery
    - attack.t1580 #Cloud Infrastructure Discovery
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: discovery-marketplace.amazonaws.com
        eventName: GetListingView
    condition: selection
falsepositives:
level: low
