title: AWS RDS DescribeBlueGreenDeployments Attempt
id: 337de9eb-197f-5b52-ad26-1dca2d47c97d
status: experimental
description: |
    Describes one or more blue/green deployments.
    Security implications: Allows attackers discovery of deployment configurations and potential weaknesses.
    Observed in real-world incidents/reporting, e.g.: Crimson Collective: A New Threat Group Observed Operating in the Cloud.
references:
    - https://www.rapid7.com/blog/post/tr-crimson-collective-a-new-threat-group-observed-operating-in-the-cloud/
    - https://aws.permissions.cloud/iam/rds#rds-DescribeBlueGreenDeployments
    - https://traildiscover.cloud/#RDS-DescribeBlueGreenDeployments
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.discovery
    - attack.t1580 #Cloud Infrastructure Discovery
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: rds.amazonaws.com
        eventName: DescribeBlueGreenDeployments
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Routine enumeration by administrators, monitoring/inventory tools, or the AWS Console and SDKs.
    - Security, backup, or cost-management tooling that periodically reads this resource.
level: informational
