title: AWS CloudWatchLogs GetLogRecord
id: 2cf91d1f-ef5f-5e7d-8323-2543dae7e1ee
status: experimental
description: |
    Retrieves all of the fields and values of a single log event.

    Security implications: Attackers might use GetLogRecord to precisely extract information from CloudWatch logs, potentially exposing sensitive data or insights into AWS operational activities.

    Observed in real-world incidents/reporting, e.g.: Compromised Cloud Compute Credentials: Case Studies From the Wild.
references:
    - https://unit42.paloaltonetworks.com/compromised-cloud-compute-credentials/#post-125981-_kdq0vw6banab
    - https://aws.permissions.cloud/iam/logs#logs-GetLogRecord
    - https://traildiscover.cloud/#CloudWatchLogs-GetLogRecord
author: Adan Alvarez (@adanalvarez), Yamato Security
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.discovery
    - attack.t1580 #Cloud Infrastructure Discovery
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: logs.amazonaws.com
        eventName: GetLogRecord
    condition: selection
falsepositives:
level: low
