title: AWS IAM DeleteRolePermissionsBoundary
id: 83fc3de5-997a-5717-a672-7c90021a869e
status: experimental
description: |
    Deletes the permissions boundary for the specified IAM role.
    Security implications: Attackers might use DeleteRolePermissionsBoundary to remove restrictions and gain unauthorized access to AWS resources.
    Ex: aws iam delete-role-permissions-boundary --role-name trail-discover
references:
    - https://hackingthe.cloud/aws/exploitation/iam_privilege_escalation/
    - https://aws.permissions.cloud/iam/iam#iam-DeleteRolePermissionsBoundary
    - https://traildiscover.cloud/#IAM-DeleteRolePermissionsBoundary
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.privilege-escalation
    - attack.t1098 #Account Manipulation
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: iam.amazonaws.com
        eventName: DeleteRolePermissionsBoundary
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and not (error_code or error_msg)
falsepositives:
    - Planned decommissioning, cleanup, or teardown by administrators or CI/CD.
    - Infrastructure-as-code (Terraform, CloudFormation, CDK) destroying or replacing resources.
level: medium
