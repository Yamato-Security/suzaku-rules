title: AWS KMS CreateKey Attempt
id: 74702388-a60c-5f06-a080-cb4d4cf8b68f
status: experimental
description: |
    Failed or denied attempt to call CreateKey — the request returned an error, so the action did not complete. A failed attempt can indicate an adversary probing permissions, a misconfigured tool, or an incomplete attack.
    Creates a unique customer managed KMS key in your AWS account and Region.
    Security implications: Attackers might create keys only accessible by the identity they have compromised, for later encrypt data and delete access to it for ransomware attacks.
    Ex: aws kms create-key
references:
    - https://blog.pepperclipp.com/pepperclipp-public/encrypting-buckets-for-compliance-and-ransom-how-attackers-can-use-kms-to-ransomware-s3-buckets
    - https://aws.permissions.cloud/iam/kms#kms-CreateKey
    - https://traildiscover.cloud/#KMS-CreateKey
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.impact
    - attack.t1486 #Data Encrypted for Impact
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: kms.amazonaws.com
        eventName: CreateKey
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Legitimate provisioning or configuration changes by administrators or CI/CD pipelines.
    - Infrastructure-as-code (Terraform, CloudFormation, CDK, Pulumi) applying changes.
level: informational
