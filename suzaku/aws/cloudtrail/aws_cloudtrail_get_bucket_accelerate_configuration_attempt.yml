title: AWS S3 GetBucketAccelerateConfiguration Attempt
id: f08d7f78-9e9d-5b92-907c-e871b5f23baf
status: experimental
description: |
    Failed or denied attempt to call GetBucketAccelerateConfiguration — the request returned an error, so the action did not complete. A failed attempt can indicate an adversary probing permissions, a misconfigured tool, or an incomplete attack.
    This implementation of the GET action uses the accelerate subresource to return the Transfer Acceleration state of a bucket, which is either Enabled or Suspended.
    Security implications: Attackers might use GetBucketAccelerateConfiguration to check if S3 transfer acceleration is enabled.
    Observed in real-world incidents/reporting, e.g.: Leaked Environment Variables Allow Large-Scale Extortion Operation in Cloud Environments.
references:
    - https://unit42.paloaltonetworks.com/large-scale-cloud-extortion-operation/
    - https://aws.permissions.cloud/iam/s3#s3-GetAccelerateConfiguration
    - https://traildiscover.cloud/#S3-GetBucketAccelerateConfiguration
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.discovery
    - attack.t1526 #Cloud Service Discovery
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: s3.amazonaws.com
        eventName: GetBucketAccelerateConfiguration
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Routine enumeration by administrators, monitoring/inventory tools, or the AWS Console and SDKs.
    - Security, backup, or cost-management tooling that periodically reads this resource.
level: informational
