title: AWS S3 PutBucketReplication
id: 20d3533c-b247-52c1-a0a9-4009fc8a7ebf
status: experimental
description: |
    Creates a replication configuration or replaces an existing one.
    Security implications: Attackers might use PutBucketReplication to replicate sensitive data to unauthorized S3 buckets controlled by the attacker.
    Ex: aws s3api put-bucket-replication --bucket AWSDOC-EXAMPLE-BUCKET1 --replication-configuration '{"Role":"","Rules":[]}'
references:
    - https://securitylabs.datadoghq.com/articles/tales-from-the-cloud-trenches-ecs-crypto-mining/
    - https://traildiscover.cloud/#S3-PutBucketReplication
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.exfiltration
    - attack.t1537 #Transfer Data to Cloud Account
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: s3.amazonaws.com
        eventName: PutBucketReplication
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and not (error_code or error_msg)
falsepositives:
    - Legitimate provisioning or configuration changes by administrators or CI/CD pipelines.
    - Infrastructure-as-code (Terraform, CloudFormation, CDK, Pulumi) applying changes.
level: high
