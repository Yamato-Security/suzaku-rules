title: AWS CloudWatchLogs DeleteLogStream Attempt
id: 259554c7-2040-52c5-ba0c-f4684941dc0d
status: experimental
description: |
    Failed or denied attempt to call DeleteLogStream — the request returned an error, so the action did not complete. A failed attempt can indicate an adversary probing permissions, a misconfigured tool, or an incomplete attack.
    Deletes the specified log stream and permanently deletes all the archived log events associated with the log stream.
    Security implications: Attackers might use DeleteLogStream to erase CloudWatch logs, erasing evidence of their activities within AWS.
references:
    - https://expel.com/blog/following-cloudtrail-generating-aws-security-signals-sumo-logic/
    - https://aws.permissions.cloud/iam/logs#logs-DeleteLogStream
    - https://traildiscover.cloud/#CloudWatchLogs-DeleteLogStream
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.defense-evasion
    - attack.t1562 #Impair Defenses
    - attack.t1562.001 #Impair Defenses: Disable or Modify Tools
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: logs.amazonaws.com
        eventName: DeleteLogStream
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Planned decommissioning, cleanup, or teardown by administrators or CI/CD.
    - Infrastructure-as-code (Terraform, CloudFormation, CDK) destroying or replacing resources.
level: medium
