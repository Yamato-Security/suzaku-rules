title: AWS KMS ScheduleKeyDeletion Attempt
id: 22b45cc8-6289-561d-a92f-6ffb94ea44d3
status: experimental
description: |
    Schedules the deletion of a KMS key.
    Security implications: Attackers might use ScheduleKeyDeletion to schedule the deletion of crucial encryption keys, disrupting data security and access.
references:
    - https://www.chrisfarris.com/post/reinforce-threat-hunting/
    - https://aws.permissions.cloud/iam/kms#kms-ScheduleKeyDeletion
    - https://traildiscover.cloud/#KMS-ScheduleKeyDeletion
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.impact
    - attack.t1485 #Data Destruction
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: kms.amazonaws.com
        eventName: ScheduleKeyDeletion
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Legitimate administrative or automation activity.
    - Infrastructure-as-code or CI/CD tooling performing this action.
level: high
