title: AWS S3 GetBucketOwnershipControls Attempt
id: a51edba6-84e3-55a3-9901-09e43626ac09
status: experimental
description: |
    Failed or denied attempt to call GetBucketOwnershipControls — the request returned an error, so the action did not complete. A failed attempt can indicate an adversary probing permissions, a misconfigured tool, or an incomplete attack.
    Retrieves OwnershipControls for an Amazon S3 bucket.
    Security implications: Attackers might use GetBucketOwnershipControls to check the ownership configuration.
    Ex: aws s3api get-bucket-ownership-controls --bucket TrailDiscoverBucket
    Observed in real-world incidents/reporting, e.g.: Leaked Environment Variables Allow Large-Scale Extortion Operation in Cloud Environments.
references:
    - https://unit42.paloaltonetworks.com/large-scale-cloud-extortion-operation/
    - https://aws.permissions.cloud/iam/s3#s3-GetBucketOwnershipControls
    - https://traildiscover.cloud/#S3-GetBucketOwnershipControls
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.discovery
    - attack.t1526 #Cloud Service Discovery
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: s3.amazonaws.com
        eventName: GetBucketOwnershipControls
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Routine enumeration by administrators, monitoring/inventory tools, or the AWS Console and SDKs.
    - Security, backup, or cost-management tooling that periodically reads this resource.
level: informational
