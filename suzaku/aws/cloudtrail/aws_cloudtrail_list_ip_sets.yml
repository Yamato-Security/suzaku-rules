title: AWS GuardDuty ListIPSets
id: db386c96-ca67-5898-b9d6-96a78ca9c580
status: experimental
description: |
    Lists the IPSets of the GuardDuty service specified by the detector ID.
    Security implications: Attackers might use ListIPSets to identify what IPs won't generate an alert.
    Ex: aws guardduty list-ip-sets --detector-id TrailDiscoverDetectorId
references:
    - https://hackingthe.cloud/aws/avoiding-detection/modify-guardduty-config/
    - https://aws.permissions.cloud/iam/guardduty#guardduty-ListIPSets
    - https://traildiscover.cloud/#GuardDuty-ListIPSets
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.discovery
    - attack.t1526 #Cloud Service Discovery
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: guardduty.amazonaws.com
        eventName: ListIPSets
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and not (error_code or error_msg)
falsepositives:
    - Routine enumeration by administrators, monitoring/inventory tools, or the AWS Console and SDKs.
    - Security, backup, or cost-management tooling that periodically reads this resource.
level: informational
