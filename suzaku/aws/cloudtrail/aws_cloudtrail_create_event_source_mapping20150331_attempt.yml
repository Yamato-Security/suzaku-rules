title: AWS Lambda CreateEventSourceMapping20150331 Attempt
id: 061f4d80-b4d6-519f-9d1d-fcf4e816d493
status: experimental
description: |
    Failed or denied attempt to call CreateEventSourceMapping20150331 — the request returned an error, so the action did not complete. A failed attempt can indicate an adversary probing permissions, a misconfigured tool, or an incomplete attack.
    Creates a mapping between an event source and an AWS Lambda function.
    Security implications: Attackers might use CreateEventSourceMapping to trigger unauthorized Lambda functions with malicious code.
references:
    - https://hackingthe.cloud/aws/exploitation/iam_privilege_escalation/
    - https://aws.permissions.cloud/iam/lambda#lambda-CreateEventSourceMapping
    - https://traildiscover.cloud/#Lambda-CreateEventSourceMapping20150331
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.privilege-escalation
    - attack.t1098 #Account Manipulation
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: lambda.amazonaws.com
        eventName: CreateEventSourceMapping20150331
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Legitimate provisioning or configuration changes by administrators or CI/CD pipelines.
    - Infrastructure-as-code (Terraform, CloudFormation, CDK, Pulumi) applying changes.
level: low
