title: AWS IAM CreateServiceLinkedRole Attempt
id: adc31681-5e64-531c-8e86-c1edf1bf173e
status: experimental
description: |
    Failed or denied attempt to call CreateServiceLinkedRole — the request returned an error, so the action did not complete. A failed attempt can indicate an adversary probing permissions, a misconfigured tool, or an incomplete attack.
    Creates an IAM role that is linked to a specific AWS service. The service controls the attached policies and when the role can be deleted.
    Security implications: Attackers might use CreateServiceLinkedRole to create roles required for services like Auto Scaling as part of setting up infrastructure for resource hijacking.
    Observed in real-world incidents/reporting, e.g.: GuardDuty Extended Threat Detection uncovers cryptomining campaign on Amazon EC2 and Amazon ECS.
references:
    - https://aws.amazon.com/blogs/security/cryptomining-campaign-targeting-amazon-ec2-and-amazon-ecs/
    - https://aws.permissions.cloud/iam/iam#iam-CreateServiceLinkedRole
    - https://traildiscover.cloud/#IAM-CreateServiceLinkedRole
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.persistence
    - attack.t1098 #Account Manipulation
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: iam.amazonaws.com
        eventName: CreateServiceLinkedRole
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Legitimate provisioning or configuration changes by administrators or CI/CD pipelines.
    - Infrastructure-as-code (Terraform, CloudFormation, CDK, Pulumi) applying changes.
level: low
