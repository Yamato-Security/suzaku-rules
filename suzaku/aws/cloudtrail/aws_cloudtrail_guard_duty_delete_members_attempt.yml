title: AWS GuardDuty DeleteMembers Attempt
id: e321ecec-be91-557d-a842-97b3f75c90ae
status: experimental
description: |
    Failed or denied attempt to call DeleteMembers — the request returned an error, so the action did not complete. A failed attempt can indicate an adversary probing permissions, a misconfigured tool, or an incomplete attack.
    Deletes GuardDuty member accounts (to the current GuardDuty administrator account) specified by the account IDs.
    Security implications: Attackers might use DeleteMembers to remove members from a GuardDuty detector, disrupting threat detection and security analysis.
references:
    - https://www.chrisfarris.com/post/reinforce-threat-hunting/
    - https://aws.permissions.cloud/iam/guardduty#guardduty-DeleteMembers
    - https://traildiscover.cloud/#GuardDuty-DeleteMembers
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.defense-evasion
    - attack.t1562 #Impair Defenses
    - attack.t1562.001 #Impair Defenses: Disable or Modify Tools
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: guardduty.amazonaws.com
        eventName: DeleteMembers
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Planned decommissioning, cleanup, or teardown by administrators or CI/CD.
    - Infrastructure-as-code (Terraform, CloudFormation, CDK) destroying or replacing resources.
level: medium
