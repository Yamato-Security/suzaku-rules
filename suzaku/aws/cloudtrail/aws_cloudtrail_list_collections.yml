title: AWS OpenSearchServerless ListCollections
id: 5801362a-2436-5691-b8d9-e186eadd1a7d
status: experimental
description: |
    Lists all OpenSearch Serverless collections.
    Security implications: Attackers might use ListCollections to inventory search clusters, identify business-critical analytics assets, and prioritize follow-on data theft or sabotage.
    Observed in real-world incidents/reporting, e.g.: AI-assisted cloud intrusion achieves admin access in 8 minutes.
references:
    - https://www.sysdig.com/blog/ai-assisted-cloud-intrusion-achieves-admin-access-in-8-minutes
    - https://aws.permissions.cloud/iam/aoss#aoss-ListCollections
    - https://traildiscover.cloud/#OpenSearchServerless-ListCollections
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.discovery
    - attack.t1580 #Cloud Infrastructure Discovery
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: aoss.amazonaws.com
        eventName: ListCollections
    condition: selection
falsepositives:
level: low
