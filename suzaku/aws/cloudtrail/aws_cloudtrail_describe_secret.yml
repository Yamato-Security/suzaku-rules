title: AWS SecretsManager DescribeSecret
id: 3378b551-db9e-5f97-93c2-57b9b198c0b9
status: experimental
description: |
    Retrieves the details of a secret.
    Security implications: Attackers might use DescribeSecret to get more information about the secrets that are stored in Secrets Manager.
    Observed in real-world incidents/reporting, e.g.: Muddled Libra’s Evolution to the Cloud.
references:
    - https://unit42.paloaltonetworks.com/muddled-libra-evolution-to-cloud/
    - https://aws.permissions.cloud/iam/secretsmanager#secretsmanager-DescribeSecret
    - https://traildiscover.cloud/#SecretsManager-DescribeSecret
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.credential-access
    - attack.t1555 #Credentials from Password Stores
    - attack.t1555.006 #Credentials from Password Stores: Cloud Secrets Management Stores
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: secretsmanager.amazonaws.com
        eventName: DescribeSecret
    condition: selection
falsepositives:
    - Routine enumeration by administrators, monitoring/inventory tools, or the AWS Console and SDKs.
    - Security, backup, or cost-management tooling that periodically reads this resource.
level: high
