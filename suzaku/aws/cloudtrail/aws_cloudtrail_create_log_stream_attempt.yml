title: AWS CloudWatchLogs CreateLogStream Attempt
id: 6f4205ac-d7f7-55b5-9ed4-95ea34a8b158
status: experimental
description: |
    Creates a log stream for the specified log group.
    Security implications: Attackers might use CreateLogStream to later add benign log entries, effectively burying any signs of his malicious activities.
    Observed in real-world incidents/reporting, e.g.: Cloud Security Stories: From Risky Permissions to Ransomware Execution.
references:
    - https://sonraisecurity.com/blog/cloud-security-stories-from-risky-permissions-to-ransomware-execution/
    - https://aws.permissions.cloud/iam/logs#logs-CreateLogStream
    - https://traildiscover.cloud/#CloudWatchLogs-CreateLogStream
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.defense-evasion
    - attack.t1562 #Impair Defenses
    - attack.t1562.001
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: logs.amazonaws.com
        eventName: CreateLogStream
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Legitimate provisioning or configuration changes by administrators or CI/CD pipelines.
    - Infrastructure-as-code (Terraform, CloudFormation, CDK, Pulumi) applying changes.
level: medium
