title: AWS EC2 CreateImage
id: d9cfd299-2ca3-5dbb-a9b9-5955eaf78741
status: experimental
description: |
    Creates an Amazon EBS-backed AMI from an Amazon EBS-backed instance that is either running or stopped.
    Security implications: Attackers might use CreateImage to create images from running EC2s and use them after adding their own keys
    Ex: aws ec2 create-image --instance-id TrailDiscoverInstanceId --name "TrailDiscoverImageName" --description "TrailDiscoverImageDescription"
    Observed in real-world incidents/reporting, e.g.: When a Zero Day and Access Keys Collide in the Cloud: Responding to the SugarCRM Zero-Day Vulnerability.
references:
    - https://unit42.paloaltonetworks.com/sugarcrm-cloud-incident-black-hat/
    - https://aws.permissions.cloud/iam/ec2#ec2-CreateImage
    - https://traildiscover.cloud/#EC2-CreateImage
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.exfiltration
    - attack.t1537 #Transfer Data to Cloud Account
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: ec2.amazonaws.com
        eventName: CreateImage
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and not (error_code or error_msg)
falsepositives:
    - Legitimate provisioning or configuration changes by administrators or CI/CD pipelines.
    - Infrastructure-as-code (Terraform, CloudFormation, CDK, Pulumi) applying changes.
level: high
