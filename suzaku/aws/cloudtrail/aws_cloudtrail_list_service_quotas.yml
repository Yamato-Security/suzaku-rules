title: AWS ServiceQuotas ListServiceQuotas
id: baa9b19e-8d42-5b8d-97c3-9056ed6a5e2b
status: experimental
description: |
    Lists the applied quota values for the specified AWS service.
    Security implications: Attackers might use ListServiceQuotas to identify potential services to exploit by understanding their usage limits.
    Observed in real-world incidents/reporting, e.g.: Ransomware in the cloud; SES-PIONAGE.
references:
    - https://www.invictus-ir.com/news/ransomware-in-the-cloud
    - https://permiso.io/blog/s/aws-ses-pionage-detecting-ses-abuse/
    - https://securitylabs.datadoghq.com/articles/following-attackers-trail-in-aws-methodology-findings-in-the-wild/
    - https://aws.permissions.cloud/iam/servicequotas#servicequotas-ListServiceQuotas
    - https://traildiscover.cloud/#ServiceQuotas-ListServiceQuotas
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.discovery
    - attack.t1580 #Cloud Infrastructure Discovery
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: servicequotas.amazonaws.com
        eventName: ListServiceQuotas
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and not (error_code or error_msg)
falsepositives:
    - Routine enumeration by administrators, monitoring/inventory tools, or the AWS Console and SDKs.
    - Security, backup, or cost-management tooling that periodically reads this resource.
level: informational
