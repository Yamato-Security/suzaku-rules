title: AWS IAM CreateRole
id: d5360922-d26b-5185-852a-a550773643e2
status: experimental
description: |
    Creates a new role for your AWS account.
    Security implications: Attackers use CreateRole to create roles with trust policies that allow principals from an attacker-controlled AWS account, establishing persistent unauthorized access.
    Observed in real-world incidents/reporting, e.g.: Attack Scenario 2: From Misconfigured Firewall to Cryptojacking Botnet; The curious case of DangerDev@protonmail.me; Tales from the cloud trenches: Unwanted visitor; Leaked Environment Variables Allow Large-Scale Extortion Operation in Cloud Environments; GuardDuty Extended Threat Detection uncovers cryptomining campaign on Amazon EC2 and Amazon ECS.
references:
    - https://www.paloaltonetworks.com/content/dam/pan/en_US/assets/pdf/reports/unit42-cloud-threat-report-volume7.pdf
    - https://www.invictus-ir.com/news/the-curious-case-of-dangerdev-protonmail-me
    - https://securitylabs.datadoghq.com/articles/tales-from-the-cloud-trenches-unwanted-visitor/
    - https://unit42.paloaltonetworks.com/large-scale-cloud-extortion-operation/
    - https://aws.amazon.com/blogs/security/cryptomining-campaign-targeting-amazon-ec2-and-amazon-ecs/
    - https://aws.permissions.cloud/iam/iam#iam-CreateRole
    - https://traildiscover.cloud/#IAM-CreateRole
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.persistence
    - attack.t1136 #Create Account
    - attack.t1136.003 #Create Account: Cloud Account
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: iam.amazonaws.com
        eventName: CreateRole
    condition: selection
falsepositives:
    - Legitimate provisioning or configuration changes by administrators or CI/CD pipelines.
    - Infrastructure-as-code (Terraform, CloudFormation, CDK, Pulumi) applying changes.
level: medium
