title: AWS IAM DetachUserPolicy
id: 355b6bc5-65b9-5065-876f-fca14a806d82
status: experimental
description: |
    Removes the specified managed policy from the specified user.
    Security implications: Attackers might use DetachUserPolicy to remove security policies and gain unauthorized access to AWS resources.
    Observed in real-world incidents/reporting, e.g.: The curious case of DangerDev@protonmail.me.
references:
    - https://www.invictus-ir.com/news/the-curious-case-of-dangerdev-protonmail-me
    - https://hackingthe.cloud/aws/exploitation/iam_privilege_escalation/
    - https://aws.permissions.cloud/iam/iam#iam-DetachUserPolicy
    - https://traildiscover.cloud/#IAM-DetachUserPolicy
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.defense-evasion
    - attack.privilege-escalation
    - attack.t1578 #Modify Cloud Compute Infrastructure
    - attack.t1098 #Account Manipulation
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: iam.amazonaws.com
        eventName: DetachUserPolicy
    condition: selection
falsepositives:
    - Planned decommissioning, cleanup, or teardown by administrators or CI/CD.
    - Infrastructure-as-code (Terraform, CloudFormation, CDK) destroying or replacing resources.
level: high
