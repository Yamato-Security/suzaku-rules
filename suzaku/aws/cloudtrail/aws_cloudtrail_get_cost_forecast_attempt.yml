title: AWS CostExplorer GetCostForecast Attempt
id: f7cf409c-23fb-5329-b405-f69c0fddc615
status: experimental
description: |
    Failed or denied attempt to call GetCostForecast — the request returned an error, so the action did not complete. A failed attempt can indicate an adversary probing permissions, a misconfigured tool, or an incomplete attack.
    Retrieves a forecast for how much Amazon Web Services predicts that you will spend over the forecast time period that you select, based on your past costs.
    Security implications: Cost forecasting can validate success of cryptomining or resource abuse while avoiding detection.
    Ex: aws ce get-cost-forecast --metric BLENDED_COST --time-period Start=$(date +%Y-%m-%d),End=$(date -d '+1 year' +%Y-%m-%d) --granularity MONTHLY --prediction-interval-level 95
    Observed in real-world incidents/reporting, e.g.: Crimson Collective: A New Threat Group Observed Operating in the Cloud.
references:
    - https://www.rapid7.com/blog/post/tr-crimson-collective-a-new-threat-group-observed-operating-in-the-cloud/
    - https://aws.permissions.cloud/iam/ce#ce-GetCostForecast
    - https://traildiscover.cloud/#CostExplorer-GetCostForecast
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.discovery
    - attack.t1526 #Cloud Service Discovery
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: ce.amazonaws.com
        eventName: GetCostForecast
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Routine enumeration by administrators, monitoring/inventory tools, or the AWS Console and SDKs.
    - Security, backup, or cost-management tooling that periodically reads this resource.
level: informational
