title: AWS S3 GetBucketReplication Attempt
id: d23a1fb7-884f-578a-a4db-f35eb42c6363
status: experimental
description: |
    Returns the replication configuration of a bucket.
    Security implications: Attackers might use GetBucketReplication to identify replication configurations and target specific data for theft or corruption.
    Observed in real-world incidents/reporting, e.g.: Compromised Cloud Compute Credentials: Case Studies From the Wild; Muddled Libra’s Evolution to the Cloud; Leaked Environment Variables Allow Large-Scale Extortion Operation in Cloud Environments.
references:
    - https://unit42.paloaltonetworks.com/compromised-cloud-compute-credentials/#post-125981-_kdq0vw6banab
    - https://unit42.paloaltonetworks.com/muddled-libra-evolution-to-cloud/
    - https://unit42.paloaltonetworks.com/large-scale-cloud-extortion-operation/
    - https://traildiscover.cloud/#S3-GetBucketReplication
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.discovery
    - attack.t1526 #Cloud Service Discovery
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: s3.amazonaws.com
        eventName: GetBucketReplication
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Routine enumeration by administrators, monitoring/inventory tools, or the AWS Console and SDKs.
    - Security, backup, or cost-management tooling that periodically reads this resource.
level: informational
