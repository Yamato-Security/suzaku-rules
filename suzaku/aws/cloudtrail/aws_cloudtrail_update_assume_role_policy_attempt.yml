title: AWS IAM UpdateAssumeRolePolicy Attempt
id: 475d47d3-ae39-5759-863f-2179d0da15af
status: experimental
description: |
    Updates the policy that grants an IAM entity permission to assume a role.
    Security implications: Attackers might use UpdateAssumeRolePolicy to modify the assume role policy allowing access from an attacker compromised account.
references:
    - https://hackingthe.cloud/aws/exploitation/iam_privilege_escalation/
    - https://hackingthe.cloud/aws/post_exploitation/iam_persistence/
    - https://aws.permissions.cloud/iam/iam#iam-UpdateAssumeRolePolicy
    - https://traildiscover.cloud/#IAM-UpdateAssumeRolePolicy
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.persistence
    - attack.privilege-escalation
    - attack.t1098 #Account Manipulation
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: iam.amazonaws.com
        eventName: UpdateAssumeRolePolicy
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Legitimate provisioning or configuration changes by administrators or CI/CD pipelines.
    - Infrastructure-as-code (Terraform, CloudFormation, CDK, Pulumi) applying changes.
level: low
