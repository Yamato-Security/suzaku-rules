title: AWS RDS DescribeGlobalClusters Attempt
id: 0c8454aa-c0d4-5896-86f1-c0c0a86843a0
status: experimental
description: |
    Failed or denied attempt to call DescribeGlobalClusters — the request returned an error, so the action did not complete. A failed attempt can indicate an adversary probing permissions, a misconfigured tool, or an incomplete attack.
    Returns information about Aurora global database clusters.
    Security implications: Global cluster topology may expose cross-region replication targets for disruption or exfiltration.
    Ex: aws rds describe-global-clusters
    Observed in real-world incidents/reporting, e.g.: Crimson Collective: A New Threat Group Observed Operating in the Cloud.
references:
    - https://www.rapid7.com/blog/post/tr-crimson-collective-a-new-threat-group-observed-operating-in-the-cloud/
    - https://aws.permissions.cloud/iam/rds#rds-DescribeGlobalClusters
    - https://traildiscover.cloud/#RDS-DescribeGlobalClusters
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.discovery
    - attack.t1580 #Cloud Infrastructure Discovery
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: rds.amazonaws.com
        eventName: DescribeGlobalClusters
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Routine enumeration by administrators, monitoring/inventory tools, or the AWS Console and SDKs.
    - Security, backup, or cost-management tooling that periodically reads this resource.
level: informational
