title: AWS SES VerifyEmailIdentity Attempt
id: 9b819a81-1ab2-5233-807b-0b0fadb3c5ae
status: experimental
description: |
    Failed or denied attempt to call VerifyEmailIdentity — the request returned an error, so the action did not complete. A failed attempt can indicate an adversary probing permissions, a misconfigured tool, or an incomplete attack.
    Adds an email address to the list of identities for your Amazon SES account in the current AWS Region and attempts to verify it.
    Security implications: Attackers might use VerifyEmailIdentity to send phishing emails or spam from a verified email address.
    Observed in real-world incidents/reporting, e.g.: Compromised Cloud Compute Credentials: Case Studies From the Wild.
references:
    - https://unit42.paloaltonetworks.com/compromised-cloud-compute-credentials/#post-125981-_kdq0vw6banab
    - https://aws.permissions.cloud/iam/ses#ses-VerifyEmailIdentity
    - https://traildiscover.cloud/#SES-VerifyEmailIdentity
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.impact
    - attack.t1496 #Resource Hijacking
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: ses.amazonaws.com
        eventName: VerifyEmailIdentity
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Legitimate administrative or automation activity.
    - Infrastructure-as-code or CI/CD tooling performing this action.
level: low
