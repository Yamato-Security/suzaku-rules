title: AWS IAM ListGroupsForUser
id: daf4b99a-a4b1-560d-b214-5a944211badc
status: experimental
description: |
    Lists the IAM groups that the specified IAM user belongs to.

    Security implications: Attackers might use ListGroupsForUser to identify privileged groups and target specific users for access escalation.

    Observed in real-world incidents/reporting, e.g.: The curious case of DangerDev@protonmail.me.
references:
    - https://www.invictus-ir.com/news/the-curious-case-of-dangerdev-protonmail-me
    - https://aws.permissions.cloud/iam/iam#iam-ListGroupsForUser
    - https://traildiscover.cloud/#IAM-ListGroupsForUser
author: Adan Alvarez (@adanalvarez), Yamato Security
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.discovery
    - attack.t1087 #Account Discovery
    - attack.t1087.004 #Account Discovery: Cloud Account
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: iam.amazonaws.com
        eventName: ListGroupsForUser
    condition: selection
falsepositives:
level: low
