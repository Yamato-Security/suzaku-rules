title: AWS Bedrock ListFoundationModels
id: 520b0d03-ef9b-511f-809c-b2f2fb6ae01b
status: experimental
description: |
    Grants permission to list Bedrock foundation models that you can use.

    Security implications: Attackers might use ListFoundationModels to enumerate accessible models.

    Observed in real-world incidents/reporting, e.g.: Detecting AI resource-hijacking with Composite Alerts; Datadog threat roundup: top insights for Q4 2024; AI-assisted cloud intrusion achieves admin access in 8 minutes.
references:
    - https://www.lacework.com/blog/detecting-ai-resource-hijacking-with-composite-alerts
    - https://securitylabs.datadoghq.com/articles/2024-q4-threat-roundup/
    - https://www.sysdig.com/blog/ai-assisted-cloud-intrusion-achieves-admin-access-in-8-minutes
    - https://aws.permissions.cloud/iam/bedrock#bedrock-ListFoundationModels
    - https://traildiscover.cloud/#Bedrock-ListFoundationModels
author: Adan Alvarez (@adanalvarez), Yamato Security
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.discovery
    - attack.t1580 #Cloud Infrastructure Discovery
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: bedrock.amazonaws.com
        eventName: ListFoundationModels
    condition: selection
falsepositives:
level: low
