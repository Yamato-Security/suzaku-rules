title: AWS SSM ResumeSession Attempt
id: 14f0073b-3c29-5cf5-88e3-2fba243ed1ce
status: experimental
description: |
    Failed or denied attempt to call ResumeSession — the request returned an error, so the action did not complete. A failed attempt can indicate an adversary probing permissions, a misconfigured tool, or an incomplete attack.
    Reconnects a session to a managed node after it has been disconnected.
    Security implications: Attackers might use ResumeSession to gain unauthorized access to managed instances.
    Ex: aws ssm resume-session --session-id TrailDiscoverTarget
references:
    - https://unit42.paloaltonetworks.com/cloud-virtual-machine-attack-vectors/
    - https://aws.permissions.cloud/iam/ssm#ssm-ResumeSession
    - https://traildiscover.cloud/#SSM-ResumeSession
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.lateral-movement
    - attack.execution
    - attack.t1021 #Remote Services
    - attack.t1651 #Cloud Administration Command
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: ssm.amazonaws.com
        eventName: ResumeSession
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Legitimate administrative or automation activity.
    - Infrastructure-as-code or CI/CD tooling performing this action.
level: low
