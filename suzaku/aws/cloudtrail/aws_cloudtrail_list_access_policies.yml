title: AWS OpenSearchServerless ListAccessPolicies
id: 97200eed-885c-5171-9421-5507a6d5543b
status: experimental
description: |
    Returns information about a list of OpenSearch Serverless access policies.
    Security implications: Attackers might use ListAccessPolicies to understand enforcement gaps, clone permissive rules, or stage privilege escalation against OpenSearch Serverless data.
    Observed in real-world incidents/reporting, e.g.: AI-assisted cloud intrusion achieves admin access in 8 minutes.
references:
    - https://www.sysdig.com/blog/ai-assisted-cloud-intrusion-achieves-admin-access-in-8-minutes
    - https://aws.permissions.cloud/iam/aoss#aoss-ListAccessPolicies
    - https://traildiscover.cloud/#OpenSearchServerless-ListAccessPolicies
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.discovery
    - attack.t1069 #Permission Groups Discovery
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: aoss.amazonaws.com
        eventName: ListAccessPolicies
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and not (error_code or error_msg)
falsepositives:
    - Routine enumeration by administrators, monitoring/inventory tools, or the AWS Console and SDKs.
    - Security, backup, or cost-management tooling that periodically reads this resource.
level: informational
