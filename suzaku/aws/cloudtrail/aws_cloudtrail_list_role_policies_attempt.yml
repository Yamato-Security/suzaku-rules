title: AWS IAM ListRolePolicies Attempt
id: cc5cfe52-cccf-5973-8624-3905c47bc335
status: experimental
description: |
    Failed or denied attempt to call ListRolePolicies — the request returned an error, so the action did not complete. A failed attempt can indicate an adversary probing permissions, a misconfigured tool, or an incomplete attack.
    Lists the names of the inline policies that are embedded in the specified IAM role.
    Security implications: Attackers might use ListRolePolicies to identify permissions associated with various roles in AWS.
    Ex: aws iam list-role-policies --role-name TrailDiscover
    Observed in real-world incidents/reporting, e.g.: Compromised Cloud Compute Credentials: Case Studies From the Wild; Datadog threat roundup: top insights for Q4 2024.
references:
    - https://unit42.paloaltonetworks.com/compromised-cloud-compute-credentials/#post-125981-_kdq0vw6banab
    - https://securitylabs.datadoghq.com/articles/2024-q4-threat-roundup/
    - https://aws.permissions.cloud/iam/iam#iam-ListRolePolicies
    - https://traildiscover.cloud/#IAM-ListRolePolicies
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.discovery
    - attack.t1087 #Account Discovery
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: iam.amazonaws.com
        eventName: ListRolePolicies
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Routine enumeration by administrators, monitoring/inventory tools, or the AWS Console and SDKs.
    - Security, backup, or cost-management tooling that periodically reads this resource.
level: informational
