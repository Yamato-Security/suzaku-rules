title: AWS Bedrock GetFoundationModelAvailability
id: cc4c54c3-9940-583a-8b82-fbbacc66f474
status: experimental
description: |
    Grants permission to get the availability of a foundation model.
    Security implications: Attackers might use GetFoundationModelAvailability to enumerate accessible models
    Observed in real-world incidents/reporting, e.g.: Detecting AI resource-hijacking with Composite Alerts; When AI Gets Hijacked: Exploiting Hosted Models for Dark Roleplaying; Datadog threat roundup: top insights for Q4 2024.
references:
