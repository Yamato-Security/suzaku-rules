    - https://permiso.io/blog/exploiting-hosted-models
    - https://securitylabs.datadoghq.com/articles/2024-q4-threat-roundup/
    - https://aws.permissions.cloud/iam/bedrock#bedrock-GetFoundationModelAvailability
    - https://traildiscover.cloud/#Bedrock-GetFoundationModelAvailability
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.discovery
    - attack.t1580 #Cloud Infrastructure Discovery
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: bedrock.amazonaws.com
        eventName: GetFoundationModelAvailability
