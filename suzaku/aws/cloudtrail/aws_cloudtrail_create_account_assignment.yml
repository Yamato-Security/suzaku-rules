title: AWS SSO CreateAccountAssignment
id: a1a2dcab-c1cb-557f-98e5-23b12d013e05
status: experimental
description: |
    Assigns access to a principal for a specified AWS account using a specified permission set.
    Security implications: Attackers might use CreateAccountAssignment to assign themselves or compromised users access to AWS accounts with elevated privileges, allowing them to manipulate resources and maintain persistence in the environment.
    Observed in real-world incidents/reporting, e.g.: Tales from the cloud trenches: The Attacker doth persist too much, methinks.
references:
    - https://securitylabs.datadoghq.com/articles/tales-from-the-cloud-trenches-the-attacker-doth-persist-too-much/
    - https://aws.permissions.cloud/iam/sso#sso-CreateAccountAssignment
    - https://traildiscover.cloud/#SSO-CreateAccountAssignment
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.persistence
    - attack.t1098 #Account Manipulation
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: sso.amazonaws.com
        eventName: CreateAccountAssignment
    condition: selection
falsepositives:
level: medium
