title: AWS S3 GetBucketLocation
id: cb00212c-cd38-5524-b120-62a2d0b62ed3
status: experimental
description: |
    Returns the Region the bucket resides in.
    Security implications: Attackers might use GetBucketLocation to identify the region of s3 buckets
    Observed in real-world incidents/reporting, e.g.: Leaked Environment Variables Allow Large-Scale Extortion Operation in Cloud Environments; Crimson Collective: A New Threat Group Observed Operating in the Cloud.
references:
    - https://unit42.paloaltonetworks.com/large-scale-cloud-extortion-operation/
    - https://www.rapid7.com/blog/post/tr-crimson-collective-a-new-threat-group-observed-operating-in-the-cloud/
    - https://aws.permissions.cloud/iam/s3#s3-GetBucketLocation
    - https://traildiscover.cloud/#S3-GetBucketLocation
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.discovery
    - attack.t1526 #Cloud Service Discovery
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: s3.amazonaws.com
        eventName: GetBucketLocation
    condition: selection
falsepositives:
    - Routine enumeration by administrators, monitoring/inventory tools, or the AWS Console and SDKs.
    - Security, backup, or cost-management tooling that periodically reads this resource.
level: informational
