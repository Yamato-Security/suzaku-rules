title: AWS IAM ListGroups Attempt
id: c46e05d5-35e6-5c82-a1d3-6cdf209db824
status: experimental
description: |
    Failed or denied attempt to call ListGroups — the request returned an error, so the action did not complete. A failed attempt can indicate an adversary probing permissions, a misconfigured tool, or an incomplete attack.
    Lists the IAM groups that have the specified path prefix.
    Security implications: Attackers might use ListGroups to identify potential targets by gathering information about IAM groups and their permissions.
    Observed in real-world incidents/reporting, e.g.: Muddled Libra’s Evolution to the Cloud.
references:
    - https://unit42.paloaltonetworks.com/muddled-libra-evolution-to-cloud/
    - https://cloud.hacktricks.xyz/pentesting-cloud/aws-security/aws-services/aws-iam-enum
    - https://aws.permissions.cloud/iam/iam#iam-ListGroups
    - https://traildiscover.cloud/#IAM-ListGroups
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.discovery
    - attack.t1087 #Account Discovery
    - attack.t1087.004 #Account Discovery: Cloud Account
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: iam.amazonaws.com
        eventName: ListGroups
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Routine enumeration by administrators, monitoring/inventory tools, or the AWS Console and SDKs.
    - Security, backup, or cost-management tooling that periodically reads this resource.
level: informational
