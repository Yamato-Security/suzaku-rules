title: AWS GuardDuty DisassociateMembers Attempt
id: e3eb79b1-2bb4-534e-9e68-7b21039ea9b1
status: experimental
description: |
    Failed or denied attempt to call DisassociateMembers — the request returned an error, so the action did not complete. A failed attempt can indicate an adversary probing permissions, a misconfigured tool, or an incomplete attack.
    Disassociates GuardDuty member accounts (from the current administrator account) specified by the account IDs.
    Security implications: Attackers might use DisassociateMembers to remove members from a GuardDuty detector, disrupting threat detection and security analysis.
references:
    - https://www.chrisfarris.com/post/reinforce-threat-hunting/
    - https://aws.permissions.cloud/iam/guardduty#guardduty-DisassociateMembers
    - https://traildiscover.cloud/#GuardDuty-DisassociateMembers
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.defense-evasion
    - attack.t1562 #Impair Defenses
    - attack.t1562.001 #Impair Defenses: Disable or Modify Tools
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: guardduty.amazonaws.com
        eventName: DisassociateMembers
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Planned decommissioning, cleanup, or teardown by administrators or CI/CD.
    - Infrastructure-as-code (Terraform, CloudFormation, CDK) destroying or replacing resources.
level: medium
