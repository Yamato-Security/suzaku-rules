title: AWS S3 ListVaults Attempt
id: 18c366e5-5bbe-56cf-9509-b4a360a1d744
status: experimental
description: |
    Failed or denied attempt to call ListVaults — the request returned an error, so the action did not complete. A failed attempt can indicate an adversary probing permissions, a misconfigured tool, or an incomplete attack.
    This operation lists all vaults owned by the calling user’s account.
    Security implications: Attackers might use ListVaults to identify data such as archived training data or related datasets.
    Ex: aws glacier list-vaults --account-id -
    Observed in real-world incidents/reporting, e.g.: Detecting AI resource-hijacking with Composite Alerts; Tales from the cloud trenches: Raiding for AWS vaults, buckets and secrets.
references:
    - https://www.lacework.com/blog/detecting-ai-resource-hijacking-with-composite-alerts
    - https://securitylabs.datadoghq.com/articles/tales-from-the-cloud-trenches-raiding-for-vaults-buckets-secrets/
    - https://aws.permissions.cloud/iam/glacier#glacier-ListVaults
    - https://traildiscover.cloud/#S3-ListVaults
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.discovery
    - attack.t1619 #Cloud Storage Object Discovery
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: glacier.amazonaws.com
        eventName: ListVaults
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Routine enumeration by administrators, monitoring/inventory tools, or the AWS Console and SDKs.
    - Security, backup, or cost-management tooling that periodically reads this resource.
level: informational
