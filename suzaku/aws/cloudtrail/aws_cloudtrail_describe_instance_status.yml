title: AWS EC2 DescribeInstanceStatus
id: ffa857b4-5d46-529a-9ba7-3fda220f6446
status: experimental
description: |
    Describes the status of the specified instances or all of your instances.
    Security implications: Can reveal degraded instances or maintenance events an attacker might exploit.
    Ex: aws ec2 describe-instance-status --include-all-instances
    Observed in real-world incidents/reporting, e.g.: Crimson Collective: A New Threat Group Observed Operating in the Cloud.
references:
    - https://www.rapid7.com/blog/post/tr-crimson-collective-a-new-threat-group-observed-operating-in-the-cloud/
    - https://aws.permissions.cloud/iam/ec2#ec2-DescribeInstanceStatus
    - https://traildiscover.cloud/#EC2-DescribeInstanceStatus
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.discovery
    - attack.t1580 #Cloud Infrastructure Discovery
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: ec2.amazonaws.com
        eventName: DescribeInstanceStatus
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and not (error_code or error_msg)
falsepositives:
    - Routine enumeration by administrators, monitoring/inventory tools, or the AWS Console and SDKs.
    - Security, backup, or cost-management tooling that periodically reads this resource.
level: informational
