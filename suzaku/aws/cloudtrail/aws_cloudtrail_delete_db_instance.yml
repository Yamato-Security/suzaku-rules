title: AWS RDS DeleteDBInstance
id: 991d396f-e066-55b7-9d39-5597e63e63e4
status: experimental
description: |
    Deletes a previously provisioned DB instance.
    Security implications: Attackers might use DeleteDBInstance to delete crucial databases, causing data loss and service disruption.
    Observed in real-world incidents/reporting, e.g.: New tactics and techniques for proactive threat detection.
references:
    - https://reinforce.awsevents.com/content/dam/reinforce/2024/slides/TDR432_New-tactics-and-techniques-for-proactive-threat-detection.pdf
    - https://aws.permissions.cloud/iam/rds#rds-DeleteDBInstance
    - https://traildiscover.cloud/#RDS-DeleteDBInstance
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.impact
    - attack.t1485 #Data Destruction
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: rds.amazonaws.com
        eventName: DeleteDBInstance
    condition: selection
falsepositives:
    - Planned decommissioning, cleanup, or teardown by administrators or CI/CD.
    - Infrastructure-as-code (Terraform, CloudFormation, CDK) destroying or replacing resources.
level: critical
