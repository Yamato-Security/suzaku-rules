title: AWS CloudWatchLogs DescribeLogStreams
id: c704fbec-be33-502a-9d03-c609efcc75d5
status: experimental
description: |
    Lists the log streams for the specified log group.
    Security implications: Attackers might use DescribeLogStreams to discover CloudWatch log configurations.
    Observed in real-world incidents/reporting, e.g.: Compromised Cloud Compute Credentials: Case Studies From the Wild.
references:
    - https://unit42.paloaltonetworks.com/compromised-cloud-compute-credentials/#post-125981-_kdq0vw6banab
    - https://aws.permissions.cloud/iam/logs#logs-DescribeLogStreams
    - https://traildiscover.cloud/#CloudWatchLogs-DescribeLogStreams
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.discovery
    - attack.t1580 #Cloud Infrastructure Discovery
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: logs.amazonaws.com
        eventName: DescribeLogStreams
    condition: selection
falsepositives:
    - Routine enumeration by administrators, monitoring/inventory tools, or the AWS Console and SDKs.
    - Security, backup, or cost-management tooling that periodically reads this resource.
level: informational
