title: AWS S3 DeleteBucketPolicy Attempt
id: 74373f1f-1ce1-577c-af1f-f44b69d90723
status: experimental
description: |
    Deletes the policy of a specified bucket.
    Security implications: Attackers might use DeleteBucketPolicy to remove security policies and gain unauthorized access to S3 buckets.
references:
    - https://www.elastic.co/guide/en/security/7.17/aws-s3-bucket-configuration-deletion.html
    - https://aws.permissions.cloud/iam/s3#s3-DeleteBucketPolicy
    - https://traildiscover.cloud/#S3-DeleteBucketPolicy
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.defense-evasion
    - attack.t1578 #Modify Cloud Compute Infrastructure
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: s3.amazonaws.com
        eventName: DeleteBucketPolicy
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Planned decommissioning, cleanup, or teardown by administrators or CI/CD.
    - Infrastructure-as-code (Terraform, CloudFormation, CDK) destroying or replacing resources.
level: medium
