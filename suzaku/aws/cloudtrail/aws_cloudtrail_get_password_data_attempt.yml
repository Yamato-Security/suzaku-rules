title: AWS EC2 GetPasswordData Attempt
id: 85fbac66-cc71-5b71-a148-ba9c49025c53
status: experimental
description: |
    Retrieves the encrypted administrator password for a running Windows instance.
    Security implications: Attackers might use GetPasswordData to retrieve the password data for Windows instances, allowing unauthorized access.
    Observed in real-world incidents/reporting, e.g.: Tales from the cloud trenches: Amazon ECS is the new EC2 for crypto mining; Behind the scenes in the Expel SOC: Alert-to-fix in AWS; When a Zero Day and Access Keys Collide in the Cloud: Responding to the SugarCRM Zero-Day Vulnerability; Compromised Cloud Compute Credentials: Case Studies From the Wild.
references:
    - https://securitylabs.datadoghq.com/articles/tales-from-the-cloud-trenches-ecs-crypto-mining/
    - https://expel.com/blog/behind-the-scenes-expel-soc-alert-aws/
    - https://unit42.paloaltonetworks.com/sugarcrm-cloud-incident-black-hat/
    - https://unit42.paloaltonetworks.com/compromised-cloud-compute-credentials/#post-125981-_kdq0vw6banab
    - https://aws.permissions.cloud/iam/ec2#ec2-GetPasswordData
    - https://traildiscover.cloud/#EC2-GetPasswordData
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.credential-access
    - attack.t1555 #Credentials from Password Stores
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: ec2.amazonaws.com
        eventName: GetPasswordData
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Routine enumeration by administrators, monitoring/inventory tools, or the AWS Console and SDKs.
    - Security, backup, or cost-management tooling that periodically reads this resource.
level: medium
