title: AWS EC2 CreateTrafficMirrorFilterRule
id: 54a3d6ff-10fd-5d3e-be54-a708dc2ca2a8
status: experimental
description: |
    Creates a Traffic Mirror filter rule.
    Security implications: Attackers might use CreateTrafficMirrorFilterRule to fine-tune traffic mirroring for selective interception.
    Ex: aws ec2 create-traffic-mirror-filter-rule --description 'TCP Rule' --destination-cidr-block 0.0.0.0/0 --protocol 6 --rule-action accept --rule-number 1  --source-cidr-block 0.0.0.0/0 --traffic-direction ingress --traffic-mirror-filter-id tmf-04812ff784b25ae67
references:
    - https://rhinosecuritylabs.com/aws/abusing-vpc-traffic-mirroring-in-aws/
    - https://aws.permissions.cloud/iam/ec2#ec2-CreateTrafficMirrorFilterRule
    - https://traildiscover.cloud/#EC2-CreateTrafficMirrorFilterRule
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.collection
    - attack.t1074 #Data Staged
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: ec2.amazonaws.com
        eventName: CreateTrafficMirrorFilterRule
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and not (error_code or error_msg)
falsepositives:
    - Legitimate provisioning or configuration changes by administrators or CI/CD pipelines.
    - Infrastructure-as-code (Terraform, CloudFormation, CDK, Pulumi) applying changes.
level: low
