title: AWS Bedrock GetFoundationModelAvailability Attempt
id: 8171e0e8-1454-581a-92b3-314e15ef13bb
status: experimental
description: |
    Failed or denied attempt to call GetFoundationModelAvailability — the request returned an error, so the action did not complete. A failed attempt can indicate an adversary probing permissions, a misconfigured tool, or an incomplete attack.
    Grants permission to get the availability of a foundation model.
    Security implications: Attackers might use GetFoundationModelAvailability to enumerate accessible models
    Observed in real-world incidents/reporting, e.g.: Detecting AI resource-hijacking with Composite Alerts; When AI Gets Hijacked: Exploiting Hosted Models for Dark Roleplaying; Datadog threat roundup: top insights for Q4 2024.
references:
    - https://www.lacework.com/blog/detecting-ai-resource-hijacking-with-composite-alerts
    - https://permiso.io/blog/exploiting-hosted-models
    - https://securitylabs.datadoghq.com/articles/2024-q4-threat-roundup/
    - https://aws.permissions.cloud/iam/bedrock#bedrock-GetFoundationModelAvailability
    - https://traildiscover.cloud/#Bedrock-GetFoundationModelAvailability
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.discovery
    - attack.t1580 #Cloud Infrastructure Discovery
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: bedrock.amazonaws.com
        eventName: GetFoundationModelAvailability
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Routine enumeration by administrators, monitoring/inventory tools, or the AWS Console and SDKs.
    - Security, backup, or cost-management tooling that periodically reads this resource.
level: informational
