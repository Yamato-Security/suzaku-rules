title: AWS IAM UpdateAssumeRolePolicy
id: 74702dab-4c11-59af-900b-68a00913b5ec
status: experimental
description: |
    Updates the policy that grants an IAM entity permission to assume a role.

    Security implications: Attackers might use UpdateAssumeRolePolicy to modify the assume role policy allowing access from an attacker compromised account.
references:
    - https://hackingthe.cloud/aws/exploitation/iam_privilege_escalation/
    - https://hackingthe.cloud/aws/post_exploitation/iam_persistence/
    - https://aws.permissions.cloud/iam/iam#iam-UpdateAssumeRolePolicy
    - https://traildiscover.cloud/#IAM-UpdateAssumeRolePolicy
author: Adan Alvarez (@adanalvarez), Yamato Security
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.persistence
    - attack.privilege-escalation
    - attack.t1098 #Account Manipulation
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: iam.amazonaws.com
        eventName: UpdateAssumeRolePolicy
    condition: selection
falsepositives:
level: medium
