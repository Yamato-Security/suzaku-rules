title: AWS IAM UpdateAssumeRolePolicy
id: 74702dab-4c11-59af-900b-68a00913b5ec
status: experimental
description: |
    Updates the policy that grants an IAM entity permission to assume a role.
    Security implications: Attackers might use UpdateAssumeRolePolicy to modify the assume role policy allowing access from an attacker compromised account.
    Ex: aws iam update-assume-role-policy --role-name TrailDiscover-Role --policy-document {}
references:
    - https://hackingthe.cloud/aws/exploitation/iam_privilege_escalation/
    - https://hackingthe.cloud/aws/post_exploitation/iam_persistence/
    - https://stratus-red-team.cloud/attack-techniques/AWS/aws.persistence.iam-backdoor-role
    - https://aws.permissions.cloud/iam/iam#iam-UpdateAssumeRolePolicy
    - https://traildiscover.cloud/#IAM-UpdateAssumeRolePolicy
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.persistence
    - attack.privilege-escalation
    - attack.t1098 #Account Manipulation
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: iam.amazonaws.com
        eventName: UpdateAssumeRolePolicy
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and not (error_code or error_msg)
falsepositives:
    - Legitimate provisioning or configuration changes by administrators or CI/CD pipelines.
    - Infrastructure-as-code (Terraform, CloudFormation, CDK, Pulumi) applying changes.
level: medium
