title: AWS EC2 DescribeVolumeStatus Attempt
id: ea030c4e-ed0a-571d-aa2a-53165da9eb1b
status: experimental
description: |
    Failed or denied attempt to call DescribeVolumeStatus — the request returned an error, so the action did not complete. A failed attempt can indicate an adversary probing permissions, a misconfigured tool, or an incomplete attack.
    Describes the status of your Amazon EBS volumes.
    Security implications: Volume health and events may highlight targets for ransomware-style encryption or data theft.
    Ex: aws ec2 describe-volume-status
    Observed in real-world incidents/reporting, e.g.: Crimson Collective: A New Threat Group Observed Operating in the Cloud.
references:
    - https://www.rapid7.com/blog/post/tr-crimson-collective-a-new-threat-group-observed-operating-in-the-cloud/
    - https://aws.permissions.cloud/iam/ec2#ec2-DescribeVolumeStatus
    - https://traildiscover.cloud/#EC2-DescribeVolumeStatus
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.discovery
    - attack.t1580 #Cloud Infrastructure Discovery
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: ec2.amazonaws.com
        eventName: DescribeVolumeStatus
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Routine enumeration by administrators, monitoring/inventory tools, or the AWS Console and SDKs.
    - Security, backup, or cost-management tooling that periodically reads this resource.
level: informational
