title: AWS RDS DescribeDBSnapshots Attempt
id: b46e0d81-9007-5c1c-8643-86b56fa34211
status: experimental
description: |
    Failed or denied attempt to call DescribeDBSnapshots — the request returned an error, so the action did not complete. A failed attempt can indicate an adversary probing permissions, a misconfigured tool, or an incomplete attack.
    Returns information about DB snapshots.
    Security implications: Snapshot info indicates potential data backup targets for theft or ransom duplication.
    Ex: aws rds describe-db-snapshots
    Observed in real-world incidents/reporting, e.g.: Crimson Collective: A New Threat Group Observed Operating in the Cloud.
references:
    - https://www.rapid7.com/blog/post/tr-crimson-collective-a-new-threat-group-observed-operating-in-the-cloud/
    - https://aws.permissions.cloud/iam/rds#rds-DescribeDBSnapshots
    - https://traildiscover.cloud/#RDS-DescribeDBSnapshots
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.discovery
    - attack.t1580 #Cloud Infrastructure Discovery
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: rds.amazonaws.com
        eventName: DescribeDBSnapshots
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Routine enumeration by administrators, monitoring/inventory tools, or the AWS Console and SDKs.
    - Security, backup, or cost-management tooling that periodically reads this resource.
level: informational
