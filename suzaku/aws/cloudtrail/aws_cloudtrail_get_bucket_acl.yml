title: AWS S3 GetBucketAcl
id: d6ef14ce-b423-57a4-a881-c2792206bd74
status: experimental
description: |
    This implementation of the GET action uses the acl subresource to return the access control list (ACL) of a bucket.
    Security implications: Attackers might use GetBucketAccessControlPolicy to gain unauthorized access to sensitive data stored in S3 buckets.
    Observed in real-world incidents/reporting, e.g.: Muddled Libra’s Evolution to the Cloud; Leaked Environment Variables Allow Large-Scale Extortion Operation in Cloud Environments.
references:
    - https://unit42.paloaltonetworks.com/muddled-libra-evolution-to-cloud/
    - https://unit42.paloaltonetworks.com/large-scale-cloud-extortion-operation/
    - https://securitylabs.datadoghq.com/cloud-security-atlas/vulnerabilities/s3-bucket-public-acl/
    - https://aws.permissions.cloud/iam/s3#s3-GetBucketAcl
    - https://traildiscover.cloud/#S3-GetBucketAcl
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.discovery
    - attack.t1526 #Cloud Service Discovery
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: s3.amazonaws.com
        eventName: GetBucketAcl
    condition: selection
falsepositives:
level: low
