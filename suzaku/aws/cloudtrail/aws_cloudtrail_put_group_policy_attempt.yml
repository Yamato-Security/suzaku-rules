title: AWS IAM PutGroupPolicy Attempt
id: 11b58ead-6111-5152-9fda-4155b3e028dd
status: experimental
description: |
    Failed or denied attempt to call PutGroupPolicy — the request returned an error, so the action did not complete. A failed attempt can indicate an adversary probing permissions, a misconfigured tool, or an incomplete attack.
    Adds or updates an inline policy document that is embedded in the specified IAM group.
    Security implications: Attackers might use PutGroupPolicy to modify permissions of a group, potentially granting unauthorized access to sensitive resources.
    Ex: aws iam put-group-policy --group-name TrailDiscover --policy-document {} --policy-name TrailDiscover
references:
    - https://hackingthe.cloud/aws/exploitation/iam_privilege_escalation/
    - https://aws.permissions.cloud/iam/iam#iam-PutGroupPolicy
    - https://traildiscover.cloud/#IAM-PutGroupPolicy
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.privilege-escalation
    - attack.t1098 #Account Manipulation
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: iam.amazonaws.com
        eventName: PutGroupPolicy
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Legitimate provisioning or configuration changes by administrators or CI/CD pipelines.
    - Infrastructure-as-code (Terraform, CloudFormation, CDK, Pulumi) applying changes.
level: low
