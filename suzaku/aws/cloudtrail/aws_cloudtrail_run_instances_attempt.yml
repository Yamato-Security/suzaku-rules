title: AWS EC2 RunInstances Attempt
id: dddf9e7d-2603-5425-af2d-f786cb989508
status: experimental
description: |
    Failed or denied attempt to call RunInstances — the request returned an error, so the action did not complete. A failed attempt can indicate an adversary probing permissions, a misconfigured tool, or an incomplete attack.
    Launches the specified number of instances using an AMI for which you have permissions.
    Security implications: Attackers might use RunInstances to programmatically launch unauthorized EC2 instances for crypto mining or to create a foothold within the AWS environment for further exploitation.
    Observed in real-world incidents/reporting, e.g.: The curious case of DangerDev@protonmail.me; DXC spills AWS private keys on public GitHub; Tales from the cloud trenches: Amazon ECS is the new EC2 for crypto mining; Behind the scenes in the Expel SOC: Alert-to-fix in AWS; When a Zero Day and Access Keys Collide in the Cloud: Responding to the SugarCRM Zero-Day Vulnerability; SCARLETEEL 2.0: Fargate, Kubernetes, and Crypto.
