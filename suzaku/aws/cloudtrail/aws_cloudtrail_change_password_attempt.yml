title: AWS IAM ChangePassword Attempt
id: 83af6040-f185-5a4d-acd8-787926ac0efe
status: experimental
description: |
    Failed or denied attempt to call ChangePassword — the request returned an error, so the action did not complete. A failed attempt can indicate an adversary probing permissions, a misconfigured tool, or an incomplete attack.
    Changes the password of the IAM user who is calling this operation.
    Security implications: Attackers might use ChangePassword to alter user credentials.
references:
    - https://www.invictus-ir.com/news/aws-cloudtrail-cheat-sheet
    - https://asecure.cloud/a/cwalarm_iam_user_changes/
    - https://aws.permissions.cloud/iam/iam#iam-ChangePassword
    - https://traildiscover.cloud/#IAM-ChangePassword
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.persistence
    - attack.privilege-escalation
    - attack.t1136 #Create Account
    - attack.t1078 #Valid Accounts
    - attack.t1078.004 #Valid Accounts: Cloud Accounts
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: iam.amazonaws.com
        eventName: ChangePassword
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Legitimate administrative or automation activity.
    - Infrastructure-as-code or CI/CD tooling performing this action.
level: low
