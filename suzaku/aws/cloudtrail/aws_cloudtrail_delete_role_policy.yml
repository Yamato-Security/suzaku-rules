title: AWS IAM DeleteRolePolicy
id: 3590a37b-e99c-58e2-b3fe-d037c2362531
status: experimental
description: |
    Deletes the specified inline policy that is embedded in the specified IAM role.
    Security implications: Attackers might use DeleteRolePolicy to remove security policies, potentially escalating their privileges.
references:
    - https://hackingthe.cloud/aws/exploitation/iam_privilege_escalation/
    - https://aws.permissions.cloud/iam/iam#iam-DeleteRolePolicy
    - https://traildiscover.cloud/#IAM-DeleteRolePolicy
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.privilege-escalation
    - attack.t1098 #Account Manipulation
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: iam.amazonaws.com
        eventName: DeleteRolePolicy
    condition: selection
falsepositives:
    - Planned decommissioning, cleanup, or teardown by administrators or CI/CD.
    - Infrastructure-as-code (Terraform, CloudFormation, CDK) destroying or replacing resources.
level: medium
