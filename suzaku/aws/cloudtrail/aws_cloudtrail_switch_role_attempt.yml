title: AWS SignIn SwitchRole Attempt
id: b5e3ed04-db98-5867-982b-d5c609b201ee
status: experimental
description: |
    This event is recorded when a user manually switches to a different IAM role within the AWS Management Console.
    Security implications: Attackers might use SwitchRole when using the console to escalate privileges and gain unauthorized access to AWS resources.
    Observed in real-world incidents/reporting, e.g.: Tales from the cloud trenches: Unwanted visitor.
references:
    - https://securitylabs.datadoghq.com/articles/tales-from-the-cloud-trenches-unwanted-visitor/
    - https://www.invictus-ir.com/news/aws-cloudtrail-cheat-sheet
    - https://traildiscover.cloud/#SignIn-SwitchRole
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.lateral-movement
    - attack.t1021 #Remote Services
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: signin.amazonaws.com
        eventName: SwitchRole
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Legitimate administrative or automation activity.
    - Infrastructure-as-code or CI/CD tooling performing this action.
level: low
