title: AWS S3 PutBucketAcl Attempt
id: c57de81b-a610-550a-84e3-7e26b51c0b9b
status: experimental
description: |
    Failed or denied attempt to call PutBucketAcl — the request returned an error, so the action did not complete. A failed attempt can indicate an adversary probing permissions, a misconfigured tool, or an incomplete attack.
    Sets the permissions on an existing bucket using access control lists (ACL).
    Security implications: Attackers might use SetBucketAccessControlPolicy to modify access control lists, potentially granting unauthorized access to S3 buckets.
    Ex: aws s3api put-bucket-acl --bucket TrailDiscoverBucket --acl TrailDiscoverAcl
references:
    - https://docs.datadoghq.com/security/default_rules/aws-bucket-acl-made-public/
    - https://aws.permissions.cloud/iam/s3#s3-PutBucketAcl
    - https://traildiscover.cloud/#S3-PutBucketAcl
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.exfiltration
    - attack.t1048 #Exfiltration Over Alternative Protocol
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: s3.amazonaws.com
        eventName: PutBucketAcl
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Legitimate provisioning or configuration changes by administrators or CI/CD pipelines.
    - Infrastructure-as-code (Terraform, CloudFormation, CDK, Pulumi) applying changes.
level: medium
