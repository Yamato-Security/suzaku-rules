title: AWS IAM CreatePolicyVersion
id: 6450f6b9-80fe-54f6-bd85-9800794803dc
status: experimental
description: |
    Creates a new version of the specified managed policy.
    Security implications: Attackers might use CreatePolicyVersion to modify IAM policies, potentially granting themselves elevated permissions.
    Ex: aws iam create-policy-version --policy-arn arn:aws:iam::123456789012:policy/TrailDiscover --policy-document {}
references:
    - https://hackingthe.cloud/aws/exploitation/iam_privilege_escalation/
    - https://aws.permissions.cloud/iam/iam#iam-CreatePolicyVersion
    - https://traildiscover.cloud/#IAM-CreatePolicyVersion
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.privilege-escalation
    - attack.t1098 #Account Manipulation
    - attack.t1098.003 #Account Manipulation: Additional Cloud Roles
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: iam.amazonaws.com
        eventName: CreatePolicyVersion
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and not (error_code or error_msg)
falsepositives:
    - Legitimate provisioning or configuration changes by administrators or CI/CD pipelines.
    - Infrastructure-as-code (Terraform, CloudFormation, CDK, Pulumi) applying changes.
level: medium
