title: AWS RDS DescribeExportTasks Attempt
id: dc0609be-c69e-5798-865f-e65b3e64160d
status: experimental
description: |
    Failed or denied attempt to call DescribeExportTasks — the request returned an error, so the action did not complete. A failed attempt can indicate an adversary probing permissions, a misconfigured tool, or an incomplete attack.
    Returns information about a snapshot or cluster export to Amazon S3.
    Security implications: Export task details may expose S3 bucket names and regions, aiding in data exfiltration efforts.
    Ex: aws rds describe-export-tasks
    Observed in real-world incidents/reporting, e.g.: Crimson Collective: A New Threat Group Observed Operating in the Cloud.
references:
    - https://www.rapid7.com/blog/post/tr-crimson-collective-a-new-threat-group-observed-operating-in-the-cloud/
    - https://aws.permissions.cloud/iam/rds#rds-DescribeExportTasks
    - https://traildiscover.cloud/#RDS-DescribeExportTasks
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.discovery
    - attack.t1580 #Cloud Infrastructure Discovery
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: rds.amazonaws.com
        eventName: DescribeExportTasks
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Routine enumeration by administrators, monitoring/inventory tools, or the AWS Console and SDKs.
    - Security, backup, or cost-management tooling that periodically reads this resource.
level: informational
