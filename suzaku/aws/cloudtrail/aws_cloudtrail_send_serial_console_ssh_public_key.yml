title: AWS EC2InstanceConnect SendSerialConsoleSSHPublicKey
id: e456cf6e-439d-58c4-a5fa-44a46b14b960
status: experimental
description: |
    Pushes an SSH public key to the specified EC2 instance.

    Security implications: Attackers might use SendSerialConsoleSSHPublicKey to inject unauthorized SSH keys into EC2 instances, granting them access for remote control.

    Observed in real-world incidents/reporting, e.g.: LUCR-3: SCATTERED SPIDER GETTING SAAS-Y IN THE CLOUD; Navigating the Cloud: Exploring Lateral Movement Techniques; Cloud-Conscious Tactics, Techniques,and Procedures (TTPs).
references:
    - https://permiso.io/blog/lucr-3-scattered-spider-getting-saas-y-in-the-cloud
    - https://unit42.paloaltonetworks.com/cloud-lateral-movement-techniques/
    - https://fwdcloudsec.org/assets/presentations/2024/europe/sebastian-walla-cloud-conscious-tactics-techniques-and-procedures-an-overview.pdf
    - https://unit42.paloaltonetworks.com/cloud-virtual-machine-attack-vectors/
    - https://aws.permissions.cloud/iam/ec2-instance-connect#ec2-instance-connect-SendSerialConsoleSSHPublicKey
    - https://traildiscover.cloud/#EC2InstanceConnect-SendSerialConsoleSSHPublicKey
author: Adan Alvarez (@adanalvarez), Yamato Security
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.lateral-movement
    - attack.t1021 #Remote Services
    - attack.t1021.004 #Remote Services: SSH
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: ec2-instance-connect.amazonaws.com
        eventName: SendSerialConsoleSSHPublicKey
    condition: selection
falsepositives:
level: medium
