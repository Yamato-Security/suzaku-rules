title: AWS EC2 DescribeSnapshotTierStatus
id: adeffc08-0472-5d0c-8bd4-f80123d1f183
status: experimental
description: |
    Describes the storage tier status of one or more Amazon EBS snapshots.
    Security implications: Attackers might use DescribeSnapshotTierStatus to assess the tiering status and potential lifecycle transitions of EBS snapshots, seeking to identify snapshots that are less frequently accessed or potentially unmonitored.
    Observed in real-world incidents/reporting, e.g.: Compromised Cloud Compute Credentials: Case Studies From the Wild.
references:
    - https://unit42.paloaltonetworks.com/compromised-cloud-compute-credentials/#post-125981-_kdq0vw6banab
    - https://aws.permissions.cloud/iam/ec2#ec2-DescribeSnapshotTierStatus
    - https://traildiscover.cloud/#EC2-DescribeSnapshotTierStatus
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.discovery
    - attack.t1580 #Cloud Infrastructure Discovery
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: ec2.amazonaws.com
        eventName: DescribeSnapshotTierStatus
    condition: selection
falsepositives:
level: low
