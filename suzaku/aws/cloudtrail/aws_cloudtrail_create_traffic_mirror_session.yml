title: AWS EC2 CreateTrafficMirrorSession
id: c6af5443-3e16-51db-9fb9-0926526ac2a8
status: experimental
description: |
    Creates a Traffic Mirror session.
    Security implications: Attackers might use CreateTrafficMirrorSession to initiate a session for mirroring network traffic, potentially for malicious monitoring or data exfiltration.
    Ex: aws ec2 create-traffic-mirror-session --description TrailDiscoverDescription --traffic-mirror-target-id tmt-07f75d8feeEXAMPLE --network-interface-id eni-070203f901EXAMPLE --session-number 1 --packet-length 25 --traffic-mirror-filter-id tmf-04812ff784EXAMPLE
references:
    - https://rhinosecuritylabs.com/aws/abusing-vpc-traffic-mirroring-in-aws/
    - https://aws.permissions.cloud/iam/ec2#ec2-CreateTrafficMirrorSession
    - https://traildiscover.cloud/#EC2-CreateTrafficMirrorSession
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.collection
    - attack.t1074 #Data Staged
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: ec2.amazonaws.com
        eventName: CreateTrafficMirrorSession
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and not (error_code or error_msg)
falsepositives:
    - Legitimate provisioning or configuration changes by administrators or CI/CD pipelines.
    - Infrastructure-as-code (Terraform, CloudFormation, CDK, Pulumi) applying changes.
level: low
