title: AWS GuardDuty CreateIPSet Attempt
id: e788c921-7607-5045-b626-114ac007fc6f
status: experimental
description: |
    Failed or denied attempt to call CreateIPSet — the request returned an error, so the action did not complete. A failed attempt can indicate an adversary probing permissions, a misconfigured tool, or an incomplete attack.
    Creates a new IPSet, which is called a trusted IP list in the console user interface.
    Security implications: Attackers might use CreateIPSet to add malicious IP addresses to the GuardDuty whitelist, bypassing security measures.
    Ex: aws guardduty create-ip-set --detector-id 12abc34d567e8fa901bc2d34eexample --name new-ip-set --format TXT --location s3://traildiscover/traildiscover.csv --activate
references:
    - https://hackingthe.cloud/aws/avoiding-detection/modify-guardduty-config/
    - https://aws.permissions.cloud/iam/guardduty#guardduty-CreateIPSet
    - https://traildiscover.cloud/#GuardDuty-CreateIPSet
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.defense-evasion
    - attack.t1562 #Impair Defenses
    - attack.t1562.001 #Impair Defenses: Disable or Modify Tools
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: guardduty.amazonaws.com
        eventName: CreateIPSet
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Legitimate provisioning or configuration changes by administrators or CI/CD pipelines.
    - Infrastructure-as-code (Terraform, CloudFormation, CDK, Pulumi) applying changes.
level: medium
