title: AWS EC2 DescribeFlowLogs
id: 97d35ec9-e280-58ee-80c1-5f88eff03de7
status: experimental
description: |
    Describes one or more flow logs.
    Security implications: Attackers might use DescribeFlowLogs to review VPC flow log configurations, aiming to understand what network traffic is being logged.
    Observed in real-world incidents/reporting, e.g.: Compromised Cloud Compute Credentials: Case Studies From the Wild.
references:
    - https://unit42.paloaltonetworks.com/compromised-cloud-compute-credentials/#post-125981-_kdq0vw6banab
    - https://aws.permissions.cloud/iam/ec2#ec2-DescribeFlowLogs
    - https://traildiscover.cloud/#EC2-DescribeFlowLogs
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.discovery
    - attack.t1580 #Cloud Infrastructure Discovery
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: ec2.amazonaws.com
        eventName: DescribeFlowLogs
    condition: selection
falsepositives:
    - Routine enumeration by administrators, monitoring/inventory tools, or the AWS Console and SDKs.
    - Security, backup, or cost-management tooling that periodically reads this resource.
level: informational
