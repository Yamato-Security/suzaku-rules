title: AWS GuardDuty DisassociateFromMasterAccount
id: 6f519d4a-20bb-5d7b-82d7-5073a38d5dfd
status: experimental
description: |
    Disassociates the current GuardDuty member account from its administrator account.
    Security implications: Attackers might use DisassociateFromMasterAccount to remove the link to the master GuardDuty account, disrupting centralized security monitoring and analysis.
    Ex: aws guardduty disassociate-from-master-account --detector-id TrailDiscoverDetectorId
    Observed in real-world incidents/reporting, e.g.: LUCR-3: SCATTERED SPIDER GETTING SAAS-Y IN THE CLOUD.
references:
    - https://permiso.io/blog/lucr-3-scattered-spider-getting-saas-y-in-the-cloud
    - https://www.chrisfarris.com/post/reinforce-threat-hunting/
    - https://aws.permissions.cloud/iam/guardduty#guardduty-DisassociateFromMasterAccount
    - https://traildiscover.cloud/#GuardDuty-DisassociateFromMasterAccount
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.defense-evasion
    - attack.t1562 #Impair Defenses
    - attack.t1562.001 #Impair Defenses: Disable or Modify Tools
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: guardduty.amazonaws.com
        eventName: DisassociateFromMasterAccount
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and not (error_code or error_msg)
falsepositives:
    - Planned decommissioning, cleanup, or teardown by administrators or CI/CD.
    - Infrastructure-as-code (Terraform, CloudFormation, CDK) destroying or replacing resources.
level: high
