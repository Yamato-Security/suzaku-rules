title: AWS AppSync UpdateGraphqlApi
id: 21d384b0-8417-5f99-8013-59ee0481ad7a
status: experimental
description: |
    Updates a GraphqlApi object.

    Security implications: Attackers might use UpdateGraphqlApi to add additional authentications options. Bypassing current authentication and potentially allowing persistent access to data.
references:
    - https://medium.com/@adan.alvarez/distorting-the-sync-how-aws-appsync-can-be-turned-into-an-attackers-backdoor-8c015b8e52b8
    - https://aws.permissions.cloud/iam/appsync#appsync-UpdateGraphqlApi
    - https://traildiscover.cloud/#AppSync-UpdateGraphqlApi
author: Adan Alvarez (@adanalvarez), Yamato Security
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.defense-evasion
    - attack.persistence
    - attack.t1578 #Modify Cloud Compute Infrastructure
    - attack.t1556 #Modify Authentication Process
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: appsync.amazonaws.com
        eventName: UpdateGraphqlApi
    condition: selection
falsepositives:
level: medium
