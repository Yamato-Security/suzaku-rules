title: AWS AppSync UpdateGraphqlApi Attempt
id: 3f3281da-12ad-5181-abeb-219b9794dcb9
status: experimental
description: |
    Failed or denied attempt to call UpdateGraphqlApi — the request returned an error, so the action did not complete. A failed attempt can indicate an adversary probing permissions, a misconfigured tool, or an incomplete attack.
    Updates a GraphqlApi object.
    Security implications: Attackers might use UpdateGraphqlApi to add additional authentications options. Bypassing current authentication and potentially allowing persistent access to data.
    Ex: aws appsync update-graphql-api --api-id TrailDiscoverApiId --name TrailDiscoverName --log-config cloudWatchLogsRoleArn=TrailDiscoverRoleArn,fieldLogLevel=TrailDiscoverLogLevel
references:
    - https://medium.com/@adan.alvarez/distorting-the-sync-how-aws-appsync-can-be-turned-into-an-attackers-backdoor-8c015b8e52b8
    - https://aws.permissions.cloud/iam/appsync#appsync-UpdateGraphqlApi
    - https://traildiscover.cloud/#AppSync-UpdateGraphqlApi
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.defense-evasion
    - attack.persistence
    - attack.t1578 #Modify Cloud Compute Infrastructure
    - attack.t1556 #Modify Authentication Process
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: appsync.amazonaws.com
        eventName: UpdateGraphqlApi
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Legitimate provisioning or configuration changes by administrators or CI/CD pipelines.
    - Infrastructure-as-code (Terraform, CloudFormation, CDK, Pulumi) applying changes.
level: medium
