title: AWS SecretsManager ListSecrets Attempt
id: 4c80ae47-ede2-5d49-b60a-11549199c282
status: experimental
description: |
    Lists the secrets that are stored by Secrets Manager in the AWS account, not including secrets that are marked for deletion.
    Security implications: Attackers might use ListSecrets to list all the secrets and potentially access to them later.
    Observed in real-world incidents/reporting, e.g.: Muddled Libra’s Evolution to the Cloud; Detecting AI resource-hijacking with Composite Alerts; Tales from the cloud trenches: Raiding for AWS vaults, buckets and secrets; Cloud-Conscious Tactics, Techniques,and Procedures (TTPs); Investigating Suspected DPRK-Linked Crypto Intrusions.
references:
    - https://unit42.paloaltonetworks.com/muddled-libra-evolution-to-cloud/
    - https://www.lacework.com/blog/detecting-ai-resource-hijacking-with-composite-alerts
    - https://securitylabs.datadoghq.com/articles/tales-from-the-cloud-trenches-raiding-for-vaults-buckets-secrets/
    - https://fwdcloudsec.org/assets/presentations/2024/europe/sebastian-walla-cloud-conscious-tactics-techniques-and-procedures-an-overview.pdf
    - https://ctrlaltintel.com/threat%20research/DPRK-Crypto-Heist/
    - https://aws.permissions.cloud/iam/secretsmanager#secretsmanager-ListSecrets
    - https://traildiscover.cloud/#SecretsManager-ListSecrets
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.credential-access
    - attack.t1555 #Credentials from Password Stores
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: secretsmanager.amazonaws.com
        eventName: ListSecrets
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Routine enumeration by administrators, monitoring/inventory tools, or the AWS Console and SDKs.
    - Security, backup, or cost-management tooling that periodically reads this resource.
level: medium
