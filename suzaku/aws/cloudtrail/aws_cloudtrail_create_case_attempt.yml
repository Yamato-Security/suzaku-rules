title: AWS Support CreateCase Attempt
id: f762c3f5-3dea-5fd2-9dbe-dd9cf3a0162d
status: experimental
description: |
    Failed or denied attempt to call CreateCase — the request returned an error, so the action did not complete. A failed attempt can indicate an adversary probing permissions, a misconfigured tool, or an incomplete attack.
    Creates a case in the Support Center.
    Security implications: Attackers might use CreateCase to create a support case to try to get bigger quotas or other changes to the AWS account.
    Observed in real-world incidents/reporting, e.g.: From Compromised Keys to Phishing Campaigns: Inside a Cloud Email Service Takeover.
references:
    - https://www.wiz.io/blog/wiz-discovers-cloud-email-abuse-campaign
    - https://aws.permissions.cloud/iam/support#support-CreateCase
    - https://traildiscover.cloud/#Support-CreateCase
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.defense-evasion
    - attack.t1578 #Modify Cloud Compute Infrastructure
    - attack.t1578.005 #Modify Cloud Compute Infrastructure: Modify Cloud Account Settings
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: support.amazonaws.com
        eventName: CreateCase
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Legitimate provisioning or configuration changes by administrators or CI/CD pipelines.
    - Infrastructure-as-code (Terraform, CloudFormation, CDK, Pulumi) applying changes.
level: medium
