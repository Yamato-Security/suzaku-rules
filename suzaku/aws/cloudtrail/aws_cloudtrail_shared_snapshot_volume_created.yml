title: AWS EC2 SharedSnapshotVolumeCreated
id: 590d5f75-ac4f-59d4-84ef-c9b2e06a249d
status: experimental
description: |
    A volume was created from a snapshot shared with another AWS account.
    Security implications: SharedSnapshotVolumeCreated might be a signal of an attacker copying a snapshot to their account.
    Observed in real-world incidents/reporting, e.g.: M-Trends Report - 2020; Democratic National Committee hack; My AWS Account Got Hacked - Here Is What Happened.
references:
    - https://web.archive.org/web/20250129185248/https://www.mandiant.com/sites/default/files/2021-09/mtrends-2020.pdf
    - https://www.politico.com/f/?id=00000168-6161-de11-af7d-ef7327ea0000
    - https://zviwex.com/posts/aws-account-hacked
    - https://twitter.com/christophetd/status/1574681313218506753
    - https://traildiscover.cloud/#EC2-SharedSnapshotVolumeCreated
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.exfiltration
    - attack.t1537 #Transfer Data to Cloud Account
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: ec2.amazonaws.com
        eventName: SharedSnapshotVolumeCreated
    condition: selection
falsepositives:
    - Legitimate provisioning or configuration changes by administrators or CI/CD pipelines.
    - Infrastructure-as-code (Terraform, CloudFormation, CDK, Pulumi) applying changes.
level: high
