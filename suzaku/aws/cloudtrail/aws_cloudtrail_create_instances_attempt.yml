title: AWS Lightsail CreateInstances Attempt
id: b94e6a62-2475-5d78-a4f0-5f6ed74ce682
status: experimental
description: |
    Failed or denied attempt to call CreateInstances — the request returned an error, so the action did not complete. A failed attempt can indicate an adversary probing permissions, a misconfigured tool, or an incomplete attack.
    Creates one or more Amazon Lightsail instances.
    Security implications: Attackers might use CreateInstances to rapidly deploy malicious instances, causing financial loss and resource exhaustion. The use of lightsail might not be monitored.
    Observed in real-world incidents/reporting, e.g.: The curious case of DangerDev@protonmail.me.
references:
    - https://www.invictus-ir.com/news/the-curious-case-of-dangerdev-protonmail-me
    - https://aws.permissions.cloud/iam/lightsail#lightsail-CreateInstances
    - https://traildiscover.cloud/#Lightsail-CreateInstances
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.defense-evasion
    - attack.impact
    - attack.t1578 #Modify Cloud Compute Infrastructure
    - attack.t1496 #Resource Hijacking
    - attack.t1578.002 #Modify Cloud Compute Infrastructure: Create Cloud Instance
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: lightsail.amazonaws.com
        eventName: CreateInstances
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Legitimate provisioning or configuration changes by administrators or CI/CD pipelines.
    - Infrastructure-as-code (Terraform, CloudFormation, CDK, Pulumi) applying changes.
level: medium
