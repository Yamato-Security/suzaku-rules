title: AWS ServiceCatalog ListApplications Attempt
id: 5e8d101c-64ec-576f-ac6e-fc3f0ef9e082
status: experimental
description: |
    Failed or denied attempt to call ListApplications — the request returned an error, so the action did not complete. A failed attempt can indicate an adversary probing permissions, a misconfigured tool, or an incomplete attack.
    Retrieves a list of all of your applications.
    Security implications: Reveals cloud resources which may be targeted for further exploration or exploitation.
    Ex: aws servicecatalog-appregistry list-applications
    Observed in real-world incidents/reporting, e.g.: Crimson Collective: A New Threat Group Observed Operating in the Cloud.
references:
    - https://www.rapid7.com/blog/post/tr-crimson-collective-a-new-threat-group-observed-operating-in-the-cloud/
    - https://aws.permissions.cloud/iam/appconfig#appconfig-ListApplications
    - https://traildiscover.cloud/#ServiceCatalog-ListApplications
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.discovery
    - attack.t1526 #Cloud Service Discovery
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: servicecatalog-appregistry.amazonaws.com
        eventName: ListApplications
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Routine enumeration by administrators, monitoring/inventory tools, or the AWS Console and SDKs.
    - Security, backup, or cost-management tooling that periodically reads this resource.
level: informational
