title: AWS CloudWatch DeleteAlarms
id: 667819e2-7369-5a33-953c-e04b1970dca6
status: experimental
description: |
    Deletes the specified alarms. You can delete up to 100 alarms in one operation.
    Security implications: Attackers might use DeleteAlarms to disable critical CloudWatch alerts, undermining AWS environment monitoring
references:
    - https://www.elastic.co/guide/en/security/current/aws-cloudwatch-alarm-deletion.html
    - https://fwdcloudsec.org/assets/presentations/2024/europe/sebastian-walla-cloud-conscious-tactics-techniques-and-procedures-an-overview.pdf
    - https://aws.permissions.cloud/iam/cloudwatch#cloudwatch-DeleteAlarms
    - https://traildiscover.cloud/#CloudWatch-DeleteAlarms
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.defense-evasion
    - attack.t1562 #Impair Defenses
    - attack.t1562.001 #Impair Defenses: Disable or Modify Tools
    - attack.t1562.006 #Impair Defenses: Indicator Blocking
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: monitoring.amazonaws.com
        eventName: DeleteAlarms
    condition: selection
falsepositives:
    - Planned decommissioning, cleanup, or teardown by administrators or CI/CD.
    - Infrastructure-as-code (Terraform, CloudFormation, CDK) destroying or replacing resources.
level: high
