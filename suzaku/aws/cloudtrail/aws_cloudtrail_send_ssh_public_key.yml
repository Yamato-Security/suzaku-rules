title: AWS EC2InstanceConnect SendSSHPublicKey
id: 0c437ac2-adb8-5bad-b65b-bfc189a21184
status: experimental
description: |
    Pushes an SSH public key to the specified EC2 instance for use by the specified user.
    Security implications: Attackers might use SendSSHPublicKey to inject unauthorized SSH keys into EC2 instances, granting them access for remote control.
    Observed in real-world incidents/reporting, e.g.: Tales from the cloud trenches: Amazon ECS is the new EC2 for crypto mining; Navigating the Cloud: Exploring Lateral Movement Techniques; Cloud-Conscious Tactics, Techniques,and Procedures (TTPs).
references:
    - https://securitylabs.datadoghq.com/articles/tales-from-the-cloud-trenches-ecs-crypto-mining/
    - https://unit42.paloaltonetworks.com/cloud-lateral-movement-techniques/
    - https://fwdcloudsec.org/assets/presentations/2024/europe/sebastian-walla-cloud-conscious-tactics-techniques-and-procedures-an-overview.pdf
    - https://unit42.paloaltonetworks.com/cloud-virtual-machine-attack-vectors/
    - https://aws.permissions.cloud/iam/ec2-instance-connect#ec2-instance-connect-SendSSHPublicKey
    - https://traildiscover.cloud/#EC2InstanceConnect-SendSSHPublicKey
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.lateral-movement
    - attack.t1021 #Remote Services
    - attack.t1021.004 #Remote Services: SSH
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: ec2-instance-connect.amazonaws.com
        eventName: SendSSHPublicKey
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and not (error_code or error_msg)
falsepositives:
    - Legitimate provisioning or configuration changes by administrators or CI/CD pipelines.
    - Infrastructure-as-code (Terraform, CloudFormation, CDK, Pulumi) applying changes.
level: medium
