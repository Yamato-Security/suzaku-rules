title: AWS LightSail GetInstances Attempt
id: 4557ed39-9ca9-5c4b-a358-22cf169c6e15
status: experimental
description: |
    Failed or denied attempt to call GetInstances — the request returned an error, so the action did not complete. A failed attempt can indicate an adversary probing permissions, a misconfigured tool, or an incomplete attack.
    Returns information about all Amazon Lightsail virtual private servers, or instances.
    Security implications: Attackers might use GetInstances to gather information about running instances for potential exploitation.
references:
    - https://securitylabs.datadoghq.com/articles/following-attackers-trail-in-aws-methodology-findings-in-the-wild/
    - https://aws.permissions.cloud/iam/lightsail#lightsail-GetInstances
    - https://traildiscover.cloud/#LightSail-GetInstances
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.discovery
    - attack.t1580 #Cloud Infrastructure Discovery
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: lightsail.amazonaws.com
        eventName: GetInstances
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Routine enumeration by administrators, monitoring/inventory tools, or the AWS Console and SDKs.
    - Security, backup, or cost-management tooling that periodically reads this resource.
level: informational
