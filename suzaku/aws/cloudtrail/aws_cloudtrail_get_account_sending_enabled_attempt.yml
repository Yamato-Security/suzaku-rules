title: AWS SES GetAccountSendingEnabled Attempt
id: 79235941-3613-54c2-a469-acdb52b12aa8
status: experimental
description: |
    Returns the email sending status of the Amazon SES account for the current Region.
    Security implications: Attackers might use GetAccountSendingEnabled to identify if an AWS account's email sending capabilities are enabled, potentially exploiting it for spamming or phishing activities.
    Observed in real-world incidents/reporting, e.g.: Leaked Environment Variables Allow Large-Scale Extortion Operation in Cloud Environments.
references:
    - https://unit42.paloaltonetworks.com/large-scale-cloud-extortion-operation/
    - https://permiso.io/blog/s/aws-ses-pionage-detecting-ses-abuse/
    - https://aws.permissions.cloud/iam/ses#ses-GetAccountSendingEnabled
    - https://traildiscover.cloud/#SES-GetAccountSendingEnabled
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.discovery
    - attack.t1087 #Account Discovery
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: ses.amazonaws.com
        eventName: GetAccountSendingEnabled
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Routine enumeration by administrators, monitoring/inventory tools, or the AWS Console and SDKs.
    - Security, backup, or cost-management tooling that periodically reads this resource.
level: informational
