title: AWS SecretsManager DescribeSecret Attempt
id: 73267086-9863-5632-b986-c63a5889e360
status: experimental
description: |
    Failed or denied attempt to call DescribeSecret — the request returned an error, so the action did not complete. A failed attempt can indicate an adversary probing permissions, a misconfigured tool, or an incomplete attack.
    Retrieves the details of a secret.
    Security implications: Attackers might use DescribeSecret to get more information about the secrets that are stored in Secrets Manager.
    Ex: aws secretsmanager describe-secret --secret-id TrailDiscover
    Observed in real-world incidents/reporting, e.g.: Muddled Libra’s Evolution to the Cloud.
references:
    - https://unit42.paloaltonetworks.com/muddled-libra-evolution-to-cloud/
    - https://aws.permissions.cloud/iam/secretsmanager#secretsmanager-DescribeSecret
    - https://traildiscover.cloud/#SecretsManager-DescribeSecret
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.credential-access
    - attack.t1555 #Credentials from Password Stores
    - attack.t1555.006 #Credentials from Password Stores: Cloud Secrets Management Stores
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: secretsmanager.amazonaws.com
        eventName: DescribeSecret
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Routine enumeration by administrators, monitoring/inventory tools, or the AWS Console and SDKs.
    - Security, backup, or cost-management tooling that periodically reads this resource.
level: medium
