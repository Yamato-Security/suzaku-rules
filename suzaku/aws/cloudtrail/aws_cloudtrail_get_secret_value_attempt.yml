title: AWS SecretsManager GetSecretValue Attempt
id: c697d092-f0e2-5dcd-85ea-aef2bccb0e02
status: experimental
description: |
    Retrieves the contents of the encrypted fields SecretString or SecretBinary from the specified version of a secret, whichever contains content.
    Security implications: Attackers might use GetSecretValue to illicitly access sensitive information stored in the SecretsManager.
    Observed in real-world incidents/reporting, e.g.: LUCR-3: SCATTERED SPIDER GETTING SAAS-Y IN THE CLOUD; Muddled Libra’s Evolution to the Cloud; Cloud-Conscious Tactics, Techniques,and Procedures (TTPs); Investigating Suspected DPRK-Linked Crypto Intrusions.
references:
    - https://permiso.io/blog/lucr-3-scattered-spider-getting-saas-y-in-the-cloud
    - https://unit42.paloaltonetworks.com/muddled-libra-evolution-to-cloud/
    - https://fwdcloudsec.org/assets/presentations/2024/europe/sebastian-walla-cloud-conscious-tactics-techniques-and-procedures-an-overview.pdf
    - https://ctrlaltintel.com/threat%20research/DPRK-Crypto-Heist/
    - https://aws.permissions.cloud/iam/secretsmanager#secretsmanager-GetSecretValue
    - https://traildiscover.cloud/#SecretsManager-GetSecretValue
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.credential-access
    - attack.t1555 #Credentials from Password Stores
    - attack.t1555.006 #Credentials from Password Stores: Cloud Secrets Management Stores
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: secretsmanager.amazonaws.com
        eventName: GetSecretValue
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Routine enumeration by administrators, monitoring/inventory tools, or the AWS Console and SDKs.
    - Security, backup, or cost-management tooling that periodically reads this resource.
level: medium
