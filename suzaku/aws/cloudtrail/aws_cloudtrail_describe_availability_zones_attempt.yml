title: AWS EC2 DescribeAvailabilityZones Attempt
id: 30d8b3f4-d04b-5c61-8f42-93b5e81f91c1
status: experimental
description: |
    Failed or denied attempt to call DescribeAvailabilityZones — the request returned an error, so the action did not complete. A failed attempt can indicate an adversary probing permissions, a misconfigured tool, or an incomplete attack.
    Describes the Availability Zones, Local Zones, and Wavelength Zones that are available to you.
    Security implications: Attackers might use DescribeAvailabilityZones to map the deployment regions of an AWS environment.
    Ex: aws ec2 describe-availability-zones --filters Name=region-name,Values=TrailDiscoverRegion
    Observed in real-world incidents/reporting, e.g.: Compromised Cloud Compute Credentials: Case Studies From the Wild; Crimson Collective: A New Threat Group Observed Operating in the Cloud.
references:
    - https://unit42.paloaltonetworks.com/compromised-cloud-compute-credentials/#post-125981-_kdq0vw6banab
    - https://www.rapid7.com/blog/post/tr-crimson-collective-a-new-threat-group-observed-operating-in-the-cloud/
    - https://aws.permissions.cloud/iam/ec2#ec2-DescribeAvailabilityZones
    - https://traildiscover.cloud/#EC2-DescribeAvailabilityZones
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.discovery
    - attack.t1580 #Cloud Infrastructure Discovery
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: ec2.amazonaws.com
        eventName: DescribeAvailabilityZones
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Routine enumeration by administrators, monitoring/inventory tools, or the AWS Console and SDKs.
    - Security, backup, or cost-management tooling that periodically reads this resource.
level: informational
