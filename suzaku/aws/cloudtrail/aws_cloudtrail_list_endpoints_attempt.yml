title: AWS SageMaker ListEndpoints Attempt
id: 8ada9dca-623d-5f62-ab2f-95f0c2dbb643
status: experimental
description: |
    Failed or denied attempt to call ListEndpoints — the request returned an error, so the action did not complete. A failed attempt can indicate an adversary probing permissions, a misconfigured tool, or an incomplete attack.
    Lists endpoints.
    Security implications: Attackers might use ListEndpoints to find live ML services that can be hijacked for inference abuse, data theft, or service disruption.
    Ex: aws sagemaker list-endpoints
    Observed in real-world incidents/reporting, e.g.: AI-assisted cloud intrusion achieves admin access in 8 minutes.
references:
    - https://www.sysdig.com/blog/ai-assisted-cloud-intrusion-achieves-admin-access-in-8-minutes
    - https://aws.permissions.cloud/iam/sagemaker#sagemaker-ListEndpoints
    - https://traildiscover.cloud/#SageMaker-ListEndpoints
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.discovery
    - attack.t1580 #Cloud Infrastructure Discovery
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: sagemaker.amazonaws.com
        eventName: ListEndpoints
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Routine enumeration by administrators, monitoring/inventory tools, or the AWS Console and SDKs.
    - Security, backup, or cost-management tooling that periodically reads this resource.
level: informational
