title: AWS SNS ListTopics
id: 470c5757-f92b-5604-93f9-3cf0795ef82a
status: experimental
description: |
    Returns a list of the requester's topics.
    Security implications: Attackers might use ListTopics to identify potential SNS topics for unauthorized access or disruption.
    Ex: aws sns list-topics
references:
    - https://permiso.io/blog/s/smishing-attack-on-aws-sms-new-phone-who-dis/
    - https://aws.permissions.cloud/iam/sns#sns-ListTopics
    - https://traildiscover.cloud/#SNS-ListTopics
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.discovery
    - attack.t1580 #Cloud Infrastructure Discovery
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: sns.amazonaws.com
        eventName: ListTopics
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and not (error_code or error_msg)
falsepositives:
    - Routine enumeration by administrators, monitoring/inventory tools, or the AWS Console and SDKs.
    - Security, backup, or cost-management tooling that periodically reads this resource.
level: informational
