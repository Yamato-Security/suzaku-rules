title: AWS EC2 DescribeSnapshotTierStatus Attempt
id: e16fbbb2-9c8a-511c-9b52-20271ed37743
status: experimental
description: |
    Failed or denied attempt to call DescribeSnapshotTierStatus — the request returned an error, so the action did not complete. A failed attempt can indicate an adversary probing permissions, a misconfigured tool, or an incomplete attack.
    Describes the storage tier status of one or more Amazon EBS snapshots.
    Security implications: Attackers might use DescribeSnapshotTierStatus to assess the tiering status and potential lifecycle transitions of EBS snapshots, seeking to identify snapshots that are less frequently accessed or potentially unmonitored.
    Ex: aws ec2 describe-snapshot-tier-status
    Observed in real-world incidents/reporting, e.g.: Compromised Cloud Compute Credentials: Case Studies From the Wild.
references:
    - https://unit42.paloaltonetworks.com/compromised-cloud-compute-credentials/#post-125981-_kdq0vw6banab
    - https://aws.permissions.cloud/iam/ec2#ec2-DescribeSnapshotTierStatus
    - https://traildiscover.cloud/#EC2-DescribeSnapshotTierStatus
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.discovery
    - attack.t1580 #Cloud Infrastructure Discovery
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: ec2.amazonaws.com
        eventName: DescribeSnapshotTierStatus
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Routine enumeration by administrators, monitoring/inventory tools, or the AWS Console and SDKs.
    - Security, backup, or cost-management tooling that periodically reads this resource.
level: informational
