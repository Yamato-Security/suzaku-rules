title: AWS Config DeleteConfigRule Attempt
id: ea74c1cf-7dfa-59c8-82ae-dd8bb6e8a31f
status: experimental
description: |
    Failed or denied attempt to call DeleteConfigRule — the request returned an error, so the action did not complete. A failed attempt can indicate an adversary probing permissions, a misconfigured tool, or an incomplete attack.
    Deletes the specified AWS Config rule and all of its evaluation results.
    Security implications: Attackers might use DeleteConfigRule to remove compliance rules, potentially affecting the response plan.
    Ex: aws configservice delete-config-rule --config-rule-name TrailDiscoverConfigRule
references:
    - https://www.elastic.co/guide/en/security/7.17/prebuilt-rule-7-16-4-aws-config-resource-deletion.html#prebuilt-rule-7-16-4-aws-config-resource-deletion
    - https://aws.permissions.cloud/iam/config#config-DeleteConfigRule
    - https://traildiscover.cloud/#Config-DeleteConfigRule
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.defense-evasion
    - attack.t1562 #Impair Defenses
    - attack.t1562.001 #Impair Defenses: Disable or Modify Tools
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: config.amazonaws.com
        eventName: DeleteConfigRule
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Planned decommissioning, cleanup, or teardown by administrators or CI/CD.
    - Infrastructure-as-code (Terraform, CloudFormation, CDK) destroying or replacing resources.
level: medium
