title: AWS APIGateway CreateIntegration Attempt
id: 537821a4-a846-5dc6-8530-d2e36ea38014
status: experimental
description: |
    Failed or denied attempt to call CreateIntegration — the request returned an error, so the action did not complete. A failed attempt can indicate an adversary probing permissions, a misconfigured tool, or an incomplete attack.
    Creates an Integration. An Integration is a configuration that specifies the backend endpoint for an API route.
    Security implications: Attackers might use CreateIntegration to create malicious integrations that can be used to establish persistence in the environment.
    Observed in real-world incidents/reporting, e.g.: Tales from the cloud trenches: The Attacker doth persist too much, methinks.
references:
    - https://securitylabs.datadoghq.com/articles/tales-from-the-cloud-trenches-the-attacker-doth-persist-too-much/
    - https://aws.permissions.cloud/iam/apigateway#apigateway-POST
    - https://traildiscover.cloud/#APIGateway-CreateIntegration
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.persistence
    - attack.t1136 #Create Account
    - attack.t1136.003 #Create Account: Cloud Account
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: apigateway.amazonaws.com
        eventName: CreateIntegration
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Legitimate provisioning or configuration changes by administrators or CI/CD pipelines.
    - Infrastructure-as-code (Terraform, CloudFormation, CDK, Pulumi) applying changes.
level: low
