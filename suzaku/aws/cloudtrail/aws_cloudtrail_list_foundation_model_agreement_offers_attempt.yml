title: AWS Bedrock ListFoundationModelAgreementOffers Attempt
id: 981e82d3-bafa-52f1-a0b4-d7cd3156d11e
status: experimental
description: |
    Failed or denied attempt to call ListFoundationModelAgreementOffers — the request returned an error, so the action did not complete. A failed attempt can indicate an adversary probing permissions, a misconfigured tool, or an incomplete attack.
    Grants permission to get a list of foundation model agreement offers.
    Security implications: Attackers might use ListFoundationModelAgreementOffers to enumerate accessible models.
    Observed in real-world incidents/reporting, e.g.: Detecting AI resource-hijacking with Composite Alerts.
references:
    - https://www.lacework.com/blog/detecting-ai-resource-hijacking-with-composite-alerts
    - https://aws.permissions.cloud/iam/bedrock#bedrock-ListFoundationModelAgreementOffers
    - https://traildiscover.cloud/#Bedrock-ListFoundationModelAgreementOffers
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.discovery
    - attack.t1580 #Cloud Infrastructure Discovery
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: bedrock.amazonaws.com
        eventName: ListFoundationModelAgreementOffers
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Routine enumeration by administrators, monitoring/inventory tools, or the AWS Console and SDKs.
    - Security, backup, or cost-management tooling that periodically reads this resource.
level: informational
