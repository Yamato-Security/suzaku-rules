title: AWS ECR GetAuthorizationToken
id: cf9f92dd-4d68-59e0-994f-3ea3ec634cb2
status: experimental
description: |
    Retrieves an authorization token that can be used to authenticate to an Amazon ECR registry.

    Security implications: Attackers might use GetAuthorizationToken to authenticate a Docker client to Amazon ECR, enabling them to pull private container images containing proprietary code and secrets.

    Observed in real-world incidents/reporting, e.g.: Investigating Suspected DPRK-Linked Crypto Intrusions.
references:
    - https://ctrlaltintel.com/threat%20research/DPRK-Crypto-Heist/
    - https://aws.permissions.cloud/iam/ecr#ecr-GetAuthorizationToken
    - https://traildiscover.cloud/#ECR-GetAuthorizationToken
author: Adan Alvarez (@adanalvarez), Yamato Security
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.credential-access
    - attack.t1528 #Steal Application Access Token
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: ecr.amazonaws.com
        eventName: GetAuthorizationToken
    condition: selection
falsepositives:
level: medium
