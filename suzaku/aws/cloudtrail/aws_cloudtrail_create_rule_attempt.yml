title: AWS ELBv2 CreateRule Attempt
id: 6b4ec699-0e26-5ed6-a1c8-7e7d48cb53d3
status: experimental
description: |
    Failed or denied attempt to call CreateRule — the request returned an error, so the action did not complete. A failed attempt can indicate an adversary probing permissions, a misconfigured tool, or an incomplete attack.
    Creates a rule for the specified listener.
    Security implications: Attackers might use CreateRule to add rules that allow them access bypassing potential restrictions such as authentication.
    Ex: aws elbv2 create-rule --listener-arn arn:aws:elasticloadbalancing:us-west-2:123456789012:listener/app/my-load-balancer/50dc6c495c0c9188/f2f7dc8efc522ab2 --priority 5 --actions Type=forward,TargetGroupArn=arn:aws:elasticloadbalancing:us-west-2:123456789012:targetgroup/my-targets/73e2d6bc24d8a067 --conditions '[{}]'
references:
    - https://medium.com/@adan.alvarez/rigging-the-rules-manipulating-aws-alb-to-mine-sensitive-data-20e33dbc4994
    - https://aws.permissions.cloud/iam/elasticloadbalancing#elasticloadbalancing-CreateRule
    - https://traildiscover.cloud/#ELBv2-CreateRule
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.defense-evasion
    - attack.t1578 #Modify Cloud Compute Infrastructure
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: elasticloadbalancing.amazonaws.com
        eventName: CreateRule
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Legitimate provisioning or configuration changes by administrators or CI/CD pipelines.
    - Infrastructure-as-code (Terraform, CloudFormation, CDK, Pulumi) applying changes.
level: medium
