title: AWS IAM ListSAMLProviders
id: 83c5da75-d801-5c0d-a6ad-bfefce5b08ea
status: experimental
description: |
    Lists the SAML provider resource objects defined in IAM in the account.
    Security implications: Attackers might use ListSAMLProviders to discover if there are SAML providers configured.
    Observed in real-world incidents/reporting, e.g.: Muddled Libra’s Evolution to the Cloud.
references:
    - https://unit42.paloaltonetworks.com/muddled-libra-evolution-to-cloud/
    - https://aws.permissions.cloud/iam/iam#iam-ListSAMLProviders
    - https://traildiscover.cloud/#IAM-ListSAMLProviders
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.discovery
    - attack.t1087 #Account Discovery
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: iam.amazonaws.com
        eventName: ListSAMLProviders
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and not (error_code or error_msg)
falsepositives:
    - Routine enumeration by administrators, monitoring/inventory tools, or the AWS Console and SDKs.
    - Security, backup, or cost-management tooling that periodically reads this resource.
level: informational
