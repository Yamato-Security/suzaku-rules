title: AWS SES PutAccountDetails Attempt
id: 69bca6b1-914b-5a15-b196-f3557e8d40b9
status: experimental
description: |
    Failed or denied attempt to call PutAccountDetails — the request returned an error, so the action did not complete. A failed attempt can indicate an adversary probing permissions, a misconfigured tool, or an incomplete attack.
    Update your Amazon SES account details.
    Security implications: Attackers might use PutAccountDetails to push the SES account into production mode.
    Observed in real-world incidents/reporting, e.g.: From Compromised Keys to Phishing Campaigns: Inside a Cloud Email Service Takeover.
references:
    - https://www.wiz.io/blog/wiz-discovers-cloud-email-abuse-campaign
    - https://aws.permissions.cloud/iam/ses#ses-GetAccount
    - https://traildiscover.cloud/#SES-PutAccountDetails
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.defense-evasion
    - attack.t1578 #Modify Cloud Compute Infrastructure
    - attack.t1578.005 #Modify Cloud Compute Infrastructure: Modify Cloud Account Settings
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: ses.amazonaws.com
        eventName: PutAccountDetails
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Legitimate provisioning or configuration changes by administrators or CI/CD pipelines.
    - Infrastructure-as-code (Terraform, CloudFormation, CDK, Pulumi) applying changes.
level: medium
