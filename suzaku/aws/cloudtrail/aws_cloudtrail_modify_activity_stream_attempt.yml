title: AWS RDS ModifyActivityStream Attempt
id: 36206886-23cd-57d3-8d1b-653bdfcc3bac
status: experimental
description: |
    Failed or denied attempt to call ModifyActivityStream — the request returned an error, so the action did not complete. A failed attempt can indicate an adversary probing permissions, a misconfigured tool, or an incomplete attack.
    Changes the audit policy state of a database activity stream to either locked (default) or unlocked.
    Security implications: Attackers might use ModifyActivityStream to alter the configuration of the activity stream, potentially hiding malicious activities or causing disruptions in the database operations.
    Observed in real-world incidents/reporting, e.g.: Uncovering Hybrid Cloud Attacks Through Intelligence-Driven Incident Response: Part 3 – The Response.
references:
    - https://www.gem.security/post/uncovering-hybrid-cloud-attacks-through-intelligence-driven-incident-response-part-3-the-response
    - https://aws.permissions.cloud/iam/rds#rds-ModifyActivityStream
    - https://traildiscover.cloud/#RDS-ModifyActivityStream
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.defense-evasion
    - attack.t1578 #Modify Cloud Compute Infrastructure
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: rds.amazonaws.com
        eventName: ModifyActivityStream
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Legitimate provisioning or configuration changes by administrators or CI/CD pipelines.
    - Infrastructure-as-code (Terraform, CloudFormation, CDK, Pulumi) applying changes.
level: medium
