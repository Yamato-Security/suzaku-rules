title: AWS EC2 ModifySnapshotAttribute
id: c58867e7-cf89-51a0-a075-7e14060d9c4d
status: experimental
description: |
    Adds or removes permission settings for the specified snapshot.
    Security implications: Attackers might use ModifySnapshotAttribute to change permissions on Amazon EBS snapshots, potentially making them accessible to unauthorized users or public.
    Ex: aws ec2 modify-snapshot-attribute --snapshot-id snap-046281ab24d756c50 --attribute createVolumePermission --operation-type remove --user-ids 123456789012
    Observed in real-world incidents/reporting, e.g.: CrowdStrike’s work with the Democratic National Committee: Setting the record straight.
references:
    - https://www.crowdstrike.com/blog/bears-midst-intrusion-democratic-national-committee/
    - https://stratus-red-team.cloud/attack-techniques/AWS/aws.exfiltration.ec2-share-ebs-snapshot
    - https://aws.permissions.cloud/iam/ec2#ec2-ModifySnapshotAttribute
    - https://traildiscover.cloud/#EC2-ModifySnapshotAttribute
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.exfiltration
    - attack.t1537 #Transfer Data to Cloud Account
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: ec2.amazonaws.com
        eventName: ModifySnapshotAttribute
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and not (error_code or error_msg)
falsepositives:
    - Legitimate provisioning or configuration changes by administrators or CI/CD pipelines.
    - Infrastructure-as-code (Terraform, CloudFormation, CDK, Pulumi) applying changes.
level: high
