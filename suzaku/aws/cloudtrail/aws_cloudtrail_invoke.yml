title: AWS Lambda Invoke
id: 08e9db80-e732-537d-8023-4d22bb830691
status: experimental
description: |
    Invokes a Lambda function.
    Security implications: Attackers might use Invoke to execute previously modified functions in AWS Lambda.
    Observed in real-world incidents/reporting, e.g.: Mining Crypto; Cloud Security Stories: From Risky Permissions to Ransomware Execution; AI-assisted cloud intrusion achieves admin access in 8 minutes.
references:
    - https://twitter.com/jonnyplatt/status/1471453527390277638
    - https://sonraisecurity.com/blog/cloud-security-stories-from-risky-permissions-to-ransomware-execution/
    - https://www.sysdig.com/blog/ai-assisted-cloud-intrusion-achieves-admin-access-in-8-minutes
    - https://hackingthe.cloud/aws/exploitation/iam_privilege_escalation/
    - https://aws.permissions.cloud/iam/lambda#lambda-InvokeFunction
    - https://traildiscover.cloud/#Lambda-Invoke
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.impact
    - attack.privilege-escalation
    - attack.t1496 #Resource Hijacking
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: lambda.amazonaws.com
        eventName: Invoke
    condition: selection
falsepositives:
level: medium
