title: AWS S3 GetObject
id: b544d93d-8485-5b9f-aa3a-162229470680
status: experimental
description: |
    Retrieves an object from Amazon S3.
    Security implications: Attackers might use GetObject to download data from S3 buckets.
    Observed in real-world incidents/reporting, e.g.: Ransomware in the cloud; Tales from the cloud trenches: Amazon ECS is the new EC2 for crypto mining; Incident 2 - Additional details of the attack; Aruba Central Security Incident; Sendtech Pte. Ltd; GotRoot! AWS root Account Takeover.
