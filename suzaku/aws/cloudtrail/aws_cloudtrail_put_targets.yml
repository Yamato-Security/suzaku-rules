title: AWS events PutTargets
id: c96b6ee8-25f8-58a0-a90b-e059319ed38c
status: experimental
description: |
    Adds the specified targets to the specified rule, or updates the targets if they are already associated with the rule.
    Security implications: Attackers might use PutTargets in AWS EventBridge to trigger a malicious Lambda function periodically.
    Observed in real-world incidents/reporting, e.g.: Cloud Security Stories: From Risky Permissions to Ransomware Execution.
references:
    - https://sonraisecurity.com/blog/cloud-security-stories-from-risky-permissions-to-ransomware-execution/
    - https://aws.permissions.cloud/iam/events#events-PutTargets
    - https://traildiscover.cloud/#events-PutTargets
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.persistence
    - attack.t1546 #Event Triggered Execution
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: events.amazonaws.com
        eventName: PutTargets
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and not (error_code or error_msg)
falsepositives:
    - Legitimate provisioning or configuration changes by administrators or CI/CD pipelines.
    - Infrastructure-as-code (Terraform, CloudFormation, CDK, Pulumi) applying changes.
level: medium
