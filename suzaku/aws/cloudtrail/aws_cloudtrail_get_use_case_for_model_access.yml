title: AWS Bedrock GetUseCaseForModelAccess
id: edd09a18-6acf-546c-935c-dbacadf604f8
status: experimental
description: |
    Grants permission to retrieve a use case for model access.
    Security implications: Attackers might use GetUseCaseForModelAccess to enumerate accessible models.
    Observed in real-world incidents/reporting, e.g.: Detecting AI resource-hijacking with Composite Alerts; When AI Gets Hijacked: Exploiting Hosted Models for Dark Roleplaying.
references:
    - https://www.lacework.com/blog/detecting-ai-resource-hijacking-with-composite-alerts
    - https://permiso.io/blog/exploiting-hosted-models
    - https://aws.permissions.cloud/iam/bedrock#bedrock-GetUseCaseForModelAccess
    - https://traildiscover.cloud/#Bedrock-GetUseCaseForModelAccess
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.discovery
    - attack.t1580 #Cloud Infrastructure Discovery
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: bedrock.amazonaws.com
        eventName: GetUseCaseForModelAccess
    condition: selection
falsepositives:
level: low
