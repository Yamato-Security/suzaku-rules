title: AWS EC2 AttachVolume Attempt
id: d24191ae-6b67-53c3-825e-c3a0c4265a19
status: experimental
description: |
    Attaches an EBS volume to a running or stopped instance and exposes it to the instance with the specified device name.
    Security implications: Attackers might use AttachVolume to mount a volume to an EC2 instance under their control.
    Observed in real-world incidents/reporting, e.g.: Navigating the Cloud: Exploring Lateral Movement Techniques; Crimson Collective: A New Threat Group Observed Operating in the Cloud.
references:
    - https://unit42.paloaltonetworks.com/cloud-lateral-movement-techniques/
    - https://www.rapid7.com/blog/post/tr-crimson-collective-a-new-threat-group-observed-operating-in-the-cloud/
    - https://aws.permissions.cloud/iam/ec2#ec2-AttachVolume
    - https://traildiscover.cloud/#EC2-AttachVolume
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.lateral-movement
    - attack.t1021 #Remote Services
    - attack.t1021.007 #Remote Services: Cloud Services
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: ec2.amazonaws.com
        eventName: AttachVolume
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Legitimate provisioning or configuration changes by administrators or CI/CD pipelines.
    - Infrastructure-as-code (Terraform, CloudFormation, CDK, Pulumi) applying changes.
level: low
