title: AWS SNS GetSMSAttributes Attempt
id: d1778a24-b462-5048-b594-74124be9eaad
status: experimental
description: |
    Returns the settings for sending SMS messages from your AWS account.
    Security implications: Attackers might use GetSMSAttributes to retrieve sensitive SMS configuration details for potential usage for smishing.
    Observed in real-world incidents/reporting, e.g.: NEW PHONE, WHO DIS? HOW CLOUD ENVIRONMENTS ARE EXPLOITED FOR SMISHING CAMPAIGNS; Tales from the cloud trenches: Using malicious AWS activity to spot phishing campaigns; Crimson Collective: A New Threat Group Observed Operating in the Cloud.
references:
    - https://permiso.io/blog/s/smishing-attack-on-aws-sms-new-phone-who-dis/
    - https://securitylabs.datadoghq.com/articles/tales-from-the-cloud-trenches-aws-activity-to-phishing/
    - https://www.rapid7.com/blog/post/tr-crimson-collective-a-new-threat-group-observed-operating-in-the-cloud/
    - https://securitylabs.datadoghq.com/articles/following-attackers-trail-in-aws-methodology-findings-in-the-wild/
    - https://aws.permissions.cloud/iam/sns#sns-GetSMSAttributes
    - https://traildiscover.cloud/#SNS-GetSMSAttributes
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.discovery
    - attack.t1580 #Cloud Infrastructure Discovery
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: sns.amazonaws.com
        eventName: GetSMSAttributes
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Routine enumeration by administrators, monitoring/inventory tools, or the AWS Console and SDKs.
    - Security, backup, or cost-management tooling that periodically reads this resource.
level: informational
