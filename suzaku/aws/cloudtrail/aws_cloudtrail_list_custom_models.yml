title: AWS Bedrock ListCustomModels
id: 28627fc2-323e-56d7-aa1e-64e777376234
status: experimental
description: |
    Returns a list of the custom models that you have created with the CreateModelCustomizationJob operation.
    Security implications: Attackers might use ListCustomModels to discover proprietary fine-tunes worth stealing or sabotaging and to gauge potential GPU spend to hijack.
    Ex: aws bedrock list-custom-models
    Observed in real-world incidents/reporting, e.g.: AI-assisted cloud intrusion achieves admin access in 8 minutes.
references:
    - https://www.sysdig.com/blog/ai-assisted-cloud-intrusion-achieves-admin-access-in-8-minutes
    - https://aws.permissions.cloud/iam/bedrock#bedrock-ListCustomModels
    - https://traildiscover.cloud/#Bedrock-ListCustomModels
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.discovery
    - attack.t1580 #Cloud Infrastructure Discovery
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: bedrock.amazonaws.com
        eventName: ListCustomModels
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and not (error_code or error_msg)
falsepositives:
    - Routine enumeration by administrators, monitoring/inventory tools, or the AWS Console and SDKs.
    - Security, backup, or cost-management tooling that periodically reads this resource.
level: informational
