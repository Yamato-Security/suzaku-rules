title: AWS IAM ListAttachedUserPolicies Attempt
id: 656fb76f-5ea9-5c7f-8f6f-499cf08b1bb6
status: experimental
description: |
    Failed or denied attempt to call ListAttachedUserPolicies — the request returned an error, so the action did not complete. A failed attempt can indicate an adversary probing permissions, a misconfigured tool, or an incomplete attack.
    Lists all managed policies that are attached to the specified IAM user.
    Security implications: Attackers might use ListAttachedUserPolicies to identify and exploit permissions associated with various users in AWS.
    Observed in real-world incidents/reporting, e.g.: Datadog threat roundup: top insights for Q4 2024.
references:
    - https://securitylabs.datadoghq.com/articles/2024-q4-threat-roundup/
    - https://aws.permissions.cloud/iam/iam#iam-ListAttachedUserPolicies
    - https://traildiscover.cloud/#IAM-ListAttachedUserPolicies
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.discovery
    - attack.t1087 #Account Discovery
    - attack.t1087.004 #Account Discovery: Cloud Account
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: iam.amazonaws.com
        eventName: ListAttachedUserPolicies
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Routine enumeration by administrators, monitoring/inventory tools, or the AWS Console and SDKs.
    - Security, backup, or cost-management tooling that periodically reads this resource.
level: informational
