title: AWS SES DeleteIdentity Attempt
id: 94181b87-923c-5fda-a61c-22a00c43fd43
status: experimental
description: |
    Failed or denied attempt to call DeleteIdentity — the request returned an error, so the action did not complete. A failed attempt can indicate an adversary probing permissions, a misconfigured tool, or an incomplete attack.
    Deletes the specified identity (an email address or a domain) from the list of verified identities.
    Security implications: Attackers might use DeleteIdentity to disrupt email sending capabilities or delete an identity previously used attackers.
    Observed in real-world incidents/reporting, e.g.: Compromised Cloud Compute Credentials: Case Studies From the Wild.
references:
    - https://unit42.paloaltonetworks.com/compromised-cloud-compute-credentials/#post-125981-_kdq0vw6banab
    - https://aws.permissions.cloud/iam/ses#ses-DeleteIdentity
    - https://traildiscover.cloud/#SES-DeleteIdentity
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.defense-evasion
    - attack.t1578 #Modify Cloud Compute Infrastructure
    - attack.t1070 #Indicator Removal
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: ses.amazonaws.com
        eventName: DeleteIdentity
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Planned decommissioning, cleanup, or teardown by administrators or CI/CD.
    - Infrastructure-as-code (Terraform, CloudFormation, CDK) destroying or replacing resources.
level: medium
