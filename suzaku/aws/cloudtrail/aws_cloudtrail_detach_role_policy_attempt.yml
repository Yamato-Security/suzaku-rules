title: AWS IAM DetachRolePolicy Attempt
id: 098a0e05-3e7e-5031-9fde-c2c2117ca6c9
status: experimental
description: |
    Failed or denied attempt to call DetachRolePolicy — the request returned an error, so the action did not complete. A failed attempt can indicate an adversary probing permissions, a misconfigured tool, or an incomplete attack.
    Removes the specified managed policy from the specified role.
    Security implications: Attackers might use DetachRolePolicy to remove crucial permissions from IAM roles, disrupting AWS services.
    Observed in real-world incidents/reporting, e.g.: The curious case of DangerDev@protonmail.me.
references:
    - https://www.invictus-ir.com/news/the-curious-case-of-dangerdev-protonmail-me
    - https://hackingthe.cloud/aws/exploitation/iam_privilege_escalation/
    - https://aws.permissions.cloud/iam/iam#iam-DetachRolePolicy
    - https://traildiscover.cloud/#IAM-DetachRolePolicy
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.defense-evasion
    - attack.privilege-escalation
    - attack.t1578 #Modify Cloud Compute Infrastructure
    - attack.t1098 #Account Manipulation
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: iam.amazonaws.com
        eventName: DetachRolePolicy
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Planned decommissioning, cleanup, or teardown by administrators or CI/CD.
    - Infrastructure-as-code (Terraform, CloudFormation, CDK) destroying or replacing resources.
level: medium
