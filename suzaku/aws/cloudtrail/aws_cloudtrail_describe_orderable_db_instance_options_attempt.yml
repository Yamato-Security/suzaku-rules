title: AWS RDS DescribeOrderableDBInstanceOptions Attempt
id: 3a65dbe5-ef02-516f-9a62-730cba889a34
status: experimental
description: |
    Failed or denied attempt to call DescribeOrderableDBInstanceOptions — the request returned an error, so the action did not complete. A failed attempt can indicate an adversary probing permissions, a misconfigured tool, or an incomplete attack.
    Describes the orderable DB instance options for a specified DB engine.
    Security implications: Available instance classes may inform cost/resource abuse strategies.
    Ex: aws rds describe-orderable-db-instance-options --engine mysql --max-items 5
    Observed in real-world incidents/reporting, e.g.: Crimson Collective: A New Threat Group Observed Operating in the Cloud.
references:
    - https://www.rapid7.com/blog/post/tr-crimson-collective-a-new-threat-group-observed-operating-in-the-cloud/
    - https://aws.permissions.cloud/iam/rds#rds-DescribeOrderableDBInstanceOptions
    - https://traildiscover.cloud/#RDS-DescribeOrderableDBInstanceOptions
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.discovery
    - attack.t1580 #Cloud Infrastructure Discovery
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: rds.amazonaws.com
        eventName: DescribeOrderableDBInstanceOptions
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Routine enumeration by administrators, monitoring/inventory tools, or the AWS Console and SDKs.
    - Security, backup, or cost-management tooling that periodically reads this resource.
level: informational
