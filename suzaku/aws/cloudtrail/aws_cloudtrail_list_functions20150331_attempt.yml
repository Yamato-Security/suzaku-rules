title: AWS Lambda ListFunctions20150331 Attempt
id: ca383e16-301b-55f0-b3b1-6dd5c37aa91b
status: experimental
description: |
    Failed or denied attempt to call ListFunctions20150331 — the request returned an error, so the action did not complete. A failed attempt can indicate an adversary probing permissions, a misconfigured tool, or an incomplete attack.
    Returns a list of Lambda functions, with the version-specific configuration of each.
    Security implications: Attackers might use ListFunctions to enumerate Lambda functions, identifying targets that may contain hardcoded secrets or have overly permissive IAM roles attached.
    Observed in real-world incidents/reporting, e.g.: Investigating Suspected DPRK-Linked Crypto Intrusions.
references:
    - https://ctrlaltintel.com/threat%20research/DPRK-Crypto-Heist/
    - https://aws.permissions.cloud/iam/lambda#lambda-ListFunctions
    - https://traildiscover.cloud/#Lambda-ListFunctions20150331
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.discovery
    - attack.t1526 #Cloud Service Discovery
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: lambda.amazonaws.com
        eventName: ListFunctions20150331
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Routine enumeration by administrators, monitoring/inventory tools, or the AWS Console and SDKs.
    - Security, backup, or cost-management tooling that periodically reads this resource.
level: informational
