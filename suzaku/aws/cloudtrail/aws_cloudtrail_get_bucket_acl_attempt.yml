title: AWS S3 GetBucketAcl Attempt
id: f883d970-d2d6-5553-a530-daf13355fa41
status: experimental
description: |
    Failed or denied attempt to call GetBucketAcl — the request returned an error, so the action did not complete. A failed attempt can indicate an adversary probing permissions, a misconfigured tool, or an incomplete attack.
    This implementation of the GET action uses the acl subresource to return the access control list (ACL) of a bucket.
    Security implications: Attackers might use GetBucketAccessControlPolicy to gain unauthorized access to sensitive data stored in S3 buckets.
    Ex: aws s3api get-bucket-acl --bucket TrailDiscoverBucket
    Observed in real-world incidents/reporting, e.g.: Muddled Libra’s Evolution to the Cloud; Leaked Environment Variables Allow Large-Scale Extortion Operation in Cloud Environments.
references:
    - https://unit42.paloaltonetworks.com/muddled-libra-evolution-to-cloud/
    - https://unit42.paloaltonetworks.com/large-scale-cloud-extortion-operation/
    - https://securitylabs.datadoghq.com/cloud-security-atlas/vulnerabilities/s3-bucket-public-acl/
    - https://aws.permissions.cloud/iam/s3#s3-GetBucketAcl
    - https://traildiscover.cloud/#S3-GetBucketAcl
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.discovery
    - attack.t1526 #Cloud Service Discovery
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: s3.amazonaws.com
        eventName: GetBucketAcl
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Routine enumeration by administrators, monitoring/inventory tools, or the AWS Console and SDKs.
    - Security, backup, or cost-management tooling that periodically reads this resource.
level: informational
