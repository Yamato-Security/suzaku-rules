title: AWS Bedrock ListProvisionedModelThroughputs
id: c23dc06a-bc8f-5cc6-a4bb-d00305a21372
status: experimental
description: |
    Grants permission to list provisioned model throughputs that you created earlier.
    Security implications: Attackers might use ListProvisionedModelThroughputs to gather information on existing inputs and outputs for models in use.
    Observed in real-world incidents/reporting, e.g.: Detecting AI resource-hijacking with Composite Alerts; AI-assisted cloud intrusion achieves admin access in 8 minutes.
references:
    - https://www.lacework.com/blog/detecting-ai-resource-hijacking-with-composite-alerts
    - https://www.sysdig.com/blog/ai-assisted-cloud-intrusion-achieves-admin-access-in-8-minutes
    - https://aws.permissions.cloud/iam/bedrock#bedrock-ListProvisionedModelThroughputs
    - https://traildiscover.cloud/#Bedrock-ListProvisionedModelThroughputs
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.discovery
    - attack.t1580 #Cloud Infrastructure Discovery
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: bedrock.amazonaws.com
        eventName: ListProvisionedModelThroughputs
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and not (error_code or error_msg)
falsepositives:
    - Routine enumeration by administrators, monitoring/inventory tools, or the AWS Console and SDKs.
    - Security, backup, or cost-management tooling that periodically reads this resource.
level: informational
