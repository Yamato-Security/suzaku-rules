title: AWS Bedrock ListKnowledgeBases Attempt
id: c636d927-928c-5883-a6b2-38b0c4a123f2
status: experimental
description: |
    Failed or denied attempt to call ListKnowledgeBases — the request returned an error, so the action did not complete. A failed attempt can indicate an adversary probing permissions, a misconfigured tool, or an incomplete attack.
    Lists the knowledge bases in an account. The list also includes information about each knowledge base.
    Security implications: Attackers might use ListKnowledgeBases to identify connected data repositories and prioritize follow-on data theft or sabotage.
    Observed in real-world incidents/reporting, e.g.: AI-assisted cloud intrusion achieves admin access in 8 minutes.
references:
    - https://www.sysdig.com/blog/ai-assisted-cloud-intrusion-achieves-admin-access-in-8-minutes
    - https://aws.permissions.cloud/iam/bedrock#bedrock-ListKnowledgeBases
    - https://traildiscover.cloud/#Bedrock-ListKnowledgeBases
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.discovery
    - attack.t1580 #Cloud Infrastructure Discovery
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: bedrock.amazonaws.com
        eventName: ListKnowledgeBases
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Routine enumeration by administrators, monitoring/inventory tools, or the AWS Console and SDKs.
    - Security, backup, or cost-management tooling that periodically reads this resource.
level: informational
