title: AWS IAM ListSigningCertificates Attempt
id: c147d7cc-d954-5f96-9b93-365d8382fb4e
status: experimental
description: |
    Returns information about the signing certificates associated with the specified IAM user.
    Security implications: Attackers might use ListSigningCertificates to review which users have active certificates
    Observed in real-world incidents/reporting, e.g.: Muddled Libra’s Evolution to the Cloud.
references:
    - https://unit42.paloaltonetworks.com/muddled-libra-evolution-to-cloud/
    - https://aws.permissions.cloud/iam/iam#iam-ListSigningCertificates
    - https://traildiscover.cloud/#IAM-ListSigningCertificates
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.discovery
    - attack.t1087 #Account Discovery
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: iam.amazonaws.com
        eventName: ListSigningCertificates
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Routine enumeration by administrators, monitoring/inventory tools, or the AWS Console and SDKs.
    - Security, backup, or cost-management tooling that periodically reads this resource.
level: informational
