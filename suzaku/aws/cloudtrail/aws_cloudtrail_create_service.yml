title: AWS ECS CreateService
id: abe49692-b17c-5710-bb82-bc19a7d4ee32
status: experimental
description: |
    Runs and maintains your desired number of tasks from a specified task definition.
    Security implications: Attackers might use CreateService in AWS ECS to orchestrate and deploy unauthorized services, potentially for malicious activities such as resource hijacking.
    Observed in real-world incidents/reporting, e.g.: Tales from the cloud trenches: Amazon ECS is the new EC2 for crypto mining; GuardDuty Extended Threat Detection uncovers cryptomining campaign on Amazon EC2 and Amazon ECS.
references:
    - https://securitylabs.datadoghq.com/articles/tales-from-the-cloud-trenches-ecs-crypto-mining/
    - https://aws.amazon.com/blogs/security/cryptomining-campaign-targeting-amazon-ec2-and-amazon-ecs/
    - https://aws.permissions.cloud/iam/ecs#ecs-CreateService
    - https://traildiscover.cloud/#ECS-CreateService
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.impact
    - attack.t1496 #Resource Hijacking
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: ecs.amazonaws.com
        eventName: CreateService
    condition: selection
falsepositives:
level: medium
