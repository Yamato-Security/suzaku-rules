title: AWS Athena GetQueryResults
id: 44397970-09a3-518c-a316-b0f5083f3727
status: experimental
description: |
    Streams the results of a single query execution specified by QueryExecutionId from the Athena query results location in Amazon S3.
    Security implications: Attackers might use GetQueryResults from Amazon Athena to illicitly access and read potential sensitive data.
    Observed in real-world incidents/reporting, e.g.: Compromised Cloud Compute Credentials: Case Studies From the Wild.
references:
    - https://unit42.paloaltonetworks.com/compromised-cloud-compute-credentials/#post-125981-_kdq0vw6banab
    - https://aws.permissions.cloud/iam/athena#athena-GetQueryResults
    - https://traildiscover.cloud/#Athena-GetQueryResults
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.discovery
    - attack.t1580 #Cloud Infrastructure Discovery
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: athena.amazonaws.com
        eventName: GetQueryResults
    condition: selection
falsepositives:
level: low
