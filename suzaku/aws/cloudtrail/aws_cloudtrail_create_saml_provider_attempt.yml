title: AWS IAM CreateSAMLProvider Attempt
id: 9219dda8-42bd-54c8-ba3f-ae304e9610d4
status: experimental
description: |
    Failed or denied attempt to call CreateSAMLProvider — the request returned an error, so the action did not complete. A failed attempt can indicate an adversary probing permissions, a misconfigured tool, or an incomplete attack.
    Creates an IAM resource that describes an identity provider (IdP) that supports SAML 2.0.
    Security implications: Attackers use CreateSAMLProvider to establish persistent footholds.
    Observed in real-world incidents/reporting, e.g.: New tactics and techniques for proactive threat detection.
references:
    - https://reinforce.awsevents.com/content/dam/reinforce/2024/slides/TDR432_New-tactics-and-techniques-for-proactive-threat-detection.pdf
    - https://aws.permissions.cloud/iam/iam#iam-CreateSAMLProvider
    - https://traildiscover.cloud/#IAM-CreateSAMLProvider
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.persistence
    - attack.t1136 #Create Account
    - attack.t1136.003 #Create Account: Cloud Account
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: iam.amazonaws.com
        eventName: CreateSAMLProvider
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Legitimate provisioning or configuration changes by administrators or CI/CD pipelines.
    - Infrastructure-as-code (Terraform, CloudFormation, CDK, Pulumi) applying changes.
level: low
