title: AWS SignIn PasswordRecoveryRequested Attempt
id: 96d35a47-874e-5858-af61-1cc4c978958d
status: experimental
description: |
    Failed or denied attempt to call PasswordRecoveryRequested — the request returned an error, so the action did not complete. A failed attempt can indicate an adversary probing permissions, a misconfigured tool, or an incomplete attack.
    This is the CloudTrail event generated when you request a password recovery.
    Security implications: Attackers might start a password recovery process to steal AWS access if they have compromised the email of the user.
    Observed in real-world incidents/reporting, e.g.: An Ongoing AWS Phishing Campaign; Disclosure of Security Incidents on imToken.
references:
    - https://www.cadosecurity.com/an-ongoing-aws-phishing-campaign/
    - https://support.token.im/hc/en-us/articles/360005681954-Disclosure-of-Security-Incidents-on-imToken
    - https://traildiscover.cloud/#SignIn-PasswordRecoveryRequested
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.initial-access
    - attack.t1078 #Valid Accounts
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: signin.amazonaws.com
        eventName: PasswordRecoveryRequested
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Legitimate administrative or automation activity.
    - Infrastructure-as-code or CI/CD tooling performing this action.
level: low
