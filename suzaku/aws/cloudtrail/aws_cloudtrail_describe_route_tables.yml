title: AWS EC2 DescribeRouteTables
id: 9a6952cc-c030-5a44-840c-671f0478153a
status: experimental
description: |
    Describes one or more of your route tables.

    Security implications: Reveals network paths which enables planning for lateral movement or data exfiltration routes.

    Observed in real-world incidents/reporting, e.g.: Crimson Collective: A New Threat Group Observed Operating in the Cloud.
references:
    - https://www.rapid7.com/blog/post/tr-crimson-collective-a-new-threat-group-observed-operating-in-the-cloud/
    - https://aws.permissions.cloud/iam/ec2#ec2-DescribeRouteTables
    - https://traildiscover.cloud/#EC2-DescribeRouteTables
author: Adan Alvarez (@adanalvarez), Yamato Security
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.discovery
    - attack.t1580 #Cloud Infrastructure Discovery
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: ec2.amazonaws.com
        eventName: DescribeRouteTables
    condition: selection
falsepositives:
level: low
