title: AWS Route53 CreateHostedZone Attempt
id: 184cf014-f419-541f-b2a3-5f4708d3d08c
status: experimental
description: |
    Failed or denied attempt to call CreateHostedZone — the request returned an error, so the action did not complete. A failed attempt can indicate an adversary probing permissions, a misconfigured tool, or an incomplete attack.
    Creates a new public or private hosted zone. You create records in a public hosted zone to define how you want to route traffic on the internet for a domain, such as example.com, and its subdomains.
    Security implications: Attackers might use CreateHostedZone to create malicious DNS zones for phishing or redirecting traffic.
    Observed in real-world incidents/reporting, e.g.: The curious case of DangerDev@protonmail.me.
references:
    - https://www.invictus-ir.com/news/the-curious-case-of-dangerdev-protonmail-me
    - https://hackingthe.cloud/aws/exploitation/route53_modification_privilege_escalation/
    - https://aws.permissions.cloud/iam/route53#route53-CreateHostedZone
    - https://traildiscover.cloud/#Route53-CreateHostedZone
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.impact
    - attack.t1496 #Resource Hijacking
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: route53.amazonaws.com
        eventName: CreateHostedZone
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Legitimate provisioning or configuration changes by administrators or CI/CD pipelines.
    - Infrastructure-as-code (Terraform, CloudFormation, CDK, Pulumi) applying changes.
level: low
