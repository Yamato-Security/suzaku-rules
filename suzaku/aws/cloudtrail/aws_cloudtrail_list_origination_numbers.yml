title: AWS SNS ListOriginationNumbers
id: fc4c759a-1136-5e2f-b790-8a6d63027a07
status: experimental
description: |
    Lists the calling AWS account's dedicated origination numbers and their metadata.

    Security implications: Attackers might use ListOriginationNumbers to identify origination numbers for potential smishing campaings.
references:
    - https://permiso.io/blog/s/smishing-attack-on-aws-sms-new-phone-who-dis/
    - https://aws.permissions.cloud/iam/sns#sns-ListOriginationNumbers
    - https://traildiscover.cloud/#SNS-ListOriginationNumbers
author: Adan Alvarez (@adanalvarez), Yamato Security
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.discovery
    - attack.t1580 #Cloud Infrastructure Discovery
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: sns.amazonaws.com
        eventName: ListOriginationNumbers
    condition: selection
falsepositives:
level: low
