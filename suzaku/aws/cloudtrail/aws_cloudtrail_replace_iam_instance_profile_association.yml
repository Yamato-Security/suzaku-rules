title: AWS EC2 ReplaceIamInstanceProfileAssociation
id: 96ab61e9-c92a-5da5-a3cc-7cf2d2005bd2
status: experimental
description: |
    Replaces an IAM instance profile for the specified running instance.

    Security implications: Attackers might use ReplaceIamInstanceProfileAssociation to replace the IAM instance profile on an instance they control with one that has higher privileges.

    Observed in real-world incidents/reporting, e.g.: LUCR-3: SCATTERED SPIDER GETTING SAAS-Y IN THE CLOUD.
references:
    - https://permiso.io/blog/lucr-3-scattered-spider-getting-saas-y-in-the-cloud
    - https://aws.permissions.cloud/iam/ec2#ec2-ReplaceIamInstanceProfileAssociation
    - https://traildiscover.cloud/#EC2-ReplaceIamInstanceProfileAssociation
author: Adan Alvarez (@adanalvarez), Yamato Security
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.privilege-escalation
    - attack.t1098 #Account Manipulation
    - attack.t1098.003 #Account Manipulation: Additional Cloud Roles
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: ec2.amazonaws.com
        eventName: ReplaceIamInstanceProfileAssociation
    condition: selection
falsepositives:
level: medium
