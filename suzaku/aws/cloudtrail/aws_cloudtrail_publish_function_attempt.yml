title: AWS CloudFront PublishFunction Attempt
id: 8e5b22d9-10fa-5a16-9ad4-45e0401b04fa
status: experimental
description: |
    Publishes a CloudFront function by copying the function code from the DEVELOPMENT stage to LIVE.
    Security implications: Attackers might use PublishFunction to publish a malicious function that might be used to exfiltrate data.
references:
    - https://medium.com/@adan.alvarez/how-attackers-can-misuse-aws-cloudfront-access-to-make-it-rain-cookies-acf9ce87541c
    - https://aws.permissions.cloud/iam/cloudfront#cloudfront-PublishFunction
    - https://traildiscover.cloud/#CloudFront-PublishFunction
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.collection
    - attack.t1119 #Automated Collection
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: cloudfront.amazonaws.com
        eventName: PublishFunction
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Legitimate provisioning or configuration changes by administrators or CI/CD pipelines.
    - Infrastructure-as-code (Terraform, CloudFormation, CDK, Pulumi) applying changes.
level: informational
