title: AWS ECS RegisterTaskDefinition Attempt
id: eae810b6-4ef7-5816-8a24-574580b40e36
status: experimental
description: |
    Failed or denied attempt to call RegisterTaskDefinition — the request returned an error, so the action did not complete. A failed attempt can indicate an adversary probing permissions, a misconfigured tool, or an incomplete attack.
    Registers a new task definition from the supplied family and containerDefinitions.
    Security implications: Attackers might use RegisterTaskDefinition to deploy containers with malicious tasks in AWS ECS.
    Ex: aws ecs register-task-definition --family 'xtdb-bench-dev' --network-mode 'awsvpc' --container-definitions '[{"name":"bench-container", "cpu":2048, "memory":4092 }]'
    Observed in real-world incidents/reporting, e.g.: Tales from the cloud trenches: Amazon ECS is the new EC2 for crypto mining; GuardDuty Extended Threat Detection uncovers cryptomining campaign on Amazon EC2 and Amazon ECS.
references:
    - https://securitylabs.datadoghq.com/articles/tales-from-the-cloud-trenches-ecs-crypto-mining/
    - https://aws.amazon.com/blogs/security/cryptomining-campaign-targeting-amazon-ec2-and-amazon-ecs/
    - https://aws.permissions.cloud/iam/ecs#ecs-RegisterTaskDefinition
    - https://traildiscover.cloud/#ECS-RegisterTaskDefinition
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.impact
    - attack.t1496 #Resource Hijacking
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: ecs.amazonaws.com
        eventName: RegisterTaskDefinition
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Legitimate provisioning or configuration changes by administrators or CI/CD pipelines.
    - Infrastructure-as-code (Terraform, CloudFormation, CDK, Pulumi) applying changes.
level: low
