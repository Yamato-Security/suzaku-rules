title: AWS RDS DescribeDBProxies
id: fd22ad50-6194-52cb-a173-67946138ee73
status: experimental
description: |
    Returns information about DB proxies.

    Security implications: Proxy configuration may expose auth mechanisms or targets for credential harvesting.

    Observed in real-world incidents/reporting, e.g.: Crimson Collective: A New Threat Group Observed Operating in the Cloud.
references:
    - https://www.rapid7.com/blog/post/tr-crimson-collective-a-new-threat-group-observed-operating-in-the-cloud/
    - https://aws.permissions.cloud/iam/rds#rds-DescribeDBProxies
    - https://traildiscover.cloud/#RDS-DescribeDBProxies
author: Adan Alvarez (@adanalvarez), Yamato Security
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.discovery
    - attack.t1580 #Cloud Infrastructure Discovery
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: rds.amazonaws.com
        eventName: DescribeDBProxies
    condition: selection
falsepositives:
level: low
