title: AWS EC2 SharedSnapshotCopyInitiated Attempt
id: 6d266c96-a5e1-528d-89bf-f3886d22ffb3
status: experimental
description: |
    Failed or denied attempt to call SharedSnapshotCopyInitiated — the request returned an error, so the action did not complete. A failed attempt can indicate an adversary probing permissions, a misconfigured tool, or an incomplete attack.
    A snapshot shared with another AWS account was copied by that account.
    Security implications: SharedSnapshotCopyInitiated might be a signal of an attacker copying a snapshot to their account.
    Observed in real-world incidents/reporting, e.g.: M-Trends Report - 2020; Democratic National Committee hack.
references:
    - https://web.archive.org/web/20250129185248/https://www.mandiant.com/sites/default/files/2021-09/mtrends-2020.pdf
    - https://www.politico.com/f/?id=00000168-6161-de11-af7d-ef7327ea0000
    - https://twitter.com/christophetd/status/1574681313218506753
    - https://stratus-red-team.cloud/attack-techniques/AWS/aws.exfiltration.ec2-share-ebs-snapshot
    - https://traildiscover.cloud/#EC2-SharedSnapshotCopyInitiated
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.exfiltration
    - attack.t1537 #Transfer Data to Cloud Account
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: ec2.amazonaws.com
        eventName: SharedSnapshotCopyInitiated
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Legitimate provisioning or configuration changes by administrators or CI/CD pipelines.
    - Infrastructure-as-code (Terraform, CloudFormation, CDK, Pulumi) applying changes.
level: medium
