title: AWS Bedrock CreateFoundationModelAgreement
id: cca32e59-dfe9-5289-aa8d-6099c55d88d2
status: experimental
description: |
    Grants permission to create a new foundation model agreement.
    Security implications: Attackers might use CreateFoundationModelAgreement to prepare for using foundation models for resource hijacking.
    Observed in real-world incidents/reporting, e.g.: Detecting AI resource-hijacking with Composite Alerts; When AI Gets Hijacked: Exploiting Hosted Models for Dark Roleplaying; New Developments in LLM Hijacking Activity.
references:
    - https://www.lacework.com/blog/detecting-ai-resource-hijacking-with-composite-alerts
    - https://permiso.io/blog/exploiting-hosted-models
    - https://www.wiz.io/blog/jinx-2401-llm-hijacking-aws
    - https://stratus-red-team.cloud/attack-techniques/AWS/aws.impact.bedrock-invoke-model
    - https://aws.permissions.cloud/iam/bedrock#bedrock-CreateFoundationModelAgreement
    - https://traildiscover.cloud/#Bedrock-CreateFoundationModelAgreement
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.impact
    - attack.t1496 #Resource Hijacking
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: bedrock.amazonaws.com
        eventName: CreateFoundationModelAgreement
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and not (error_code or error_msg)
falsepositives:
    - Legitimate provisioning or configuration changes by administrators or CI/CD pipelines.
    - Infrastructure-as-code (Terraform, CloudFormation, CDK, Pulumi) applying changes.
level: medium
