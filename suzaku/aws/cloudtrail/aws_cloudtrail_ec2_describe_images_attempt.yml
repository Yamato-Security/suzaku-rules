title: AWS EC2 DescribeImages Attempt
id: 0806f8a3-32f4-5cbc-8c93-cfea1596aff4
status: experimental
description: |
    Failed or denied attempt to call DescribeImages — the request returned an error, so the action did not complete. A failed attempt can indicate an adversary probing permissions, a misconfigured tool, or an incomplete attack.
    Describes the specified images (AMIs, AKIs, and ARIs) available to you or all of the images available to you.
    Security implications: Attackers might use DescribeImages to identify AMIs (Amazon Machine Images) within AWS.
    Observed in real-world incidents/reporting, e.g.: Compromised Cloud Compute Credentials: Case Studies From the Wild.
references:
    - https://unit42.paloaltonetworks.com/compromised-cloud-compute-credentials/#post-125981-_kdq0vw6banab
    - https://aws.permissions.cloud/iam/ec2#ec2-DescribeImages
    - https://traildiscover.cloud/#EC2-DescribeImages
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.discovery
    - attack.t1580 #Cloud Infrastructure Discovery
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: ec2.amazonaws.com
        eventName: DescribeImages
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Routine enumeration by administrators, monitoring/inventory tools, or the AWS Console and SDKs.
    - Security, backup, or cost-management tooling that periodically reads this resource.
level: informational
