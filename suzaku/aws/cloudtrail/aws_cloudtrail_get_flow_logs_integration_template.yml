title: AWS EC2 GetFlowLogsIntegrationTemplate
id: 020f5dd3-476f-524f-8b30-f3d93c81d8e1
status: experimental
description: |
    Generates a CloudFormation template that streamlines and automates the integration of VPC flow logs with Amazon Athena.
    Security implications: Attackers might use GetFlowLogsIntegrationTemplate to create templates for integrating VPC flow logs with external monitoring solutions, potentially to configure exfiltration pathways for gathered data or to understand security monitoring setups.
    Observed in real-world incidents/reporting, e.g.: Compromised Cloud Compute Credentials: Case Studies From the Wild.
references:
    - https://unit42.paloaltonetworks.com/compromised-cloud-compute-credentials/#post-125981-_kdq0vw6banab
    - https://aws.permissions.cloud/iam/ec2#ec2-GetFlowLogsIntegrationTemplate
    - https://traildiscover.cloud/#EC2-GetFlowLogsIntegrationTemplate
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.discovery
    - attack.t1580 #Cloud Infrastructure Discovery
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: ec2.amazonaws.com
        eventName: GetFlowLogsIntegrationTemplate
    condition: selection
falsepositives:
level: low
