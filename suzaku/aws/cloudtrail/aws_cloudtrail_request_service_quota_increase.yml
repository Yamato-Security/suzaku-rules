title: AWS ServiceQuotas RequestServiceQuotaIncrease
id: 68a0f2fb-56db-5437-8654-bebc1832f3b1
status: experimental
description: |
    Submits a quota increase request for the specified quota at the account or resource level.
    Security implications: Attackers might use RequestServiceQuotaIncrease to increase the quotas and so resource hijacking will have a bigger impact.
    Observed in real-world incidents/reporting, e.g.: The curious case of DangerDev@protonmail.me; Incident report: From CLI to console, chasing an attacker in AWS.
references:
    - https://www.invictus-ir.com/news/the-curious-case-of-dangerdev-protonmail-me
    - https://expel.com/blog/incident-report-from-cli-to-console-chasing-an-attacker-in-aws/
    - https://aws.permissions.cloud/iam/servicequotas#servicequotas-RequestServiceQuotaIncrease
    - https://traildiscover.cloud/#ServiceQuotas-RequestServiceQuotaIncrease
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.impact
    - attack.t1496 #Resource Hijacking
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: servicequotas.amazonaws.com
        eventName: RequestServiceQuotaIncrease
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and not (error_code or error_msg)
falsepositives:
    - Legitimate provisioning or configuration changes by administrators or CI/CD pipelines.
    - Infrastructure-as-code (Terraform, CloudFormation, CDK, Pulumi) applying changes.
level: medium
