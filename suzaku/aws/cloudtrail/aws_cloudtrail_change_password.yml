title: AWS IAM ChangePassword
id: a21157fb-6527-5017-8c0d-37894c351e1f
status: experimental
description: |
    Changes the password of the IAM user who is calling this operation.

    Security implications: Attackers might use ChangePassword to alter user credentials.
references:
    - https://www.invictus-ir.com/news/aws-cloudtrail-cheat-sheet
    - https://asecure.cloud/a/cwalarm_iam_user_changes/
    - https://aws.permissions.cloud/iam/iam#iam-ChangePassword
    - https://traildiscover.cloud/#IAM-ChangePassword
author: Adan Alvarez (@adanalvarez), Yamato Security
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.persistence
    - attack.privilege-escalation
    - attack.t1136 #Create Account
    - attack.t1078 #Valid Accounts
    - attack.t1078.004 #Valid Accounts: Cloud Accounts
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: iam.amazonaws.com
        eventName: ChangePassword
    condition: selection
falsepositives:
level: medium
