title: AWS S3 ListObjects Attempt
id: ffd9d23a-cd13-5edb-8f73-a140863acceb
status: experimental
description: |
    Returns some or all (up to 1,000) of the objects in a bucket.
    Security implications: Attackers might use ListObjects to identify potentially sensitive objects stored in S3 buckets.
    Observed in real-world incidents/reporting, e.g.: Tales from the cloud trenches: Amazon ECS is the new EC2 for crypto mining; Cloud Security Stories: From Risky Permissions to Ransomware Execution; Tales from the cloud trenches: Raiding for AWS vaults, buckets and secrets; Investigating Suspected DPRK-Linked Crypto Intrusions.
references:
    - https://securitylabs.datadoghq.com/articles/tales-from-the-cloud-trenches-ecs-crypto-mining/
    - https://sonraisecurity.com/blog/cloud-security-stories-from-risky-permissions-to-ransomware-execution/
    - https://securitylabs.datadoghq.com/articles/tales-from-the-cloud-trenches-raiding-for-vaults-buckets-secrets/
    - https://ctrlaltintel.com/threat%20research/DPRK-Crypto-Heist/
    - https://traildiscover.cloud/#S3-ListObjects
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.discovery
    - attack.t1619 #Cloud Storage Object Discovery
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: s3.amazonaws.com
        eventName: ListObjects
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Routine enumeration by administrators, monitoring/inventory tools, or the AWS Console and SDKs.
    - Security, backup, or cost-management tooling that periodically reads this resource.
level: informational
