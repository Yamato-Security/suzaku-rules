title: AWS EC2 DescribeVolumesModifications
id: df9dc8e8-5b05-5fde-83d1-5def8e89ff88
status: experimental
description: |
    Describes the most recent volume modification request for the specified EBS volumes.
    Security implications: Attackers might use DescribeVolumesModifications to track changes in EBS volumes.
    Observed in real-world incidents/reporting, e.g.: Compromised Cloud Compute Credentials: Case Studies From the Wild.
references:
    - https://unit42.paloaltonetworks.com/compromised-cloud-compute-credentials/#post-125981-_kdq0vw6banab
    - https://aws.permissions.cloud/iam/ec2#ec2-DescribeVolumesModifications
    - https://traildiscover.cloud/#EC2-DescribeVolumesModifications
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.discovery
    - attack.t1580 #Cloud Infrastructure Discovery
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: ec2.amazonaws.com
        eventName: DescribeVolumesModifications
    condition: selection
falsepositives:
    - Routine enumeration by administrators, monitoring/inventory tools, or the AWS Console and SDKs.
    - Security, backup, or cost-management tooling that periodically reads this resource.
level: informational
