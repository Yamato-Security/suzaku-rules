title: AWS SES GetAccount
id: db9aa364-ed93-59b8-a02f-6c94d4614cd1
status: experimental
description: |
    Obtain information about the email-sending status and capabilities of your Amazon SES account in the current AWS Region.
    Security implications: Attackers might use GetAccount to gather sensitive information about the AWS SES account for malicious purposes.
    Observed in real-world incidents/reporting, e.g.: Ransomware in the cloud; Compromised Cloud Compute Credentials: Case Studies From the Wild; SES-PIONAGE; Tales from the cloud trenches: Unwanted visitor; Leaked Environment Variables Allow Large-Scale Extortion Operation in Cloud Environments; Tales from the cloud trenches: The Attacker doth persist too much, methinks.
references:
    - https://www.invictus-ir.com/news/ransomware-in-the-cloud
    - https://unit42.paloaltonetworks.com/compromised-cloud-compute-credentials/#post-125981-_kdq0vw6banab
    - https://permiso.io/blog/s/aws-ses-pionage-detecting-ses-abuse/
    - https://securitylabs.datadoghq.com/articles/tales-from-the-cloud-trenches-unwanted-visitor/
    - https://unit42.paloaltonetworks.com/large-scale-cloud-extortion-operation/
    - https://securitylabs.datadoghq.com/articles/tales-from-the-cloud-trenches-the-attacker-doth-persist-too-much/
    - https://www.wiz.io/blog/wiz-discovers-cloud-email-abuse-campaign
    - https://securitylabs.datadoghq.com/articles/following-attackers-trail-in-aws-methodology-findings-in-the-wild/
    - https://aws.permissions.cloud/iam/ses#ses-GetAccount
    - https://traildiscover.cloud/#SES-GetAccount
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.discovery
    - attack.t1087 #Account Discovery
    - attack.t1087.004 #Account Discovery: Cloud Account
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: ses.amazonaws.com
        eventName: GetAccount
    condition: selection
falsepositives:
    - Routine enumeration by administrators, monitoring/inventory tools, or the AWS Console and SDKs.
    - Security, backup, or cost-management tooling that periodically reads this resource.
level: informational
