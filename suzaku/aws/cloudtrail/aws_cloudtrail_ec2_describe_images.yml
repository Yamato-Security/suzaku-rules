title: AWS EC2 DescribeImages
id: 74e40616-04c5-5f72-ae98-f3242c38fc85
status: experimental
description: |
    Describes the specified images (AMIs, AKIs, and ARIs) available to you or all of the images available to you.
    Security implications: Attackers might use DescribeImages to identify AMIs (Amazon Machine Images) within AWS.
    Ex: aws ec2 describe-images --filters Name=name,Values=TrailDiscover
    Observed in real-world incidents/reporting, e.g.: Compromised Cloud Compute Credentials: Case Studies From the Wild.
references:
    - https://unit42.paloaltonetworks.com/compromised-cloud-compute-credentials/#post-125981-_kdq0vw6banab
    - https://aws.permissions.cloud/iam/ec2#ec2-DescribeImages
    - https://traildiscover.cloud/#EC2-DescribeImages
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.discovery
    - attack.t1580 #Cloud Infrastructure Discovery
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: ec2.amazonaws.com
        eventName: DescribeImages
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and not (error_code or error_msg)
falsepositives:
    - Routine enumeration by administrators, monitoring/inventory tools, or the AWS Console and SDKs.
    - Security, backup, or cost-management tooling that periodically reads this resource.
level: informational
