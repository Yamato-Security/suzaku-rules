title: AWS EC2 DeleteVolume Attempt
id: ef571e72-62f7-5871-99e6-2dde471dc749
status: experimental
description: |
    Deletes the specified EBS volume. The volume must be in the available state (not attached to an instance).
    Security implications: Attackers might use DeleteVolume to remove Elastic Block Store (EBS) volumes, leading to data loss and potentially disrupting operations.
    Observed in real-world incidents/reporting, e.g.: Hacker Puts Hosting Service Code Spaces Out of Business.
references:
    - https://threatpost.com/hacker-puts-hosting-service-code-spaces-out-of-business/106761/
    - https://aws.permissions.cloud/iam/ec2#ec2-DeleteVolume
    - https://traildiscover.cloud/#EC2-DeleteVolume
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.impact
    - attack.t1485 #Data Destruction
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: ec2.amazonaws.com
        eventName: DeleteVolume
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Planned decommissioning, cleanup, or teardown by administrators or CI/CD.
    - Infrastructure-as-code (Terraform, CloudFormation, CDK) destroying or replacing resources.
level: low
