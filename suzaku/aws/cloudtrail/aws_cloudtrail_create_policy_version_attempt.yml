title: AWS IAM CreatePolicyVersion Attempt
id: 50d7ff58-35c5-54d7-8be6-99d384369d79
status: experimental
description: |
    Failed or denied attempt to call CreatePolicyVersion — the request returned an error, so the action did not complete. A failed attempt can indicate an adversary probing permissions, a misconfigured tool, or an incomplete attack.
    Creates a new version of the specified managed policy.
    Security implications: Attackers might use CreatePolicyVersion to modify IAM policies, potentially granting themselves elevated permissions.
references:
    - https://hackingthe.cloud/aws/exploitation/iam_privilege_escalation/
    - https://aws.permissions.cloud/iam/iam#iam-CreatePolicyVersion
    - https://traildiscover.cloud/#IAM-CreatePolicyVersion
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.privilege-escalation
    - attack.t1098 #Account Manipulation
    - attack.t1098.003 #Account Manipulation: Additional Cloud Roles
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: iam.amazonaws.com
        eventName: CreatePolicyVersion
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Legitimate provisioning or configuration changes by administrators or CI/CD pipelines.
    - Infrastructure-as-code (Terraform, CloudFormation, CDK, Pulumi) applying changes.
level: low
