title: AWS KMS PutKeyPolicy
id: d15fbac7-e3ad-577c-af72-c5464417efca
status: experimental
description: |
    Attaches a key policy to the specified KMS key.
    Security implications: Attackers might put a new key polocy to modify the policy of a current KMS Key and lock the data for ransomware attacks.
references:
    - https://blog.pepperclipp.com/pepperclipp-public/encrypting-buckets-for-compliance-and-ransom-how-attackers-can-use-kms-to-ransomware-s3-buckets
    - https://aws.permissions.cloud/iam/kms#kms-PutKeyPolicy
    - https://traildiscover.cloud/#KMS-PutKeyPolicy
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.impact
    - attack.t1486 #Data Encrypted for Impact
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: kms.amazonaws.com
        eventName: PutKeyPolicy
    condition: selection
falsepositives:
    - Legitimate provisioning or configuration changes by administrators or CI/CD pipelines.
    - Infrastructure-as-code (Terraform, CloudFormation, CDK, Pulumi) applying changes.
level: medium
