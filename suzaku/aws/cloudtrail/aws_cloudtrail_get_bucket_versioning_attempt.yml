title: AWS S3 GetBucketVersioning Attempt
id: a15e703a-4f34-5f62-a04c-534cecd3919d
status: experimental
description: |
    Returns the versioning state of a bucket.
    Security implications: Attackers might use GetBucketVersioning to identify unsecured S3 buckets with versioning disabled, making it easier to manipulate or delete data.
    Observed in real-world incidents/reporting, e.g.: Ransomware in the cloud; Muddled Libra’s Evolution to the Cloud; Leaked Environment Variables Allow Large-Scale Extortion Operation in Cloud Environments.
references:
    - https://www.invictus-ir.com/news/ransomware-in-the-cloud
    - https://unit42.paloaltonetworks.com/muddled-libra-evolution-to-cloud/
    - https://unit42.paloaltonetworks.com/large-scale-cloud-extortion-operation/
    - https://aws.permissions.cloud/iam/s3#s3-GetBucketVersioning
    - https://traildiscover.cloud/#S3-GetBucketVersioning
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.discovery
    - attack.t1526 #Cloud Service Discovery
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: s3.amazonaws.com
        eventName: GetBucketVersioning
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Routine enumeration by administrators, monitoring/inventory tools, or the AWS Console and SDKs.
    - Security, backup, or cost-management tooling that periodically reads this resource.
level: informational
