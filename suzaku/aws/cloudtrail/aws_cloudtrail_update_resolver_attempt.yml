title: AWS AppSync UpdateResolver Attempt
id: 7f7be1bf-c109-5b9b-a6ea-b54eae68c0fa
status: experimental
description: |
    Failed or denied attempt to call UpdateResolver — the request returned an error, so the action did not complete. A failed attempt can indicate an adversary probing permissions, a misconfigured tool, or an incomplete attack.
    Updates a Resolver object.
    Security implications: Attackers might use UpdateResolver to execute custom code that could allow potential access to data and bypass protections.
references:
    - https://medium.com/@adan.alvarez/distorting-the-sync-how-aws-appsync-can-be-turned-into-an-attackers-backdoor-8c015b8e52b8
    - https://aws.permissions.cloud/iam/appsync#appsync-UpdateResolver
    - https://traildiscover.cloud/#AppSync-UpdateResolver
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.defense-evasion
    - attack.persistence
    - attack.t1578 #Modify Cloud Compute Infrastructure
    - attack.t1556 #Modify Authentication Process
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: appsync.amazonaws.com
        eventName: UpdateResolver
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Legitimate provisioning or configuration changes by administrators or CI/CD pipelines.
    - Infrastructure-as-code (Terraform, CloudFormation, CDK, Pulumi) applying changes.
level: medium
