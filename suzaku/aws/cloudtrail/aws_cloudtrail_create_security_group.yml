title: AWS EC2 CreateSecurityGroup
id: 90ebf0c2-e4e8-5ec8-865b-dbfc0c5f6bb7
status: experimental
description: |
    Creates a security group.
    Security implications: Attackers might use CreateSecurityGroup to establish new security groups with lax rules, facilitating unauthorized access or resource exploitation within AWS environments.
    Observed in real-world incidents/reporting, e.g.: The curious case of DangerDev@protonmail.me; Tales from the cloud trenches: Amazon ECS is the new EC2 for crypto mining; Behind the scenes in the Expel SOC: Alert-to-fix in AWS; When a Zero Day and Access Keys Collide in the Cloud: Responding to the SugarCRM Zero-Day Vulnerability; ANATOMY OF AN ATTACK: EXPOSED KEYS TO CRYPTO MINING; Leaked Environment Variables Allow Large-Scale Extortion Operation in Cloud Environments.
references:
    - https://www.invictus-ir.com/news/the-curious-case-of-dangerdev-protonmail-me
    - https://securitylabs.datadoghq.com/articles/tales-from-the-cloud-trenches-ecs-crypto-mining/
    - https://expel.com/blog/behind-the-scenes-expel-soc-alert-aws/
    - https://unit42.paloaltonetworks.com/sugarcrm-cloud-incident-black-hat/
    - https://permiso.io/blog/s/anatomy-of-attack-exposed-keys-to-crypto-mining/
    - https://unit42.paloaltonetworks.com/large-scale-cloud-extortion-operation/
    - https://securitylabs.datadoghq.com/articles/tales-from-the-cloud-trenches-the-attacker-doth-persist-too-much/
    - https://www.rapid7.com/blog/post/tr-crimson-collective-a-new-threat-group-observed-operating-in-the-cloud/
    - https://zviwex.com/posts/aws-account-hacked
    - https://securitylabs.datadoghq.com/articles/following-attackers-trail-in-aws-methodology-findings-in-the-wild/
    - https://rhinosecuritylabs.com/aws/abusing-vpc-traffic-mirroring-in-aws/
