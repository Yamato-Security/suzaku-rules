title: AWS EKS DescribeAccessEntry
id: b9f7d66f-32f6-5c93-9379-c8eb33bb66e0
status: experimental
description: |
    Describes an access entry.
    Security implications: Attackers might use DescribeAccessEntry for reconnaissance, gathering detailed information about access configurations within AWS EKS.
    Ex: aws eks describe-access-entry --cluster-name beta-fish --principal-arn arn:aws:iam::111122223333:role/TrailDiscover
references:
    - https://www.wiz.io/blog/new-attack-vectors-emerge-via-recent-eks-access-entries-and-pod-identity-features
    - https://aws.permissions.cloud/iam/eks#eks-DescribeAccessEntry
    - https://traildiscover.cloud/#EKS-DescribeAccessEntry
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.discovery
    - attack.t1580 #Cloud Infrastructure Discovery
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: eks.amazonaws.com
        eventName: DescribeAccessEntry
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and not (error_code or error_msg)
falsepositives:
    - Routine enumeration by administrators, monitoring/inventory tools, or the AWS Console and SDKs.
    - Security, backup, or cost-management tooling that periodically reads this resource.
level: informational
