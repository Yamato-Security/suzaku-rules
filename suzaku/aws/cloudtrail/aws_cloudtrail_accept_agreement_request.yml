title: AWS Marketplace AcceptAgreementRequest
id: 2f582944-6a44-5013-9d4f-46479b756b67
status: experimental
description: |
    Accepts an AWS Marketplace agreement request, activating entitlements needed for Bedrock third-party models.
    Security implications: Attackers might use AcceptAgreementRequest to silently subscribe to premium Bedrock listings, enabling long-lived access to costly AI services or staging points for data theft.
    Ex: aws marketplace-agreement accept-agreement-request --agreement-request-id ar-0123456789abcdef --client-token demo-token
    Observed in real-world incidents/reporting, e.g.: AI-assisted cloud intrusion achieves admin access in 8 minutes.
references:
    - https://www.sysdig.com/blog/ai-assisted-cloud-intrusion-achieves-admin-access-in-8-minutes
    - https://aws.permissions.cloud/iam/aws-marketplace#aws-marketplace-AcceptAgreementRequest
    - https://traildiscover.cloud/#Marketplace-AcceptAgreementRequest
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.persistence
    - attack.t1098 #Account Manipulation
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: agreement-marketplace.amazonaws.com
        eventName: AcceptAgreementRequest
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and not (error_code or error_msg)
falsepositives:
    - Legitimate provisioning or configuration changes by administrators or CI/CD pipelines.
    - Infrastructure-as-code (Terraform, CloudFormation, CDK, Pulumi) applying changes.
level: medium
