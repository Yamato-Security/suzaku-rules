title: AWS TransferFamily CreateServer Attempt
id: 7ca38321-716d-538d-9c37-99536eea7e8c
status: experimental
description: |
    Failed or denied attempt to call CreateServer — the request returned an error, so the action did not complete. A failed attempt can indicate an adversary probing permissions, a misconfigured tool, or an incomplete attack.
    Instantiates an auto-scaling virtual server based on the selected file transfer protocol in AWS.
    Security implications: Attackers might use CreateServer to create a server that allows to transfer files into and out of AWS storage services.
    Ex: aws transfer create-server --protocols SFTP --endpoint-type PUBLIC --identity-provider-type SERVICE_MANAGED
    Observed in real-world incidents/reporting, e.g.: Muddled Libra’s Evolution to the Cloud.
references:
    - https://unit42.paloaltonetworks.com/muddled-libra-evolution-to-cloud/
    - https://aws.permissions.cloud/iam/transfer#transfer-CreateServer
    - https://traildiscover.cloud/#TransferFamily-CreateServer
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.exfiltration
    - attack.t1537 #Transfer Data to Cloud Account
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: transfer.amazonaws.com
        eventName: CreateServer
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Legitimate provisioning or configuration changes by administrators or CI/CD pipelines.
    - Infrastructure-as-code (Terraform, CloudFormation, CDK, Pulumi) applying changes.
level: medium
