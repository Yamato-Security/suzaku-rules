title: AWS Bedrock ListKnowledgeBases
id: 577e4f66-673d-544a-91d1-0e28146e12e6
status: experimental
description: |
    Lists the knowledge bases in an account. The list also includes information about each knowledge base.

    Security implications: Attackers might use ListKnowledgeBases to identify connected data repositories and prioritize follow-on data theft or sabotage.

    Observed in real-world incidents/reporting, e.g.: AI-assisted cloud intrusion achieves admin access in 8 minutes.
references:
    - https://www.sysdig.com/blog/ai-assisted-cloud-intrusion-achieves-admin-access-in-8-minutes
    - https://aws.permissions.cloud/iam/bedrock#bedrock-ListKnowledgeBases
    - https://traildiscover.cloud/#Bedrock-ListKnowledgeBases
author: Adan Alvarez (@adanalvarez), Yamato Security
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.discovery
    - attack.t1580 #Cloud Infrastructure Discovery
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: bedrock.amazonaws.com
        eventName: ListKnowledgeBases
    condition: selection
falsepositives:
level: low
