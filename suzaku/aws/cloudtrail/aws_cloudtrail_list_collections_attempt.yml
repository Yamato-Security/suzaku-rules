title: AWS OpenSearchServerless ListCollections Attempt
id: 477889ba-7dbf-58fd-8989-afe409591009
status: experimental
description: |
    Failed or denied attempt to call ListCollections — the request returned an error, so the action did not complete. A failed attempt can indicate an adversary probing permissions, a misconfigured tool, or an incomplete attack.
    Lists all OpenSearch Serverless collections.
    Security implications: Attackers might use ListCollections to inventory search clusters, identify business-critical analytics assets, and prioritize follow-on data theft or sabotage.
    Observed in real-world incidents/reporting, e.g.: AI-assisted cloud intrusion achieves admin access in 8 minutes.
references:
    - https://www.sysdig.com/blog/ai-assisted-cloud-intrusion-achieves-admin-access-in-8-minutes
    - https://aws.permissions.cloud/iam/aoss#aoss-ListCollections
    - https://traildiscover.cloud/#OpenSearchServerless-ListCollections
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.discovery
    - attack.t1580 #Cloud Infrastructure Discovery
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: aoss.amazonaws.com
        eventName: ListCollections
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Routine enumeration by administrators, monitoring/inventory tools, or the AWS Console and SDKs.
    - Security, backup, or cost-management tooling that periodically reads this resource.
level: informational
