title: AWS S3 PutBucketPolicy Attempt
id: c17ca273-e760-5393-9af9-ddbce33823a7
status: experimental
description: |
    Applies an Amazon S3 bucket policy to an Amazon S3 bucket.
    Security implications: Attackers might use PutBucketPolicy to modify bucket permissions, potentially allowing unauthorized access to sensitive data.
references:
    - https://www.solvo.cloud/blog/detecting-and-removing-risky-actions-out-of-your-iam-security-policies/
    - https://aws.permissions.cloud/iam/s3#s3-PutBucketPolicy
    - https://traildiscover.cloud/#S3-PutBucketPolicy
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.exfiltration
    - attack.t1048 #Exfiltration Over Alternative Protocol
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: s3.amazonaws.com
        eventName: PutBucketPolicy
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Legitimate provisioning or configuration changes by administrators or CI/CD pipelines.
    - Infrastructure-as-code (Terraform, CloudFormation, CDK, Pulumi) applying changes.
level: medium
