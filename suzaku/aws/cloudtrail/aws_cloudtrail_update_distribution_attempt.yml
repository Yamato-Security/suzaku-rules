title: AWS CloudFront UpdateDistribution Attempt
id: d0ca6c6f-c86c-5e5a-a99d-aa34963f491f
status: experimental
description: |
    Updates the configuration for a CloudFront distribution.
    Security implications: Attackers might use UpdateDistribution to add a malicious configuration such as a function to exfiltrate data.
references:
    - https://medium.com/@adan.alvarez/how-attackers-can-misuse-aws-cloudfront-access-to-make-it-rain-cookies-acf9ce87541c
    - https://aws.permissions.cloud/iam/cloudfront#cloudfront-UpdateDistribution
    - https://traildiscover.cloud/#CloudFront-UpdateDistribution
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.collection
    - attack.t1119 #Automated Collection
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: cloudfront.amazonaws.com
        eventName: UpdateDistribution
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Legitimate provisioning or configuration changes by administrators or CI/CD pipelines.
    - Infrastructure-as-code (Terraform, CloudFormation, CDK, Pulumi) applying changes.
level: informational
