title: AWS S3 GetBucketAccelerateConfiguration
id: f55aaee8-97ef-534e-b1f4-44ae7a114eb5
status: experimental
description: |
    This implementation of the GET action uses the accelerate subresource to return the Transfer Acceleration state of a bucket, which is either Enabled or Suspended.

    Security implications: Attackers might use GetBucketAccelerateConfiguration to check if S3 transfer acceleration is enabled.

    Observed in real-world incidents/reporting, e.g.: Leaked Environment Variables Allow Large-Scale Extortion Operation in Cloud Environments.
references:
    - https://unit42.paloaltonetworks.com/large-scale-cloud-extortion-operation/
    - https://aws.permissions.cloud/iam/s3#s3-GetAccelerateConfiguration
    - https://traildiscover.cloud/#S3-GetBucketAccelerateConfiguration
author: Adan Alvarez (@adanalvarez), Yamato Security
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.discovery
    - attack.t1526 #Cloud Service Discovery
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: s3.amazonaws.com
        eventName: GetBucketAccelerateConfiguration
    condition: selection
falsepositives:
level: low
