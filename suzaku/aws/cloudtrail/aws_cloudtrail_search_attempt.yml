title: AWS ResourceExplorer Search Attempt
id: 8fe1e45c-729a-5b5f-808b-f697676bdfd6
status: experimental
description: |
    Failed or denied attempt to call Search — the request returned an error, so the action did not complete. A failed attempt can indicate an adversary probing permissions, a misconfigured tool, or an incomplete attack.
    Searches for resources and displays details about all resources that match the specified criteria.
    Security implications: Attackers might use Search to list resorces.
    Ex: aws resource-explorer-2 search --query-string 'service:iam'
    Observed in real-world incidents/reporting, e.g.: Tales from the cloud trenches: Amazon ECS is the new EC2 for crypto mining.
references:
    - https://securitylabs.datadoghq.com/articles/tales-from-the-cloud-trenches-ecs-crypto-mining/
    - https://aws.permissions.cloud/iam/resource-explorer-2#resource-explorer-2-Search
    - https://traildiscover.cloud/#ResourceExplorer-Search
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.discovery
    - attack.t1087 #Account Discovery
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: resource-explorer-2.amazonaws.com
        eventName: Search
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Routine enumeration by administrators, monitoring/inventory tools, or the AWS Console and SDKs.
    - Security, backup, or cost-management tooling that periodically reads this resource.
level: informational
