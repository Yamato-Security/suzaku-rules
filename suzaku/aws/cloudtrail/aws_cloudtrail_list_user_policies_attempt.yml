title: AWS IAM ListUserPolicies Attempt
id: 8b2f015c-d13b-5a6d-855f-fb5885f1b124
status: experimental
description: |
    Failed or denied attempt to call ListUserPolicies — the request returned an error, so the action did not complete. A failed attempt can indicate an adversary probing permissions, a misconfigured tool, or an incomplete attack.
    Lists the names of the inline policies embedded in the specified IAM user.
    Security implications: Attackers might use ListUserPolicies to identify permissions associated with various users in AWS.
    Observed in real-world incidents/reporting, e.g.: Datadog threat roundup: top insights for Q4 2024.
references:
    - https://securitylabs.datadoghq.com/articles/2024-q4-threat-roundup/
    - https://aws.permissions.cloud/iam/iam#iam-ListUserPolicies
    - https://traildiscover.cloud/#IAM-ListUserPolicies
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.discovery
    - attack.t1087 #Account Discovery
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: iam.amazonaws.com
        eventName: ListUserPolicies
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Routine enumeration by administrators, monitoring/inventory tools, or the AWS Console and SDKs.
    - Security, backup, or cost-management tooling that periodically reads this resource.
level: informational
