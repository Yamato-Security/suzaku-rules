title: AWS EC2 AuthorizeSecurityGroupEgress Attempt
id: 1b12a057-c272-5d86-a198-a14c4814055b
status: experimental
description: |
    Failed or denied attempt to call AuthorizeSecurityGroupEgress — the request returned an error, so the action did not complete. A failed attempt can indicate an adversary probing permissions, a misconfigured tool, or an incomplete attack.
    Adds the specified outbound (egress) rules to a security group.
    Security implications: Attackers might use AuthorizeSecurityGroupEgress to allow exfiltration.
    Ex: aws ec2 authorize-security-group-egress --group-id sg-1a2b3c4d --ip-permissions IpProtocol=tcp,FromPort=80,ToPort=80,IpRanges='[{CidrIp=10.0.0.0/16}]'
    Observed in real-world incidents/reporting, e.g.: Trouble in Paradise.
references:
    - https://blog.darklab.hk/2021/07/06/trouble-in-paradise/
    - https://aws.permissions.cloud/iam/ec2#ec2-AuthorizeSecurityGroupEgress
    - https://traildiscover.cloud/#EC2-AuthorizeSecurityGroupEgress
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.exfiltration
    - attack.t1048 #Exfiltration Over Alternative Protocol
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: ec2.amazonaws.com
        eventName: AuthorizeSecurityGroupEgress
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Legitimate provisioning or configuration changes by administrators or CI/CD pipelines.
    - Infrastructure-as-code (Terraform, CloudFormation, CDK, Pulumi) applying changes.
level: medium
