title: AWS Organizations ListAccounts Attempt
id: 798e8567-012e-5217-b7b1-338059ccd546
status: experimental
description: |
    Lists all the accounts in the organization.
    Security implications: Attackers might use ListAccounts to gather information about the structure and resources of an organization's AWS environment.
    Observed in real-world incidents/reporting, e.g.: When a Zero Day and Access Keys Collide in the Cloud: Responding to the SugarCRM Zero-Day Vulnerability.
references:
    - https://unit42.paloaltonetworks.com/sugarcrm-cloud-incident-black-hat/
    - https://aws.permissions.cloud/iam/organizations#organizations-ListAccounts
    - https://traildiscover.cloud/#Organizations-ListAccounts
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.discovery
    - attack.t1526 #Cloud Service Discovery
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: organizations.amazonaws.com
        eventName: ListAccounts
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Routine enumeration by administrators, monitoring/inventory tools, or the AWS Console and SDKs.
    - Security, backup, or cost-management tooling that periodically reads this resource.
level: informational
