title: AWS events PutTargets Attempt
id: cf56c80c-4e93-5a64-85a6-c1d696175983
status: experimental
description: |
    Failed or denied attempt to call PutTargets — the request returned an error, so the action did not complete. A failed attempt can indicate an adversary probing permissions, a misconfigured tool, or an incomplete attack.
    Adds the specified targets to the specified rule, or updates the targets if they are already associated with the rule.
    Security implications: Attackers might use PutTargets in AWS EventBridge to trigger a malicious Lambda function periodically.
    Observed in real-world incidents/reporting, e.g.: Cloud Security Stories: From Risky Permissions to Ransomware Execution.
references:
    - https://sonraisecurity.com/blog/cloud-security-stories-from-risky-permissions-to-ransomware-execution/
    - https://aws.permissions.cloud/iam/events#events-PutTargets
    - https://traildiscover.cloud/#events-PutTargets
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.persistence
    - attack.t1546 #Event Triggered Execution
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: events.amazonaws.com
        eventName: PutTargets
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Legitimate provisioning or configuration changes by administrators or CI/CD pipelines.
    - Infrastructure-as-code (Terraform, CloudFormation, CDK, Pulumi) applying changes.
level: low
