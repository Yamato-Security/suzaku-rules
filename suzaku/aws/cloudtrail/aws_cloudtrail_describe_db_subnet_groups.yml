title: AWS RDS DescribeDBSubnetGroups
id: 37bfda93-d701-5f95-9643-1d6782236527
status: experimental
description: |
    Returns a list of DBSubnetGroup descriptions.
    Security implications: Subnet group details reveal network placement of databases supporting lateral movement planning.
    Ex: aws rds describe-db-subnet-groups
    Observed in real-world incidents/reporting, e.g.: Crimson Collective: A New Threat Group Observed Operating in the Cloud.
references:
    - https://www.rapid7.com/blog/post/tr-crimson-collective-a-new-threat-group-observed-operating-in-the-cloud/
    - https://aws.permissions.cloud/iam/rds#rds-DescribeDBSubnetGroups
    - https://traildiscover.cloud/#RDS-DescribeDBSubnetGroups
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.discovery
    - attack.t1580 #Cloud Infrastructure Discovery
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: rds.amazonaws.com
        eventName: DescribeDBSubnetGroups
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and not (error_code or error_msg)
falsepositives:
    - Routine enumeration by administrators, monitoring/inventory tools, or the AWS Console and SDKs.
    - Security, backup, or cost-management tooling that periodically reads this resource.
level: informational
