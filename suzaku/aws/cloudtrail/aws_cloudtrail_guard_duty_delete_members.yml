title: AWS GuardDuty DeleteMembers
id: 9ff2c5ac-c2ff-5773-90ba-c6847b1e2e09
status: experimental
description: |
    Deletes GuardDuty member accounts (to the current GuardDuty administrator account) specified by the account IDs.
    Security implications: Attackers might use DeleteMembers to remove members from a GuardDuty detector, disrupting threat detection and security analysis.
references:
    - https://www.chrisfarris.com/post/reinforce-threat-hunting/
    - https://aws.permissions.cloud/iam/guardduty#guardduty-DeleteMembers
    - https://traildiscover.cloud/#GuardDuty-DeleteMembers
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.defense-evasion
    - attack.t1562 #Impair Defenses
    - attack.t1562.001 #Impair Defenses: Disable or Modify Tools
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: guardduty.amazonaws.com
        eventName: DeleteMembers
    condition: selection
falsepositives:
level: medium
