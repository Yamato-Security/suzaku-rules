title: AWS IAM ListUsers
id: 542ff5ec-f5d9-520f-8d21-6cbba4808e28
status: experimental
description: |
    Lists the IAM users that have the specified path prefix. If no path prefix is specified, the operation returns all users in the AWS account.
    Security implications: Attackers might use ListUsers to enumerate IAM users for further attacks, such as adding keys or creating a login profile for persistence.
    Observed in real-world incidents/reporting, e.g.: The curious case of DangerDev@protonmail.me; Ransomware in the cloud; Incident report: From CLI to console, chasing an attacker in AWS; Tales from the cloud trenches: Amazon ECS is the new EC2 for crypto mining; Muddled Libra’s Evolution to the Cloud; Cloud-Conscious Tactics, Techniques,and Procedures (TTPs).
references:
    - https://www.invictus-ir.com/news/the-curious-case-of-dangerdev-protonmail-me
    - https://www.invictus-ir.com/news/ransomware-in-the-cloud
    - https://expel.com/blog/incident-report-from-cli-to-console-chasing-an-attacker-in-aws/
    - https://securitylabs.datadoghq.com/articles/tales-from-the-cloud-trenches-ecs-crypto-mining/
    - https://unit42.paloaltonetworks.com/muddled-libra-evolution-to-cloud/
    - https://fwdcloudsec.org/assets/presentations/2024/europe/sebastian-walla-cloud-conscious-tactics-techniques-and-procedures-an-overview.pdf
    - https://unit42.paloaltonetworks.com/large-scale-cloud-extortion-operation/
    - https://securitylabs.datadoghq.com/articles/2024-q4-threat-roundup/
    - https://securitylabs.datadoghq.com/articles/following-attackers-trail-in-aws-methodology-findings-in-the-wild/
    - https://aws.permissions.cloud/iam/iam#iam-ListUsers
    - https://traildiscover.cloud/#IAM-ListUsers
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.discovery
    - attack.t1087 #Account Discovery
    - attack.t1087.004 #Account Discovery: Cloud Account
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: iam.amazonaws.com
        eventName: ListUsers
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and not (error_code or error_msg)
falsepositives:
    - Routine enumeration by administrators, monitoring/inventory tools, or the AWS Console and SDKs.
    - Security, backup, or cost-management tooling that periodically reads this resource.
level: informational
