title: AWS IAM ListServiceSpecificCredentials
id: f13399fb-8ae3-5a75-ba5d-c1eb44fadd8c
status: experimental
description: |
    Returns information about the service-specific credentials associated with the specified IAM user.
    Security implications: Attackers might use ListServiceSpecificCredentials to get information about the relationship about users and services and gather CredentialIds.
    Observed in real-world incidents/reporting, e.g.: Muddled Libra’s Evolution to the Cloud.
references:
    - https://unit42.paloaltonetworks.com/muddled-libra-evolution-to-cloud/
    - https://aws.permissions.cloud/iam/iam#iam-ListServiceSpecificCredentials
    - https://traildiscover.cloud/#IAM-ListServiceSpecificCredentials
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.discovery
    - attack.t1087 #Account Discovery
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: iam.amazonaws.com
        eventName: ListServiceSpecificCredentials
    condition: selection
falsepositives:
    - Routine enumeration by administrators, monitoring/inventory tools, or the AWS Console and SDKs.
    - Security, backup, or cost-management tooling that periodically reads this resource.
level: informational
