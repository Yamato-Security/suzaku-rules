title: AWS S3 GetBucketRequestPayment
id: bb1b1036-6aa4-5407-84f7-bd6d2f90d6de
status: experimental
description: |
    Returns the request payment configuration of a bucket.
    Security implications: Attackers might use GetBucketRequestPayment to check who pays for request and the data download.
    Observed in real-world incidents/reporting, e.g.: Leaked Environment Variables Allow Large-Scale Extortion Operation in Cloud Environments.
references:
    - https://unit42.paloaltonetworks.com/large-scale-cloud-extortion-operation/
    - https://aws.permissions.cloud/iam/s3#s3-GetBucketRequestPayment
    - https://traildiscover.cloud/#S3-GetBucketRequestPayment
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.discovery
    - attack.t1526 #Cloud Service Discovery
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: s3.amazonaws.com
        eventName: GetBucketRequestPayment
    condition: selection
falsepositives:
    - Routine enumeration by administrators, monitoring/inventory tools, or the AWS Console and SDKs.
    - Security, backup, or cost-management tooling that periodically reads this resource.
level: informational
