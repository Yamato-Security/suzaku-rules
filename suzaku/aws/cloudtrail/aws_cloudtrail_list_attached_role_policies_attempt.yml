title: AWS IAM ListAttachedRolePolicies Attempt
id: 3bd493d7-3465-5537-aa08-2fcd197c337f
status: experimental
description: |
    Failed or denied attempt to call ListAttachedRolePolicies — the request returned an error, so the action did not complete. A failed attempt can indicate an adversary probing permissions, a misconfigured tool, or an incomplete attack.
    Lists all managed policies that are attached to the specified IAM role.
    Security implications: Attackers might use ListAttachedRolePolicies to identify and exploit permissions associated with various roles in AWS.
    Ex: aws iam list-attached-role-policies --role-name TrailDiscover
    Observed in real-world incidents/reporting, e.g.: Compromised Cloud Compute Credentials: Case Studies From the Wild; Investigating Suspected DPRK-Linked Crypto Intrusions.
references:
    - https://unit42.paloaltonetworks.com/compromised-cloud-compute-credentials/#post-125981-_kdq0vw6banab
    - https://ctrlaltintel.com/threat%20research/DPRK-Crypto-Heist/
    - https://aws.permissions.cloud/iam/iam#iam-ListAttachedRolePolicies
    - https://traildiscover.cloud/#IAM-ListAttachedRolePolicies
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.discovery
    - attack.t1087 #Account Discovery
    - attack.t1087.004 #Account Discovery: Cloud Account
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: iam.amazonaws.com
        eventName: ListAttachedRolePolicies
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Routine enumeration by administrators, monitoring/inventory tools, or the AWS Console and SDKs.
    - Security, backup, or cost-management tooling that periodically reads this resource.
level: informational
