title: AWS IAM CreateGroup Attempt
id: 12b2e946-1bc2-5835-93f3-922acfb0df4c
status: experimental
description: |
    Creates a new group.
    Security implications: Attackers use CreateGroup to create a group that they can use to escalate privileges.
references:
    - https://www.elastic.co/guide/en/security/current/aws-iam-group-creation.html
    - https://aws.permissions.cloud/iam/iam#iam-CreateGroup
    - https://traildiscover.cloud/#IAM-CreateGroup
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.privilege-escalation
    - attack.t1098 #Account Manipulation
    - attack.t1098.003 #Account Manipulation: Additional Cloud Roles
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: iam.amazonaws.com
        eventName: CreateGroup
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Legitimate provisioning or configuration changes by administrators or CI/CD pipelines.
    - Infrastructure-as-code (Terraform, CloudFormation, CDK, Pulumi) applying changes.
level: low
