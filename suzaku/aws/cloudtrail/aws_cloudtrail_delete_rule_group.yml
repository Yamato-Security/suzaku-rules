title: AWS WAFV2 DeleteRuleGroup
id: feaa0ea0-eb76-5f7d-9e2c-b7312262ee91
status: experimental
description: |
    Deletes the specified RuleGroup.
    Security implications: Attackers might use DeleteRuleGroup to disable security rules, making the system vulnerable to cyber attacks.
    Ex: aws wafv2 delete-rule-group --name TestRuleGroup --scope REGIONAL --id a1b2c3d4-5678-90ab-cdef-EXAMPLE11111 --lock-token 7b3bcec2-0000-0000-0000-563bf47249f0
references:
    - https://www.elastic.co/guide/en/security/current/aws-waf-rule-or-rule-group-deletion.html
    - https://easttimor.github.io/aws-incident-response/
    - https://aws.permissions.cloud/iam/wafv2#wafv2-DeleteRuleGroup
    - https://traildiscover.cloud/#WAFV2-DeleteRuleGroup
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.defense-evasion
    - attack.t1562 #Impair Defenses
    - attack.t1562.007 #Impair Defenses: Disable or Modify Cloud Firewall
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: wafv2.amazonaws.com
        eventName: DeleteRuleGroup
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and not (error_code or error_msg)
falsepositives:
    - Planned decommissioning, cleanup, or teardown by administrators or CI/CD.
    - Infrastructure-as-code (Terraform, CloudFormation, CDK) destroying or replacing resources.
level: high
