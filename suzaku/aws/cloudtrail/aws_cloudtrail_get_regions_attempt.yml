title: AWS LightSail GetRegions Attempt
id: c560168a-921b-5f27-be68-a00a7059f784
status: experimental
description: |
    Returns a list of all valid regions for Amazon Lightsail.
    Security implications: Attackers might use GetRegions to identify potential targets in different geographical locations on AWS LightSail.
references:
    - https://securitylabs.datadoghq.com/articles/following-attackers-trail-in-aws-methodology-findings-in-the-wild/
    - https://aws.permissions.cloud/iam/lightsail#lightsail-GetRegions
    - https://traildiscover.cloud/#LightSail-GetRegions
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.discovery
    - attack.t1580 #Cloud Infrastructure Discovery
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: lightsail.amazonaws.com
        eventName: GetRegions
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Routine enumeration by administrators, monitoring/inventory tools, or the AWS Console and SDKs.
    - Security, backup, or cost-management tooling that periodically reads this resource.
level: informational
