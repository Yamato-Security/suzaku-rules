title: AWS events DeleteRule Attempt
id: ae12f5aa-d7ed-58f2-b746-a643040005e2
status: experimental
description: |
    Failed or denied attempt to call DeleteRule — the request returned an error, so the action did not complete. A failed attempt can indicate an adversary probing permissions, a misconfigured tool, or an incomplete attack.
    Deletes the specified rule.
    Security implications: Attackers might use DeleteRule to disrupt automated security responses and event logging in AWS EventBridge, potentially masking unauthorized activities or compromising system integrity.
references:
    - https://www.elastic.co/guide/en/security/7.17/rules-api-delete.html
    - https://docs.datadoghq.com/security/default_rules/aws-eventbridge-rule-disabled-or-deleted/
    - https://aws.permissions.cloud/iam/events#events-DeleteRule
    - https://traildiscover.cloud/#events-DeleteRule
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.impact
    - attack.defense-evasion
    - attack.t1489 #Service Stop
    - attack.t1578 #Modify Cloud Compute Infrastructure
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: events.amazonaws.com
        eventName: DeleteRule
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Planned decommissioning, cleanup, or teardown by administrators or CI/CD.
    - Infrastructure-as-code (Terraform, CloudFormation, CDK) destroying or replacing resources.
level: medium
