title: AWS RDS DescribeDBInstances Attempt
id: ee846620-becd-5985-a384-825dee8fd5b1
status: experimental
description: |
    Failed or denied attempt to call DescribeDBInstances — the request returned an error, so the action did not complete. A failed attempt can indicate an adversary probing permissions, a misconfigured tool, or an incomplete attack.
    Describes provisioned RDS instances.
    Security implications: DB endpoint details aid targeting for data exfiltration or privilege escalation within databases.
    Ex: aws rds describe-db-instances
    Observed in real-world incidents/reporting, e.g.: Crimson Collective: A New Threat Group Observed Operating in the Cloud; Investigating Suspected DPRK-Linked Crypto Intrusions.
references:
    - https://www.rapid7.com/blog/post/tr-crimson-collective-a-new-threat-group-observed-operating-in-the-cloud/
    - https://ctrlaltintel.com/threat%20research/DPRK-Crypto-Heist/
    - https://aws.permissions.cloud/iam/rds#rds-DescribeDBInstances
    - https://traildiscover.cloud/#RDS-DescribeDBInstances
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.discovery
    - attack.t1580 #Cloud Infrastructure Discovery
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: rds.amazonaws.com
        eventName: DescribeDBInstances
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Routine enumeration by administrators, monitoring/inventory tools, or the AWS Console and SDKs.
    - Security, backup, or cost-management tooling that periodically reads this resource.
level: informational
