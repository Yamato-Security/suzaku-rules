title: AWS Bedrock ListModelInvocationJobs Attempt
id: 4864b44b-c451-505e-86c7-16e49897dc1c
status: experimental
description: |
    Lists all batch inference jobs in the account.
    Security implications: Attackers might use ListModelInvocationJobs to review sensitive prompts, spot valuable outputs, or plan when to insert malicious workloads.
    Observed in real-world incidents/reporting, e.g.: AI-assisted cloud intrusion achieves admin access in 8 minutes.
references:
    - https://www.sysdig.com/blog/ai-assisted-cloud-intrusion-achieves-admin-access-in-8-minutes
    - https://aws.permissions.cloud/iam/bedrock#bedrock-ListModelInvocationJobs
    - https://traildiscover.cloud/#Bedrock-ListModelInvocationJobs
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.discovery
    - attack.t1580 #Cloud Infrastructure Discovery
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: bedrock.amazonaws.com
        eventName: ListModelInvocationJobs
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Routine enumeration by administrators, monitoring/inventory tools, or the AWS Console and SDKs.
    - Security, backup, or cost-management tooling that periodically reads this resource.
level: informational
