title: AWS EC2 DeleteSnapshot Attempt
id: a8a494c1-f938-504f-9611-45426d607b5c
status: experimental
description: |
    Deletes the specified snapshot.
    Security implications: Attackers might use DeleteSnapshot to erase Amazon EBS snapshots, potentially destroying backup data and hampering recovery efforts after an attack.
    Observed in real-world incidents/reporting, e.g.: Hacker Puts Hosting Service Code Spaces Out of Business.
references:
    - https://threatpost.com/hacker-puts-hosting-service-code-spaces-out-of-business/106761/
    - https://aws.permissions.cloud/iam/ec2#ec2-DeleteSnapshot
    - https://traildiscover.cloud/#EC2-DeleteSnapshot
author: Zach Mathis (@YamatoSecurity)
date: 2026-07-12
modified: 2026-07-12
tags:
    - attack.impact
    - attack.t1485 #Data Destruction
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: ec2.amazonaws.com
        eventName: DeleteSnapshot
    error_code:
        errorCode|exists: true
    error_msg:
        errorMessage|exists: true
    condition: selection and (error_code or error_msg)
falsepositives:
    - Planned decommissioning, cleanup, or teardown by administrators or CI/CD.
    - Infrastructure-as-code (Terraform, CloudFormation, CDK) destroying or replacing resources.
level: low
